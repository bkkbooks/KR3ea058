body:
  text: 序醫書之繁汗牛充棟然剽襲偽託者多矣何從而信之哉亦在慎辨之爾辨之法有三考其年以求其世此後味其辭而索其旨之淺深臨其診以證其言之是非而真偽無所匿矣執是以觀古今醫籍益十不失一焉若世傳之難經者楊玄操序言渤海秦越人所作殆難窮考而仲景傷寒論自序有撰用素問九卷八十一難云云其為漢以前書無疑是即史遷倉公傳所謂扁鵲之脈書也而隋書經籍志云黃帝八十一難二卷與楊氏之序不侔夫難問難也經者問難黃帝內經之義也云黃帝者或原於此越人之作似屬可信自古言醫者皆祖述內經而內經十八卷西晉亂後亡佚益多素問九卷梁七録全元起注本祗存其八已佚第七一卷王太僕拉雜陰陽大論之文以補其亡妄托得自張公祕本殊不足據針經九卷唐人搜其殘帙易名靈樞亦非廬山真面越人去古未遠採摘內經精要意周旨密雖為華元化燼餘之書經呂廣編次不無衍闕然醫經補逸獨賴此篇厥功偉矣惟理趣深遠非淺學得窺堂奧故詮注者亡慮數十家間見精義究不能處處實有指歸豈得為後學津筏讀者病之霖學識庸陋難探玄微謹考經文尋其意旨旁採群籍資為左證質以諸賢之箋釋西士之剖驗以正其義非敢啓幽前祕嘉惠來茲唯在講肄之際取便翻閲爾時光緒二十一年春正月揚州葉霖書於石林書屋
