body:
  text: 卷五六十二難六十二難曰臟井滎有五腑獨有六者何謂也然腑者陽也三焦行於諸陽故置一輸名曰原腑有六者亦與三焦共一氣也臟有五者謂井滎輸經合也腑有六者謂井滎輸原經合也夫五臟之脈皆以所出為井所流為滎所注為輸所行為經所入為合是謂五俞以應五行木火土金水也六腑亦有俞以應五行金水木火土也惟過之穴為原故有六也原者元也元氣者三焦之氣也蓋三焦包絡主相火故列五行之外而三焦所行者遠其氣所流聚之處五穴不足以盡之故別置一穴名曰原也三焦為陽氣之根六腑屬陽其氣皆三焦所出故曰共一氣也六十三難六十三難曰十變言五臟六腑滎合皆以井為始者何也然井者東方春也萬物之始生諸蚑行喘息蜎飛蠕動當生之物莫不以春而生故歲數始於春日數始於甲故以井為始也人身臟腑經穴起止其次第先井次滎次輸次經次合故云以井為始也井谷井非掘成之井也山谷之中泉水初出之處名曰井井者主出之義也溪谷出水從上注下水常射焉井之為道以下給上者也是則井者經脈之所出也其既出濴濴流利未暢故謂之滎說文曰滎絶小水也水雖絶小停留則深便有挹注之處瀦則外瀉故謂之輸俞與輸通說文曰輸委輸也即輸瀉之謂其既輸瀉則紆徐逐流歷成渠徑徑與經通徑者經也經行既達而會合於海故謂之合合者會也此是水之流行也人之經脈亦取法於此故取以名穴也以井為始春者以其發源所生之義也歲數始於春者正月為歲首故也日數始於甲者謂東方屬甲乙為干之首也蚑蟲行喘息蜎蟲飛蠕動皆春氣發生之義耳六十四難六十四難曰十變又言陰井木陽井金陰滎火陽滎水陰輸土陽輸木陰經金陽經火陰合水陽合土人身經脈起於井穴五臟屬陰從春夏而至秋冬故陰井為木陰井木生陰滎火陰滎火生陰輸土陰輸土生陰經金陰經金生陰合水六腑屬陽從秋冬而至春夏故陽井為金陽井金生陽滎水陽滎水生陽輸木陽輸木生陽經火陽經火生陽合土此陰陽逆順之氣五行相生之序也陰陽皆不同其意何也然是剛柔之事也陰井乙木陽井庚金陽井庚庚者乙之剛也陰井乙乙者庚之柔也乙為木故言陰井木也庚為金故言陽井金也余皆仿此剛柔者即乙庚之配合也陰井為木乙陰木也陽井為金庚陽金也乙與庚合以陰木合陽金故曰庚乃乙之剛乙乃庚之柔也陰滎火陽滎水是丁與壬合也陽輸木陰輸土是甲與己合也陽經火陰經金是丙與辛合也陽合土陰合水是戊與癸合也此陰陽配合之道也其十干化合之義已詳三十三難中當參互觀之按靈樞本輸篇論井滎輸經合甚詳欲求臟腑經脈之血氣生死出入者不可不知也其義以營衛氣血皆生於胃腑水穀之精營行脈中衛行脈外血行脈中氣行脈外然血中有氣氣中有血陰陽互根不可相離是脈內之血氣從氣衛而滲灌於脈外脈外之氣血亦從孫絡而溜注於絡中外內出入之相通也五臟內合五行故其俞五六腑外合六氣故其俞六蓋六氣生於五行而有二火也人身十二經脈合六臟六腑之十二大絡及督脈之長強任脈之尾翳脾之大包凡二十七脈之血氣出入於手足指之間所出為井所溜為滎所注為輸所行為經所入為合此二十七脈之血氣從四肢通於臟腑而臟腑中之血氣又從經脈繆處通於孫絡而溜於絡脈交相逆順而行外而皮膚內而經脈者也夫經脈有三百六十五穴會絡脈有三百六十五穴會孫絡亦有三百六十五穴會經脈寬大孫絡窄小經脈深而絡脈淺故黃帝有五臟之所溜處闊散之度淺深之狀高下所至之問也而醫言過心化赤之血由脈管行遍散諸微絲管由微絲管之尾漸並漸粗入回血管血入回血管其色變紫與脈管交相逆順而行至總回管過心入肺呼出炭氣吸入養氣復化為赤血者即此義也西醫知血之行諸脈絡而不知所以能行者氣為之也其井滎輸經合五行出入之道西醫昧而不明是知其所當然而不知其所以然也六十五難六十五難曰經言所出為井所入為合其法奈何然所出為井井者東方春也萬物之始生故言所出為井也所入為合合者北方冬也陽氣入藏故言所入為合也經言靈樞本輸篇也井滎輸經合如春夏秋冬之周而復始東南西北之循環無端也春夏主生養陽氣在外秋冬主收藏陽氣在內井屬春故自井而生髮合屬冬故至合而入臟如天地一歲而有四時一日亦有四時人身隨其氣而運行所以一呼一吸陰陽無不周遍也按本輸篇言肺之井木出於手大指內側之少商穴溜於魚際為滎注於太淵為輸行於經渠為經入於尺澤為合心之井木出手中指之端心包絡經中衝穴溜於勞宮為滎注於大陵為輸行於間使為經入於曲池為合心之井滎輸經合而行包絡之經者何也蓋心主血包絡主脈君相之相合也心與包絡血脈相通心臟所出之血氣間行於手少陰之經手厥陰之經也肝之井木出足大指之端大敦穴溜於行間為滎注於太衝為輸行於中封為經入於曲泉為合脾之井木出足大指內側隱白穴溜於大都為滎注於太白為輸行於商丘為經入於陰之陵泉為合腎之井木出足心之湧泉穴溜於然谷為滎注於太溪為輸行於復溜為經入於陰谷為合此五臟之井滎輸經合也膀胱之井金出足小指之端至陰穴溜於通谷為滎注於束骨為輸過於京骨為原行於崑崙為經入於委中為合膽之井金出於足小指次指之端竅陰穴溜於俠溪為滎注於臨泣為輸過於丘墟為原行於陽輔為經入於陽之陵泉為合胃之井金出足大指次指之端厲兌穴溜於內庭為滎注於陷谷為輸過於衝陽為原行於解溪為經入於下陵為合三焦者上合手少陽其井金出手小指次指之端關衝穴溜於液門為滎注於中渚為輸過於陽池為原行於支溝為經入於天井為合而三焦下輸出於足太陽之前委陽穴是足太陽之絡蓋三焦之氣出於腎遊行於上中下其斜者為絡入絡膀胱直者為經即手少陽也故三焦之輸有二焉小腸之井金出手小指之端少澤穴溜於前谷為滎注於後溪為輸過於腕骨為原行於陽谷為經入於小海為合大腸之井金出於手大指次指之端商陽穴溜於本節之前二間為滎注於本節之後三間為輸過於合谷為原行於陽溪為經入於曲池為合此六腑之井滎輸原經合也夫臟腑之井起於木金者木金乃生成之始終也五臟藏精其氣皆陰然化氣必生於陽故五臟雖陰而其起恆同起於少陽之生木六腑致用其氣皆陽然氣盛必歸於精故六腑雖陽而其氣為成皆起於西成說物之兌金是以臟井為木腑井為金也生氣在臟成氣在腑如四時之春秋此陰陽之定理針法所必究也然只節經文之大略其經穴部位尺寸須詳考銅人圖像庶不致誤六十六難六十六難曰經言肺之原出於太淵心之原出於大陵肝之原出於太衝脾之原出於太白腎之原出於太溪少陰之原出於兌骨神門穴也膽之原出於丘墟胃之原出於衝陽三焦之原出於陽池膀胱之原出於京骨大腸之原出於合谷小腸之原出於腕骨考甲乙經肺之原太淵在手掌後陷者中央心之原大陵在掌後骨下橫紋中兩筋間此手厥陰心包絡之穴也心與包絡相通故取此穴亦可謂之心也肝之原太衝在足大指本節後二寸陷者中脾之原太白在足大指後內側白肉際陷者中腎之原太溪在足內踝後跟骨上動脈陷者中手少陰之原兌骨即神門穴在手掌後鋭骨端陷者中膽之原丘墟在足外踝如前陷者中胃之原衝陽在足趺上去內庭五寸高骨間動脈三焦之原陽池在手表腕上陷者中膀胱之原京骨在足小指外側本節後大骨下白肉際陷者中大腸之原合谷在手大指次指歧骨間陷者中小腸之原腕骨在手外側腕前起骨下陷者中按靈樞九針十二原篇曰陽中之少陰肺也其原出於太淵太淵二陽中之太陽心也其原出於大陵大陵二陰中之少陽肝也其原出於太衝太衝二陰中之至陰脾也其原出於太白太白二陰中之太陰腎也其原出於太溪太溪二膏之原出於鳩尾鳩尾一肓之原出於脖胦脖胦一凡此十二原者主治五臟六腑之有疾者也脹取三陽飧泄取三陰是靈樞以五臟之十二穴為原此則以六臟六腑十二經各有原言心之原出於大陵者即候包絡之病蓋君相之血脈通貫也言少陰之原出於兌骨者少陰心也兌骨即神門邪客篇曰少陰獨無輸者不病乎曰其外經病而臟不病故獨取經於掌後鋭骨之端即此義也越人之意非謂心有兩原乃指君相氣合厥陰少陰可同治也十二經皆以輸為原者何也然五臟輸者三焦之所行氣之所留止也三焦所行之輸為原者何也然齊下腎間動氣者人之生命也十二經之根本也故名曰原三焦者原氣之別使也主通行三氣經歷於五臟六腑原者三焦之尊號也故所止輒為原五臟六腑之有病者皆取其原也十二經皆以輸為原者言九針十二原中皆以五臟之輸穴為原非謂六腑也然五臟六腑之輸皆系三焦之所行其氣所留止之處也故稱曰原三焦之根起於腎間命門人之生命之原十二經之根本皆系乎此由鼻吸入之天陽過肺歷心引心火循膂筋入腎系至命門蒸膀胱之水化氣上騰三焦主持相火為腎中原氣之別使是十二經之營衛流行皆三焦之所使也通行生氣於五臟六腑之輸穴其所留止輒謂之原以其原於命門動氣間而得名亦以見三焦乃腹包膜其連網脂膜皆三焦之物為統攝臟腑之郛郭也六十七難六十七難曰五臟募皆在陰而俞在陽者何謂也然陰病行陽陽病行陰故云募在陰俞在陽募音幕經氣結聚處也俞輸轉之義經氣由此而輸於彼也五臟之募皆在腹肺之募中府二穴在胸部雲門下同身寸之一寸乳上三肋間動脈陷中屬本經心之募巨闕一穴在鳩尾下同身寸之一寸屬任脈脾之募章門二穴在大橫外直臍端屬肝經肝之募期門二穴在不容兩旁各同身寸之一寸五分直乳第二肋端屬本經腎之募京門二穴在監骨腰中挾脊季脅下屬膽經五臟之俞皆在背肺俞在第三椎之下心俞在五椎之下肝俞在九椎之下脾俞在十一椎之下腎俞在十四椎之下又有膈俞者在七椎之下皆挾脊兩旁各同身寸之一寸五分總屬足太陽經也陰病行陽陽病行陰者背為陽腹為陰俞在於背俞者臟中陰氣之所輸也是以陰病行於陽也募在於腹募者臟中陽氣之所結也是以陽病行於陰也以見陰陽經絡氣相交貫臟腑腹背氣相通應故其病氣之結聚輸轉之處交相會也經曰從陽引陰從陰引陽即此義也按內經六腑亦有募有俞不獨五臟為然也此章明臟腑陰陽之氣交相通貫言五臟而不及六腑者省文也胃之募中脘一穴在臍上同身寸之四寸屬任脈大腸募天樞二穴在肓俞旁同身寸之一寸五分挾臍二寸屬胃經小腸募關元一穴在臍下同身寸之三寸屬任脈膽募日月二穴在期門下同身寸之五分直乳第二肋下屬本經膀胱募中極一穴在臍下同身寸之二寸三分屬任脈三焦募在臍下同身寸之二寸屬任脈此六腑之募亦皆在腹胃俞在十二椎之間大腸俞在十六椎之間小腸俞在十八椎之間膽之俞在十椎之間膀胱俞在十九椎之間三焦俞在十三椎之間又有心包俞在四椎之間亦俱挾脊兩旁各同身寸之一寸五分屬足太陽經也觀陰陽募俞並舉為言則非獨指五臟明矣故補注之六十八難六十八難曰五臟六腑各有井滎輸經合皆何所主然經言所出為井所流為滎所注為輸所行為經所入為合井主心下滿滎主身熱輸主體重節痛經主喘咳寒熱合主逆氣而泄此五臟六腑井滎輸經合所主病也主主治也經言靈樞九針十二原篇文也井山谷中泉水之所出也滎小水尚未能流利者也輸輸瀉之所注也經由輸而經過之徑也合水流而會合之處也井主心下滿者井應木木者肝肝主滿重節痛也滎應火火者心心主身熱也輸應土土者脾脾主體重也經主咳嗽寒熱者經應金金者肺肺主寒熱也合主氣逆而泄者合應水水者腎腎主泄也此論五臟為病之一端耳不言六腑者舉臟足以該腑也然內經辨病取穴之法實不止此不可執一說而不知變通也按此七難論輸穴也然某穴至某穴之一寸者將謂周尺耶秦尺耶漢尺耶抑近世之尺耶聚訟紛紜莫衷一是皆為不明同身取寸之義也或以患人之中指中節取寸便為獨得心傳殊不知瘦人指長而身小則背腹之橫寸豈不太闊肥人指短而身長則背腹之橫寸豈不太狹有身長指長而頭小者則頭間之寸豈不嫌長有身短指短而頭大者則頭間之寸豈不嫌短似此肥瘦長短之差訛安能準的所謂同身取寸者必同其身體而取之也考其法以靈樞骨度篇尺寸為主再量人身尺寸隨取而折之自無長短肥瘦之差訛假如骨度篇云肩至肘長一尺七寸量患人由肩至肘長一尺三寸六分以八折合之所云某穴至某穴一寸者僅得八分余可類推此同身取寸之活法針灸之要事不可不知也附靈樞骨度篇黃帝問於伯高曰脈度言經之長短何以立之伯高曰先度其骨節之大小廣狹長短而脈度定矣黃帝曰願聞衆人之度人長七尺五寸者其骨節之大小長短各幾何伯高曰頭之大骨圍二尺六寸胸圍四尺五寸腰圍四尺二寸發所覆者顱至項尺二寸甲乙經尺字上有一字發以下至頤長一尺君子終折甲乙經君子作男子結喉以下至缺盆中長四寸缺盆以下至𩩲𩨗長九寸過則肺大不滿則肺小𩩲𩨗以下至天樞長八寸過則胃大不及則胃小天樞以下至橫骨長六寸半過則回腸廣長不滿則狹短橫骨長六寸半橫骨上廉以下至內輔之上廉長一尺八寸內輔之上廉以下至下廉長三寸半內輔下廉下至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸故骨圍大則太過小則不及角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半甲乙經作廣八寸兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半項發以下至背骨長二寸半膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一奇分在下故上七節至於膂骨九寸八分分之七此衆人骨之度也所以立經脈之長短也是故視其經脈之在於身也見其浮而堅其見明而大者多血細而沉者多氣也上第五卷六十二難至六十八難論腧穴
