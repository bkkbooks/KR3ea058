body:
  text: 卷四四十八難四十八難曰人有三虛三實何謂也然有脈之虛實有病之虛實有診之虛實也脈之虛實者濡者為虛緊牢者為實病之虛實者出者為虛入者為實言者為虛不言者為實緩者為虛急者為實診之虛實者濡者為虛牢者為實癢者為虛痛者為實外痛內快為外實內虛內痛外快為內實外虛故曰虛實也虛者空虛正氣不足也實者強實邪氣有餘也以脈言之濡者軟細故為虛也緊牢者緊弦勁牢沉勁故為實也然脈之虛實不僅乎此舉此可類推也以病言之出者為虛是五臟自病由內而之外所謂內傷是也入者為實是五邪所中由外而之內所謂外感是也然出者間亦有實入者間亦有虛此言其大概耳言者為虛以病氣內乏神氣自清故惺惺而不妨於言也不言者為實以邪氣外攻入鬱於內故神志昏亂而不言也緩者為虛以緩病來遲正氣奪而邪氣微則病漸深也急者為實以急病來驟正氣漓而邪氣盛則病疾速也診者按也候也按其外而知之非診脈之診也以診候言之癢者為虛血氣少而肌肉不充則癢痛者為實邪氣聚而營衛不和則痛又凡虛者喜按實者拒按故按之而痛者為實按之而快者為虛也濡者為虛牢者為實脈經引用此條無此二句或因上文而重出也楊氏謂按之皮肉柔濡者為虛牢強者為實似亦可解姑存備參四十九難四十九難曰有正經自病有五邪所傷何以別之然憂愁思慮則傷心形寒飲冷則傷肺恚怒氣逆上而不下則傷肝飲食勞倦則傷脾久坐濕地強力入水則傷腎是正經之自病也正經本經也五邪五臟之邪也心主思慮若憂勞過用則傷其心肺主皮毛形寒者皮毛外受風寒也飲冷者內飲冷水也其藏本寒過則傷肺也肝主怒恚怒則木氣鬱而傷肝也脾主四肢勞倦太過則傷脾脾運五穀飲食不潔則亦傷也腎主骨用力作強坐濕入水則傷腎蓋腎屬水同氣相感也然憂思恚怒飲食動作人之不能無者惟不可太過過則傷人必矣何謂五邪然有中風有傷暑有飲食勞倦有傷寒有中濕此之謂五邪肝為風木故風先入肝心為君火暑火之邪故心受之飲食勞倦一味太過則脾傷致病矣寒侵皮毛則傷肺雨霧蒸濕之氣則傷腎此五者邪由外至所謂外傷者也按素問本病論靈樞邪氣臟腑病形篇與此大同小異若素問陰陽應象大論曰怒傷肝喜傷心思傷脾憂傷肺恐傷腎乃內傷七情本臟自病之證也宣明五氣篇曰肝惡風心惡熱肺惡寒腎惡燥脾惡濕此六淫之邪外感之證也皆似同而異或謂越人既言本經自病是從內而生如形寒飲冷則傷肺形寒是寒感於皮毛此從外來也飲冷是冷入胸腹亦從外來也飲食等亦然況五邪亦有飲食勞倦豈非自相矛盾乎然其意謂正經虛則不任寒冷之侵伐侵伐則每易致病正經虛又傷於飲食者為內傷若傷飲食而致病者則外感也素問言腎惡燥者言其水臟而惡燥氣之耗竭也此雲水濕傷腎者濕傷於下故濕先歸腎腎屬水臟同氣相求也是古聖先賢之義雖有異同而辨內傷外感之理則一讀書貴乎融貫不可執泥先儒所謂以意逆志是謂得之信夫假令心病何以知中風得之然其色當赤何以言之肝主色自入為青入心為赤入脾為黃入肺為白入腎為黑肝為心邪故知當赤色也其病身熱脅下滿痛其脈浮大而弦假令心病者舉心臟為例也此言心病肝邪入而得中風之病蓋風氣通於肝也肝開竅於目故主色風邪自入肝經則色青肝在色為蒼也入心則色赤心在色為赤也入脾則色黃脾在色為黃也入肺則色白肺在色為白也入腎則色黑腎在色為黑也故肝之風邪入心其色當赤也其病身熱者外感之邪先傷營衛故身熱而又心屬火熱為火邪之象也脅下滿痛者脅下肝之位也其脈浮大而弦者浮大心脈本象肝邪犯之故現弦脈也何以知傷暑得之然當惡臭何以言之心主臭自入為焦臭入脾為香臭入肝為臊臭入腎為腐臭入肺為腥臭故知心病傷暑得之當惡臭其病身熱而煩心痛其脈浮大而散假令心病而傷暑暑之傷人心先得之蓋心主暑也此正經自病不涉他經然心屬火暑熱之邪傷之火邪化物五臭出焉暑邪自入本經其臭焦火之氣也入脾其臭香土之氣也入肝其臭臊木之氣也入腎其臭腐水之氣也入肺其臭腥金之氣也故心受暑邪發惡臭也其病身熱而煩者火鬱則瞀亂也心痛者邪在心則痛也其脈浮大而散者浮大心之本脈散則浮大而空虛無神心之病脈也本臟自病心主臭故專以臭推也何以知飲食勞倦得之然當喜苦味也虛為不欲食實為欲食何以言之脾主味入肝為酸入心為苦入肺為辛入腎為咸自入為甘故知脾邪入心為喜苦味也其病身熱而體重嗜臥四肢不收其脈浮大而緩假令心病而傷飲食勞倦者心主熱脾主勞倦今心病以飲食勞倦得之故知脾邪入心也喜苦味者脾主味心屬火火味苦從其性也虛則脾氣不能化谷實則能化谷故有能食不能食之分也若肝受飲食勞倦之病其味酸心受病其味苦肺受病其味辛腎受病其味鹹脾自受病其味甘其病身熱者心也體重脾也其脈浮大者心之本脈也緩脾之脈象也此節飲食勞倦獨有虛實之分者蓋即明正經虛又傷於飲食而為病較傷飲食而致病者有間也何以知傷寒得之然當譫言妄語何以言之肺主聲入肝為呼入心為言入脾為歌入腎為呻自入為哭故知肺邪入心為譫言妄語也其病身熱洒洒惡寒甚則喘咳其脈浮大而澀假令心病而傷寒者乃肺邪入心也肺主聲故譫言妄語也若寒邪入肝則呼肝在聲為呼也入心則多言言為心聲又在聲為笑也入脾則歌脾在聲為歌也入腎則呻腎在聲為呻也自入肺之本臟則哭肺在聲為哭也其病身熱惡寒者心火臟故身熱肺本寒臟故惡寒也甚則喘咳者肺主咳肺氣上逆則喘咳也其脈浮大心脈也澀肺之脈象也何以知中濕得之然當喜汗出不可止何以言之腎主液入肝為泣入心為汗入脾為涎入肺為涕自入為唾故知腎邪入心為汗出不可止也其病身熱而小腹痛足脛寒而逆其脈沉濡而大此五邪之法也假令心病而中濕者心主暑腎主濕今心病以傷濕得之故知腎邪入心也腎化五液腎為心邪故汗出不可止也濕邪入肝為泣肝主泣也入心為汗心主汗也入脾為涎脾主涎也入肺為涕肺主涕也自入腎之本臟則為唾腎主唾也其病身熱者心也小腹痛者腎之位也足脛寒而逆者足脛腎經所過之處故畏寒而逆冷濕性亦近寒也其脈沉濡而大者沉腎脈之象濡濕氣之候大則心脈之象也心脈浮大獨不言浮者沉則不能浮也夫法者舉一為例之法也五邪者五臟得五行之邪也欲知五邪之證必審肝病見於色心病見於臭脾病見於味肺病見於聲腎病見於液其脈以本臟之脈為主而兼受邪之脈也此以心一經為主病而以各證驗其所從來其義與十難診脈法同明乎此不特五臟互受五邪鑿然可曉即百病見證莫不皆可類測而為診脈辨證之法程也五十難五十難曰病有虛邪有實邪有賊邪有微邪有正邪何以別之然從後來者為虛邪從前來者為實邪從所不勝來者為賊邪從所勝來者為微邪自病者為正邪此承上文五臟五邪之病而辨其生克之義也病有虛邪者如心臟屬火其病邪從肝木傳來木生火則木位居火之後是生我者邪挾生氣而來雖進而易退故曰從後來者虛邪也病有實邪者如心屬火其病邪從脾土傳來火生土則土位居火之前是受我之氣者其力方旺還而相剋其勢必盛故從前來者實邪也病有賊邪者如心屬火其病邪從腎水傳來水剋火心受克而不能勝臟氣本已相制而邪氣挾其力而來殘削必甚故曰從所不勝來者賊邪也病有微邪者如心屬火其邪從肺金傳來火剋金金受克而火能勝臟氣既受制於我則邪氣亦不能深入故曰從所勝來者微邪也正邪者如心臟止有自感之邪而無他臟干克之邪者是也何以言之假令心病中風得之為虛邪傷暑得之為正邪飲食勞倦得之為實邪傷寒得之為微邪中濕得之為賊邪舉心為例以發明上文之義也中風肝木之邪也得之言因中風而心得病也肝邪乘心是從後來者故曰虛邪傷暑得之為心臟自病故曰正邪飲食勞倦得之脾邪乘心是前來者故曰實邪傷寒得之肺乘心從所勝來者故曰微邪中濕得之腎邪乘心從所不勝來者故曰賊邪餘臟可類推此病傳五臟之生克也五十一難五十一難曰病有欲得溫者有欲得寒者有欲得見人者有不欲得見人者而各不同病在何臟腑也然病欲得寒而欲得見人者病在腑也病欲得溫而不欲見人者病在臟也何以言之腑者陽也陽病欲得寒又欲見人臟者陰也陰病欲得溫又欲閉戶獨處惡聞人聲故以別知臟腑之病也素問金匱真言論曰腑者陽也臟者陰也腑為陽陽病則熱勝故飲食衣服居處皆欲就寒而遠熱也陽主動而散以應乎外故欲得見人也臟為陰陰病則寒勝故飲食衣服居處皆欲就溫而遠寒也陰主靜而藏以應乎內故閉戶獨處惡聞人聲也此統論臟腑陰陽大義故與陽明脈解篇陽明病惡人與火指一經熱甚而煩惋者有間也五十二難五十二難曰腑臟發病根本等不然不等也其不等奈何然臟病者止而不移其病不離其處腑病者彷彿賁響上下行流居處無常故以此知臟腑根本不同也臟為陰陰主靜故止而不移也腑為陽陽主動故上下流行也彷彿無形質也賁響動而有聲也居無常處者忽上忽下即流行之謂也臟病腑病其根本不同者如此五十三難五十三難曰經言七傳者死間臟者生何謂也然七傳者傳其所勝也間臟者傳其子也何以言之假令心病傳肺肺傳肝肝傳脾脾傳腎腎傳心一臟不再傷故言七傳者死也七傳者依序傳其所勝所克之臟也如心病傳肺是火剋金也肺又傳肝是金剋木也肝又傳脾是木剋土也脾又傳腎是土剋水也腎復傳心是水剋火也心又欲傳肺是七傳矣一臟不能再受邪傷則死矣呂廣以七當作次字之誤與下間字方相合其說亦通蓋心病六傳由腎至心心臟不能復傳至肺也其一臟不再傷者是指心之不任再傷於第七傳而死也此即素問標本病傳論諸病以次相傳者皆有死期不可刺之義間臟者傳其所生也假令心病傳脾脾傳肺肺傳腎腎傳肝肝傳心是子母相傳竟而復始如環之無端故曰生也間臟者間一臟傳其所生也如心欲傳肺而脾者肺之母心之子中間間此一臟不傳所克也假令心病傳脾是間肺所勝之臟為火生土也脾病傳肺是間腎所勝之臟為土生金也肺病傳腎是間肝所勝之臟為金生水也腎病傳肝是間心所勝之臟為水生木也肝病傳心是間脾所勝之臟為木生火也心病又復傳脾則病自已此子母相傳而生也五十四難五十四難曰臟病難冶腑病易治何謂也然臟病所以難治者傳其所勝也腑病易治者傳其子也與七傳間臟同法也臟病所以難治者傳其所勝也若傳其所生亦易治也腑病所以易治者傳其所生也若傳其所勝亦難治也蓋其義以臟病深腑病淺分其難易耳然亦不可拘故曰與七傳間臟同法也五十五難五十五難曰病有積有聚何以別之然積者陰氣也聚者陽氣也故陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成也積者陰氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是別知積聚也積者五臟所生臟屬陰陰邪漸積而成故曰積陰主靜故沉伏不離其處乃臟陰氣結為病而或兼乎血故其部上下左右其形大小長短皆可循而按之也聚者六腑所生腑屬陽陽邪漸聚而成故曰聚陽主動故浮動而無定處乃純乎氣凝滯而不散故其部無定位其體無定形而上下左右流行無常也此陰陽積聚之所由分與五十二難當是一章或前後錯簡耳五十六難五十六難曰五臟之積各有名乎以何月何日得之然肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆㾬瘧連歲不已以季夏戊己日得之何以言之肺病傳於肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故留結為積故知肥氣以季夏戊己日得之積蓄也言血氣不行積蓄為病亦由五邪相傳而成也肥氣者言其氣之肥盛也左脅為肝木左升之部如覆杯者本大末小肝木之象也頭足者一本二末木形歧出之義亦甚言其有形也咳逆者足厥陰之別脈貫膈上注於肺肝氣上衝於肺反乘所勝也㾬瘧即痎瘧間二日發者是也五臟皆有瘧在肝則為風瘧又瘧多發於少陽而厥陰於少陽為表裡也病邪入深連年不已然何以得之乃肺病傳肝傳其所勝也肝當傳脾脾土適旺於季夏土旺力能拒而不受邪當復反於肺而肝木又不能勝肺金故曰不肯受也邪因無道可行故留結於肝而成積矣季夏戊己日得之者季夏未土月也戊己土日也月日皆脾土極旺之時肝木不能剋制即於是月是日而得是積也可見虛則受邪旺則邪不得入今人徒事攻積大失經旨非其治矣此章唯出五積之名狀而不言諸聚者蓋聚無常處故無名狀可定也心之積名曰伏梁起臍上大如臂上至心下久不愈令人病煩心以秋庚辛日得之何以言之腎病傳心心當傳肺肺以秋適王王者不受邪心復欲還腎腎不肯受故留結為積故知伏梁以秋庚辛日得之伏梁者伏而不動橫亙如梁木然起臍上至心下者臍上至心下皆心之分部也煩心者火鬱則心煩也然何以得之乃腎病傳心傳其所勝也心當傳肺肺金當秋適旺金旺力能拒而不受邪應復反於腎而心火又不能勝腎水故曰不肯受也邪留結於心而成積以秋庚辛日得之者秋當申酉金月而庚辛金日也金旺之月日心火不能剋制即於是月是日而得是積也按靈樞邪氣臟腑病形篇曰心脈微緩為伏梁在心下上下行時唾血經筋篇曰手少陰之筋其病內急心承伏梁下為肘網其成伏梁吐膿血者死不治是靈樞兩章皆心病有餘之積雖未明言病狀其義則同若素問腹中論曰病有少腹上下左右皆有根病名伏梁里大膿血居腸胃之外不可治治之每切按之致死此下則因陰必下膿血上則迫胃脘生膈挾胃脘內癰此久病也難治居臍上為逆居臍下為從此病陽邪聚於血分致氣失輸轉之機非臟陰氣結之積也以其在少腹四旁太衝部分陽毒之邪聚而為膿為血下行必薄陰中便下膿血上行迫胃脘膈膜間而生內癰此論陽毒之伏梁也又曰人有身體髀股胻皆腫環臍而痛病名伏梁此風根也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也不可動動之為水溺澀之病此病風邪根聚於中故環臍而痛臍為人身之樞樞病則不能斡旋陰陽之氣故周身皆腫設妄攻風氣鼓動其水水溢於上則小便為之不利此論風毒之伏梁也是其名雖同其證其治則異若伏梁不辨乎風根其不見誚於雞峰難矣脾之積名曰痞氣在胃脘覆大如盤久不愈令人四肢不收發黃癉飲食不為肌膚以冬壬癸日得之何以言之肝病傳脾脾當傳腎腎以冬適王王者不受邪脾復欲還肝肝不肯受故留結為積故知痞氣以冬壬癸日得之痞者否也天地不交而為否言痞結而成積也脾位中央土之象也故積在胃脘覆大如盤睥主四肢邪氣壅聚正氣不運故四肢不收脾有濕滯則色徵於外故皮膚爪目皆黃而成癉但黃癉之因甚繁然皆不離乎脾與濕也脾主肌肉今脾有積不能布津液則所入飲食而不為肌膚也然何以得之乃肝病傳脾傳其所勝也脾當傳腎腎水當冬適旺水旺力能拒不受邪欲復反於肝而脾土又不能勝肝木故曰不肯受也邪留結於脾而成積以冬壬癸日得之者冬當亥子水月而壬癸水日也水旺之月日脾土不能剋制即於是月是日而得是積也肺之積名曰息賁在右脅下覆大如杯久不愈令人灑淅寒熱喘咳發肺壅以春甲乙日得之何以言之心病傳肺肺當傳肝肝以春適王王者不受邪肺復欲還心心不肯受故留結為積故知息賁以春甲乙日得之賁古通奔息賁者言氣息賁迫也右脅下為肺金右降之分部灑淅寒熱者肺主皮毛也壅癰古通肺病則喘咳甚則發為肺癰素問大奇論曰肺之壅喘而兩胠滿者是也然何以得之乃心病傳肺傳其所勝也肺當傳肝肝木當春適旺木旺力能拒而不受邪復欲反於心肺金又不能勝心火故曰不肯受也邪留結於肺而成積以春甲乙日得之者春當寅卯木月而甲乙木日也木旺之月日肺金不能剋制即於是月是日而得是積也按靈樞經筋篇曰手心主之筋其病當所過者支轉筋前及胸痛息賁此言手心主之筋循脅腹散胸中下結於胃脘之賁門間其病當筋之過接處為轉筋而前及胸痛散於胸中結於賁門故曰息賁又曰太陰之筋其病當所過者支轉筋痛甚則成息賁脅急吐血此言手太陰之筋散貫於賁門間其病當筋之所過者為支度轉筋而痛甚則成息賁脅急吐血蓋十二經筋合陰陽六氣氣逆則為喘急息奔血隨氣奔則為吐血也素問陰陽別論曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治此二陽者足陽明胃手陽明大腸也病發於心脾者其始必有得於隱曲之事於是思則氣結鬱而為火致損心營心營既損脾少生扶則健運失職飲食漸減胃陰益虧夫人身之精血全賴後天穀氣榮養今谷津日竭鬱火內焚是以男子少精女子不月血液日見乾枯而大腸之傳道亦病胃燥生火火盛風生則消爍肌肉水精耗盡金失其源腎氣不納逆傳於肺致有喘息奔迫不治之證此三者似是而實非不容不辨奇病論帝曰病脅滿氣逆二三歲不已是為何病岐伯曰病名息積此不妨於食不可灸刺積為導引服藥藥不能獨治也此與本篇差同藥難獨治必兼導引之功又不可不知也腎之積名曰賁豚發於少腹上至心下若豚狀或上或下無時久不愈令人喘逆骨痿少氣以夏丙丁日得之何以言之脾病傳腎腎當傳心心以夏適王王者不受邪腎復欲還脾脾不肯受故留結為積故知賁豚以夏丙丁日得之此是五積之要法也賁豚者其狀如豚之奔突以豚性躁動故也發於少腹上至心下者少腹腎之分部由少腹上衝至心下而止上下無定時也喘逆者足少陰之支脈從肺出絡心注胸中腎氣上衝故也腎主骨故骨痿腎不能納氣故少氣也然何以得之乃脾病傳腎傳其所勝也腎當傳心心火當夏適旺火旺力能拒而不受邪當復反於脾而腎水又不能勝脾土故曰不肯受也邪留結於腎而成積以夏丙丁日得之者夏當己午火月而丙丁火日也火旺之月日腎水不能剋制即於是月是日而得是積也按傷寒論太陽篇曰發汗後臍下悸者欲作奔豚此因發汗虛其心液臍下悸者欲動而上奔也故用茯苓桂枝甘草大棗湯以保心而制水也又曰發汗後燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心此言發汗既傷其血液復用燒針令其汗是又傷其血脈矣血脈受傷則心氣虛加以寒凌心火故核起而赤心虛氣浮則腎氣乘而上奔故灸核上各一壯以通泄其經氣更與桂枝加桂湯散寒邪以補心氣也此兩節論外感誤治之證與積久而成者有間金匱要略師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之此言肝膽因驚駭為病木者水之子也子病發驚母亦隨而上奔也餘三病亦因驚發而得非奔豚不為詳解又師曰奔豚病從少腹上衝咽喉發作欲死復還止皆從驚恐得之此因驚則傷心恐則傷腎心腎水火之氣虛而不能互相交感則腎之虛邪反乘心之虛而上奔矣故總其治曰奔豚氣上衝胸腹痛往來寒熱奔豚湯主之觀金匱兩條與本經之義相近然同因驚得而有肝膽心腎之異況外感積聚之不同是受病之因傳變之理不可不察豈獨奔豚一證為然五十七難五十七難曰泄凡有幾皆有名不然泄凡有五其名不同有胃泄有脾泄有大腸泄有小腸泄有大瘕泄名曰後重泄利也其證有五故有五泄之名後重者專指大瘕泄而言蓋腎邪下結氣墜不升故也此五泄之目下文詳之胃泄者飲食不化色黃胃泄者甲木之克戊土也胃主納穀風木之邪乘之胃腑郁迫水穀不化必脈弦腸鳴黃者胃土之色經曰春傷於風夏生飧泄者是也脾泄者腹脹滿泄注食即嘔吐逆脾泄者脾土濕寒不能蒸水化氣故水穀並下脹滿泄注也食即嘔吐者脾弱下陷則胃逆也必所下多水脈緩腹不痛經曰濕甚則濡泄者是也大腸泄者食已窘迫大便色白腸鳴切痛大腸泄者腸虛氣不能攝故胃方實即迫注於下窘迫不及少待也色白者大腸屬庚金白金之色也腸鳴切痛者氣不和則攻衝故鳴而痛也經曰清氣在下則生飧泄者是也小腸泄者溲而便膿血少腹痛小腸泄者小腸屬丙火不化寒水鬱於濕土之中內熱淫蒸膿血腐化又小腸與心為表裡心主血蓋氣不相攝而便膿血小便亦不禁也小腸之氣鬱沖下達膀胱膀胱近少腹故少腹痛也此即血痢之類耳大瘕泄者裡急後重數至圊而不能便莖中痛此五泄之要法也大瘕泄者邪氣結於下成癥瘕而不散也裡急後重者腸氣急迫肛門重墜也數至圊而不能便者皆癥結不散故欲便而不爽也莖中痛者乃濕鬱為熱大便氣不能達則移於小便也此即古之滯下今名痢疾者是也五十八難五十八難曰傷寒有幾其脈有變不然傷寒有五有中風有傷寒有濕溫有熱病有溫病其所苦各不同素問於風論熱論言之甚詳豈得獨遺寒論一門而熱論首言今夫熱病者皆傷寒之類也既云類傷寒則有傷寒專論可知惜乎第七一卷亡於兵火亦以見古醫經以傷寒為外感之統名越人恐後世寒溫莫辨故作傷寒有五之論以分別其脈證滑氏以變當作辨是矣中風之脈陽浮而滑陰濡而弱中風者風寒直傷肌腠也風無定體偏寒即從寒化風寒之邪直入肌肉而傷其營營血傷則血脈弱而其脈動必緩陽寸浮者乃衛陽外越也陰尺弱者乃營血受傷也然必見熱自發汗自出惡寒惡風鼻鳴乾嘔等證方是風寒中肌腠之的證的脈也謂風傷衛寒傷營者非也其實寒傷衛風傷營耳或問許學士發微論言風傷衛寒傷營成無己以降俱宗之而子獨謂寒傷衛風傷營者何耶曰寒者太陽之本氣也太陽之陽發於至陰而充於皮毛是皮毛一層衛所居也衛陽虛招外寒致皮毛閉塞而無汗故曰寒傷衛也風在六氣屬厥陰肝木厥陰主營血血虛則招外風夫營血雖與衛氣偕行而究之皮毛一層為衛所司肌肉一層為營所宅風入肌肉中而營不守衛是以衛氣泄而自汗出故曰風傷營也況仲景無汗用麻黃明是治衛氣之藥有汗用桂枝明是和營血之藥安得淆混哉或問麻黃治寒傷衛桂枝治風傷營已明其義何以仲景辨脈篇曰寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨節煩疼當發其汗也此非風傷衛寒傷營之明證耶曰此章本內經寒傷形熱傷氣陽邪傷陽陰邪傷陰統該陰陽二氣而言非謂桂枝主風傷衛麻黃主寒傷營也讀書貴乎融貫不可拘泥此所謂風傷營者言風寒之邪直中營中逼其衛氣外泄風寒則傷營也若風溫之邪首先犯衛衛主氣蓋熱則傷氣矣所謂寒傷衛者非不傷營蓋寒閉衛外之氣則無汗然亦由斂其營血而然此內經熱傷氣寒傷形之旨也設寒熱莫辨執風為陽邪而傷衛一語以溫里和營之桂枝湯治風溫則謬之甚矣可不慎哉按此論中風為風寒入肌腠外感也若金匱所論中風有中腑中臟中血脈之分與此不同不可誤也中腑之脈多浮五色必顯於面惡風惡寒拘急不仁或中身之前或中身之後或中身之側其病在表多著四肢雖見半身不遂手足不隨痰涎壅盛氣喘如雷然目猶能視口猶能言且外有六經形證也中臟其病在裡多滯九竅故唇緩二便閉者脾中也不能言者心中也耳聾者腎中也鼻塞者肺中也目瞀者肝中也中血脈者病在半表半裡外無六經之證內無二便之閉但見口眼喎斜半身作痛而已至若體縱不收耳聾無聞目瞀不見口開眼合撒手遺溺失音鼾睡乃本實先撥陰陽樞紐不交為難治之脫證矣此名同而證異者不可不辨也傷寒之脈陰陽俱盛而緊澀傷寒者寒傷太陽之膚表也華元化曰傷寒一日在皮二日在膚三日在肌四日在胸五日在腹六日入胃是風寒初感之邪由皮膚毛竅而入抑遏營氣束於經脈故脈陰陽俱浮盛緊澀而無汗也然必見頭項強痛發熱身疼腰痛骨節疼痛惡風惡寒而喘諸形證方是寒傷膚表之的證的脈也夫太陽膀胱中所化之氣由氣海循衝任過膈入肺出之於鼻為呼出氣膀胱所化之氣又有內從三焦脂膜出諸氣街循肌肉達於皮毛為衛外之氣人知口鼻出氣而不知周身毛竅亦無不出氣鼻氣一出則周身毛竅之氣皆張鼻氣一入則周身毛竅皆斂若毛竅之氣不得外出則反入於內壅塞於肺上出口鼻而為喘故寒傷膚表皮毛之衛氣不得外出則返於內而上壅為喘皮毛之內是肌肉寒邪內犯肌肉故周身疼痛邪犯太陽之經脈故頭項腰痛人身皮內之肌俗名肥肉肥肉內夾縫中有紋理名曰腠理又內為瘦肉瘦肉兩頭即生筋筋與瘦肉為一體皆附骨之物也故邪犯瘦肉則入筋而骨節疼痛內經曰諸筋皆屬於節者是也但發其表則寒邪由內及外從毛竅而汗解矣故仲景以麻黃湯治之濕溫之脈陽濡而弱陰小而急濕溫者暑與濕交合之溫病也其因有三先受暑後受濕熱為濕遏者則其脈陽濡而弱陰小而急濡弱見於陽部濕氣搏暑也小急見於陰部暑氣蒸濕也此本經所謂之濕溫也若其人常傷於濕因而中暍濕熱相搏則發為濕溫證見兩脛冷腹滿叉胸頭目痛苦妄言治在足太陰不可發汗此叔和脈經所謂之濕溫也有觸時令鬱蒸之氣者春分後秋分前少陰君火少陽相火太陰濕土三氣合行其事是天本熱也而益以日之暑日本烈也而載以地之濕三氣交動時分時合其分也風動於中勝濕解蒸不覺其苦其合也天之熱氣下降地之濕氣上騰人在氣交中受其炎蒸無隙可避口鼻受邪著於脾胃脈濡弱舌苔白或絳底嘔逆口乾而不能湯飲胸次軟而滿悶身潮熱汗出稍涼少頃又熱此喻西昌所謂三氣合而為病之濕溫也然其因雖有不同而其病多屬足陽明足太陰蓋濕土之邪同氣相感也病在二經之表多兼手少陽三焦病在二經之裡多兼手厥陰包絡以少陽厥陰同司相火故也識此庶幾知所從治矣熱病之脈陰陽俱浮浮之而滑沉之散澀熱病者溫熱病概伏氣外感而言也脈陰陽俱浮者金匱要略云浮脈則熱陽氣盛故也浮之而滑沉之散澀者滑則陽盛於外澀則陰衰於內也夫溫者熱之漸熱者溫之甚其實一而已矣然內外微甚間不可不辨也伏氣溫病者乃冬日之陽熱被嚴寒殺厲之氣所折伏藏於肌骨之間至春感春陽之氣而觸發熱邪內發陰液已傷即仲景傷寒論所謂發熱而渴不惡寒之溫病是也外感風溫者或冬暖不藏或春日氣溫其風偏熱即從熱化其證脈浮惡風發熱咳嗽者是也若內有伏氣外為風熱逗引兩陽相合衛氣先傷誤以辛溫表散致成灼熱身重多眠鼻鼾自汗直視失溲瘛瘲諸逆證者即傷寒論所謂誤汗被下被火一逆尚引日再逆促命期之風溫是外感而兼伏氣者也王安道曰溫熱病之脈多在肌肉之分而不甚浮且右手反盛於左手者良由怫熱在內也或左手盛或浮者必有重感之風寒否則非溫病熱病是暴感風寒之病耳此溫熱病脈一定不移之論也何以言之素問陰陽應象大論曰左右者陰陽之道路也水火者陰陽之徵兆也血陰也水亦陰也氣陽也火亦陽也以脈體言左屬血陰也右屬氣陽也此即血氣之左右水火之徵兆也風熱屬陽邪先傷無形之氣風寒乃陰邪首犯有形之血亦即內經寒傷形熱傷氣之旨也識此當知風熱傷衛風寒傷營可不致執許學士風傷衛一語而以桂枝治溫熱遺人夭札矣按伏氣之理未有闡發其義者請試明之素問陰陽應象大論曰重陰必陽重陽必陰故曰冬傷於寒春必病溫春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽此章經文尤重在重陰必陽重陽必陰兩句亦以見天地陰陽之邪隨人身之氣化感召而非寒能變熱熱可變寒也其冬傷於寒春必病溫者冬至一陽漸生人身之陽氣內盛冬日嚴寒殺厲之氣時中於人入於膚腠其內伏之陽熱被寒毒所折深浹於骨髓之間至春陽氣盛長伏邪淺者亦可隨春陽之氣漸散伏邪深者或遇風寒所遏或因嗜欲所傷內伏鬱結之陽氣為外邪觸發伏氣既得發泄遇天氣之陽熱兩熱相干發為溫病溫之甚者即為熱病此重陰必陽也夏傷於暑秋必痎瘧者夏至一陰漸生人身之陰氣內盛暑乃陽邪陽氣外熾則裡氣虛寒加以貪涼飲冷損其真陽至秋陰氣盛長之時內伏陰邪欲出外襲陽暑欲入陰陽相持故發為往來寒熱之痎瘧此重陽必陰也春傷於風夏生飧泄秋傷於濕冬生咳嗽者乃陰陽上下之相乘也夫喉主天氣咽主地氣陽受風氣陰受濕氣傷於風者上先受之傷於濕者下先受之陽病者上行極而下是以春傷於風者夏生飧泄風為陽邪泄乃陰病此重陽必陰也陰病者下行極而上是以秋傷於濕上逆而咳濕乃陰邪咳為陽病此重陰必陽也然邪之所湊其氣必虛人身之神氣血脈皆生於精能藏其精則血氣內固外邪何由內侵金匱真言論曰精者身之本也故藏於精者春不病溫攝生者可不慎諸溫病之脈行在諸經不知何經之動也各隨其經所在而取之溫病者瘟疫病也古無瘟字溫與瘟通故也疫者役也猶徭役之謂多見於兵燹之餘或水旱偏災之後大則一城小則一鎮一村遍相傳染者是也乃天地沴厲之氣不可以常理測不可以常法治也故素問遺篇有五疫之刺龐安常有青筋索赤脈啘黃肉隨白氣貍黑骨溫五色之治疫之為病偏溫偏熱者多偏寒者少然間亦有之如病源所載從春分以後秋分節前天有暴寒皆為時行寒疫也寒疫初病寒熱無汗面赤頭痛項強蓋得之毛竅開而寒氣閉之也與傷寒異處惟傳染耳其證多見於金水之年是金水不能斂藏人物應之而為寒疫也若東坡治疫之聖散子又寒而兼乎濕者也近世吳又可之論疫乃溫熱夾濕者故其氣臭如屍色蒸晦垢舌本深絳苔如積粉神情昏擾而驚悸脈右盛而至數模糊皆濕熱相搏之徵故宜達原飲以達募原之伏邪也至余師愚之清瘟敗毒散重用石膏又專治暑熱之成疫者也越人早鑑於此故曰溫病之脈行在諸經不知何經之動也各隨其經之所在而取之其旨深矣若黃坤載以素問熱論之一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰經隨日傳六日而盡須逐日診之難以預定為解不知傳經者乃正氣以次相傳七日來復周而復始一定不移非病氣之傳也病氣之傳本太陽不解或入於陽或入於陰不拘時日無分次第如傳於陽明則見陽明證傳於少陽則見少陽證傳三陰則見三陰證故傷寒論曰傷寒二三日陽明少陽證不見者為不傳也況病邪隨經氣之虛而傳陷中風傷寒熱病皆然何以越人於各證之下皆有專脈獨於溫病而云不知何經之動各隨所在而取之分明指天地沴厲之氣不可以常理測治而言何黃氏之不察妄議謬之甚矣傷寒有汗出而愈下之而死者有汗出而死下之而愈者何也然陽虛陰盛汗出而愈下之即死陽盛陰虛汗出而死下之而愈傷寒為此五病之通稱但傷寒有汗出而愈下之則死者有下之而愈汗之則死者其故何歟蓋寒邪外襲為陰盛可汗而不可下熱邪內熾為陽盛可下而不可汗王叔和傷寒序例曰桂枝下咽陽盛則斃承氣入胃陰盛以亡即此義也寒熱之病候之如何也然皮寒熱者皮不可近席毛髮焦鼻槁不得汗肌寒熱者皮膚痛唇舌槁無汗骨寒熱者病無所安汗注不休齒本槁痛寒熱病候之如何者言忽寒忽熱之病當候病之所在也皮寒熱者言寒熱在皮邪之中人最淺者肺主皮毛開竅於鼻故邪在皮毛則皮不能著物毛髮焦乾而鼻枯槁不澤也不得汗營衛不和也肌寒熱者皮內即肌肉肌肉之邪由皮膚而入故皮膚痛也脾主肌肉開竅於口故肌有邪則唇舌皆受病也骨寒熱者肌肉之內骨也骨受邪其病最深故一身之中無所得安也腎主骨又主液齒為骨之餘故骨病則腎液泄而為汗齒枯槁而痛也按此節乃靈樞寒熱篇文而與以上五種傷寒有間然皆經氣之為病宜取三陽少陰之絡以去邪雖與傷寒各異而皮膚肌肉骨髓之層次經氣則一是越人列此一節於五種傷寒之後者正示人以內傷雜病與外感之形證不同不可誤治耳五十九難五十九難曰狂癲之病何以別之然狂疾之始發少臥而不飢自高賢也自辨智也自貴倨也妄笑好歌樂妄行不休是也癲疾始發意不樂直視僵仆其脈三部陰陽俱盛是也狂病屬陽始發之時陽氣盛不入於陰故少臥陽氣並於上故不飢其自高賢自辨智自貴倨皆狂之意也妄笑好歌妄行皆狂之態也病發於陽陽性動故其狀皆有餘即前二十難所謂重陽者狂是也癲病屬陰始發之時意不樂癲之意也直視僵仆癲之態也病發於陰陰性靜故其狀皆不足即二十難所謂重陰者癲是也脈三部陰陽俱盛者是總上二者而言謂發於陽為狂則三部陽脈俱盛發於陰為癲則三部陰脈俱盛也按素問病能論帝曰有病怒狂者此病安生岐伯曰生於陽也帝曰陽何以使人狂岐伯曰陽氣者因暴折而難決故善怒也病名曰陽厥帝曰何以知之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也帝曰治之奈何岐伯曰奪其食即已使之服以生鐵洛為飲夫生鐵洛者下氣疾也此總論狂病屬於陽氣盛陽氣宜於升達若折抑之則病其來太陽少陽之脈動之不甚者而動且大疾則陽明之脈常動者其動甚可知為狂病將發之候先當奪其食使胃火弱而氣衰庶幾陽動息而病可愈甚則服以鐵洛飲下氣開結而平木火之邪也靈樞癲狂篇曰狂始生先自悲也喜忘苦怒善恐者得之憂飢此言陰虛則陽盛以致病狂也又狂始發少臥不飢自高賢也自辨智也自尊貴也善罵詈日夜不休者此心氣之實狂也又狂言驚善笑好歌樂妄行不休者得之大恐此言腎病上傳於心而為心氣之實狂以大恐則傷腎也又狂目妄見耳妄聞善呼者少氣之所生也此因腎氣少而致心氣虛狂也又狂者多食善見鬼神善笑而不發於外者得之有所大喜此言喜傷心志而為虛狂也又狂而新發未應如此者先取肝經之曲泉左右動脈及甚者見血有頃已不已灸骨骶二十壯此分論狂病虛實治未發先清泄木氣而不令及於心神也素問通評虛實論帝曰癲疾何如岐伯曰脈搏大滑久自已脈小堅急死不治曰癲疾之脈虛實何如曰虛則可治實則死此總論癲疾屬於陰氣盛陰盛則陽虛故其脈搏指而大滑心肝之陽未衰有來復之象故久而自已若小堅急純陰無陽則死不治脈虛者邪亦虛脈實者邪亦實實即堅急之意故亦主死也靈樞癲狂篇曰癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之於顏此言厥氣上乘於天氣及太陽君火也夫癲乃陰陽之氣先厥於下後上逆於巔而為病當候之於顏面氣色也又癲疾始作引口啼呼喘悸者此言太陽主開陽明主闔乃厥氣上乘致開闔不清而為病也又癲疾始作先反僵因而脊痛者此厥氣逆於寒水之太陽及寒氣乘於地中也又治癲疾者常與之居察其所當取之處病至視其有過者瀉之置其血於瓠壺之中至其發時血獨動矣不動灸骶骨二十壯此言治癲疾當分天地水火之氣而治之太陽之火日也隨天氣而日繞地一周動而不息者也地水者靜而不動者也常與病居察其病在手足何經其法致其血於瓠壺中發時氣相感則血動是感天氣太陽之運動也當候之手太陽陽明太陰者是也不動者病陷於地水之中當候之足太陽陽明太陰者是也更宜灸骶骨二十壯若不圖之於早病成則難治故下經之骨癲疾筋癲疾脈癲疾多雲不治也若夫癇證素問奇病論帝曰人生而有病癲疾者病名曰何安所得之岐伯曰病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為癲疾也此論生而病癲癇為先天所受之病孕婦受驚精氣上而不下精與驚氣並居而為病故曰胎病也然亦有不從母腹中得之若卒然聞驚而得者蓋驚則神出舍空痰涎乘間而歸之也但癇證與癲厥異者僕時口作六畜聲將醒時吐涎沫耳更有血迷似癲者婦人月水崩漏過多血氣迷心或產後惡露上衝而語言錯亂神志不寧者血虛神耗也又有心風似癲者精神恍惚喜怒言語或時錯亂有癲之意不如癲者之甚皆痰氣為病不可不辨也六十難六十難曰頭心之病有厥痛有真痛何謂也然手三陽之脈受風寒伏留而不去者則名厥頭痛厥逆也言氣逆而痛也厥痛厥頭痛厥心痛也真痛真頭痛真心痛也手三陽之脈為風寒留滯而不行則壅逆而衝於頭故名厥頭痛也足三陽之脈風寒留滯亦作頭痛今不言者省文也入連在腦者名真頭痛真頭痛不在經而入連於腦故痛甚腦盡痛手足寒至節死不治蓋腦為髓海真氣之所聚卒不受邪受邪則死矣按素問奇病論帝曰人有病頭痛以數歲不已此安得之名為何病岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛病名曰厥逆此因寒邪入髓則上入頭腦而為痛其邪入深故數歲不已也若靈樞厥病篇所載厥頭痛面若腫起而煩心者陽明之氣上逆而為痛也又頭脈痛心悲善泣者厥陰之氣上逆而為痛也又貞貞頭重而痛者少陰之氣上逆而為痛也又項先痛腰脊為應者太陽之氣上逆而為痛也又頭痛甚耳前後脈湧有熱者少陽之氣上逆而為痛也又真頭痛頭痛甚腦盡痛手足寒至節死不治此非六氣之厥乃客邪犯腦故頭痛甚腦盡痛蓋頭為諸陽之首腦為精水之海手足寒至節此真氣為邪所傷故死不治也更有擊墮而為痛者大痹而為痛者寒氣傷營而為偏痛者是經論頭痛者如此不獨手三陽為病也其五臟氣相干名厥心痛諸經絡皆屬於心蓋心主百脈其營血由心而通於十二經絡也若一經有病其脈逆行逆則乘心乘心則心痛故曰厥心痛是五臟氣衝逆致痛非心家自病也其痛甚但在心手足青者即名真心痛其真心痛者旦發夕死夕發旦死心為臟腑之大主精神之所舍其臟堅固邪不能客客之則傷心心傷則神去神去則死矣真心痛其痛甚但在心而無別臟相干也手足青者寒邪犯君火之位血色變也旦發夕死夕發旦死者心不受邪也真頭痛亦然蓋腦為人身之主宰亦不受邪故滑氏言其真心痛者真字下欠一頭字是矣按靈樞厥病篇曰厥心痛與背相控善瘛如從後觸其心傴僂者腎心痛也又腹脹胸滿心尤痛甚者胃心痛也又痛如以錐針刺其心心痛甚者脾心痛也又色蒼蒼如死狀終日不得太息者肝心痛也又臥若徒居心痛間動作痛益甚色不變者肺心痛也此別臟腑相干之痛也又真心痛手足青至節心痛甚旦發夕死夕發旦死此傷其臟真而為真心痛也六十一難六十一難曰經言望而知之謂之神聞而知之謂之聖問而知之謂之工切脈而知之謂之巧何謂也望謂望病人五臟之色見於面者各有分部以應相生相剋之候也聞謂聞病人之聲音以察病之所在也問謂問病人之所患及其愛憎喜怒以求病之原也切謂切病人之脈而得病出何臟何腑也神神化不測之謂聖至於至極之謂工專精之謂巧心智靈變之謂此與靈樞邪氣臟腑病形篇微有不同經言或別有所本也然望而知之者望見其五色以知其病望而知之者望其資稟色澤間之神氣靈樞所謂粗守形上守神者是也然人之神氣在有意無意之間流露最真醫者清心凝神一會即覺不宜過泥泥則私意一起醫者與病者神氣相混反覺疑似難以捉摸此又以神會神之妙理也神氣云何有光有體是也光者外面明朗體者裡面潤澤光無形主陽主氣體有象主陰主血氣血無乖陰陽不爭自然光體俱備矣素問五臟生成篇曰五臟之氣故色見青如草茲者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也夫五色乾枯以氣血俱亡無光無體神氣已去者也故主死又青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也是以氣血未傷有光有體不能內含而亦不外露者也故雖病而主生又生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也夫平人五臟既和其色稟胃氣而出於皮毛之間胃氣色黃皮毛色白精氣內含寶光外發既不浮露又不混蒙故曰如縞裹也觀內經論色分死病平三等雖未明言神氣而神氣即寓其中然五色內應五臟此道其常而病則有變甚有五色不應五臟者此又變中之變也若能察神氣因其常而識其變則於望色之道得其要領矣聞而知之者聞其五音以別其病聞而知之者聞其音聲分別清濁以察其病也土者其數五五者音也故音聲發於脾土而響於肺金也在心主言心開竅於舌舌者音聲之機也肝主語肝循喉嚨入頏顙喉嚨者氣之所以上下者也頏顙者分氣之所泄也肝心氣和而後言語清亮也然又從腎間動氣之所發故腎氣短促上氣不能接下氣矣是以發言歌詠出於五臟神之五志故有音聲語言不清者當責之心肝能語言而無音聲者當責之脾肺能言語有音聲而氣不接續者當責之兩腎此音聲之原委也若經以五音配五臟肝音角其聲呼心音徵其聲笑脾音宮其聲歌肺音商其聲哭腎音羽其聲呻若明其原委辨其清濁分其陰陽審其虛實以察病情於聞聲一法庶乎近矣問而知之者問其所欲五味以知其病所起所在也問而知之者問察其原委也夫工於問者非徒問其證殆欲即其證以求其病因耳脫營失精可於貴賤貧富間問之更當次第問其人平昔有無宿疾有無恚怒憂思食喜淡喜濃喜燥喜潤嗜茶嗜酒再問其病初起何因前見何證後變何證惡寒惡熱孰重孰輕有汗無汗汗多汗少汗起何處汗止何處頭痛身痛痛在何時痛在何處口淡口苦渴與不渴思飲不思飲飲多飲少喜熱喜涼思食不思食能食不能食食多食少化速化遲胸心脅腹有無脹痛二便通澀大便為燥為溏小便為清為濁色黃色淡婦人則問其有無胎產月事先期後期有無脹痛可有帶下是赤是白或多或少種種詳詰就其見證審其病因方得治病求本之旨也切脈而知之者診其寸口視其虛實以知其病在何臟腑也切而知之者診其寸口以知其病也非內經遍診動脈之法也或問內經遍診動脈只設浮沉緩急大小滑澀之八脈特於對待微甚懸絕著其相去三等而脈之情變已精後世繁為二十九脈愈求精而脈愈晦者因獨取寸口之誤耶曰非也張氏云後世知識脈難而不知古人審脈之更難也所謂識脈者浮不沉也沉不浮也遲不及也數太過也虛不實也實不虛也滑不澀也澀不滑也長不短也短不長也大不小也小不大也緩不逮也弱不盛也伏不見也軟無力也微不顯也散不聚也洪洪大也細微細也代更代也牢堅牢也動者滑大於關上也弦者狀如弓弦按之不移也緊者如轉索無常也芤者浮大而按之中空也革者中空而外堅也結者緩而有止也促者數而有止以對待之法識之猶易分別於指下所謂審脈者體認所見之脈何因所主之病何證以心印之而後得也仲景平脈篇曰浮為在表沉為在裡數為在腑遲為在臟又曰浮則為風浮則為熱浮為氣實浮為氣虛浮則無血浮則為虛是將為外感乎為內傷乎為氣乎為血乎為實乎為虛乎是必審其證之表裡陰陽寒熱虛實病之久病新病脈之有力無力而斷之以意然後參之以望聞問必四診咸備庶幾可保萬全故曰審脈之更難也可不慎歟經言以外知之曰聖以內知之曰神此之謂也視色聞聲者以外知之也故曰聖問因切脈者以內知之也故曰神此總結上文四診之意也上第四卷四十八難至六十一難論病
