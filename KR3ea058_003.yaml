body:
  text: 卷三三十難三十難曰榮氣之行常與衛氣相隨不然經言人受氣於谷谷入於胃乃傳於五臟六腑五臟六腑皆受於氣其清者為榮濁者為衛榮行脈中衛行脈外榮周不息五十而復大會陰陽相貫如環之無端故知榮衛相隨也榮衛循行之義已詳一難中此言榮衛相隨不息之原起於胃之穀氣其清者為榮即穀味之精乃陽中之陰也血為榮行於脈中其濁者為衛即穀味之氣乃陰中之陽即所謂陽明悍氣也化氣為衛以衛護於脈外素問痹論云營者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也亦即此義但此節乃靈樞營衛生會篇中語惟靈樞作谷入於胃以傳於肺五臟六腑皆以受氣為少殊耳然胃中水穀之精為微絲液管吸至頸會管過肺入心化赤為血以榮五臟六腑經脈之中刪去以傳於肺四字便乖臟腑傳道之義關係匪輕不可缺也三十一難三十一難曰三焦者何稟何生何始何終其治常當何許可曉以不然三焦者水穀之道路氣之所終始也上焦者在心下下膈在胃上口主內而不出其治在膻中玉堂下一寸六分直兩乳間陷者是中焦者在胃中脘不上不下主腐熟水穀其治在臍旁下焦者當膀胱上口主分別清濁主出而不內以傳道也其治在臍下一寸故名曰三焦其府在氣街前節舉五臟六腑稟水穀榮衛之氣而相資養為論臟腑之首條此因三焦之氣化論其發用之理也夫三焦者稟元氣以資始合胃氣以資生上達胸中而為用往來通貫宣布無窮造化出納作水穀之道路為氣之所終始也上焦在膈膜之下者以其上層與膈膜下層黏屬也其氣自下而上散於胸中分布薰蒸於皮膚腠理故在胃上口主納而不令出其治在膻中穴屬任脈在玉堂下同身寸之一寸六分陷者中任脈氣所發也中焦在胃中脘以其包肝裹胃也其治在臍旁之天樞胃脈之穴也其用在胃之中脘中脘者乃十二經所起所會陰陽肉完之處故曰脘也下焦者當膀胱上口乃闌門之分蓋由此清者入於膀胱而為氣為溺濁者入於大腸而為滓為穢故主出而不納以傳道也其治在臍下任脈之陰交穴素問靈蘭祕典論曰三焦者決瀆之官水道出焉即指此也其所在氣街者氣街在毛際兩旁足陽明經穴乃三焦之根原氣所之處即由腎系所生之脂膜也夫三焦屬相火之宅火之性自下而上故素問經脈別論曰飲入於胃遊溢精氣上輸於脾此指中焦也脾氣散精上歸於肺此指上焦也通調水道下輸膀胱此指下焦也然論上中下三焦之氣何以獨重乎飲不知氣乃水之所化也膀胱之水借吸入之天陽引心火至下焦薰蒸化而為氣以上達為津為液為汗此火交於水化氣之理即乾陽入坤陰隨陽氣上騰而為云為雨之義也若夫三焦之形質詳見於二十五難可參互觀之三十二難三十二難曰五臟俱等而心肺獨在膈上者何也然心者血肺者氣血為榮氣為衛相隨上下謂之榮衛通行經絡榮周於外故令心肺在膈上也素問五臟生成篇曰諸血皆屬於心諸氣皆屬於肺是心主血血為榮肺主氣氣為衛血流據氣氣動依血營衛相隨通行經絡周於身外猶天道之運於上故居膈上也膈膈膜也凡人心肺之下諸臟之上有膈膜一層薄如細網隨呼吸以升降遮隔濁氣不使上薰於心肺也首節明血氣之用此節言血氣之體以見人身臟腑皆賴血氣之榮養也三十三難三十三難曰肝青象木肺白象金肝得水而沉木得水而浮肺得水而浮金得水而沉其意何也然肝者非為純木也乙角也庚之柔大言陰與陽小言夫與婦釋其微陽而吸其微陰之氣其意樂金又行陰道多故令肝得水而沉也肺者非為純金也辛商也丙之柔大言陰與陽小言夫與婦釋其微陰婚而就火其意樂火又行陽道多故令肺得水而浮也肺熟而復沉肝熟而復浮者何也故知辛當歸庚乙當歸甲也此言陰陽互根五行化合之理人身不外乎陰陽交則生不交則病離則死越人特舉肝肺而言者肝藏魂肺藏魄魂魄為一身陰陽之主宰也以十干合臟腑甲陽木應膽乙陰木應肝丙陽火應小腸丁陰火應心戊陽土應胃己陰土應脾庚陽金應大腸辛陰金應肺壬陽水應膀胱癸陰水應腎若以五音配五行宮土商金角木徵火羽水各因十干之陰陽而分太少也肝屬乙木得水當浮何以反沉然肝雖乙木乙與庚合庚為陽金金性本沉婦當從夫其意樂金而失木之本性故得水反沉也肺屬辛金金得水當沉何以反浮然肺雖辛金辛與丙合丙為陽火火性炎上婦當從夫其意樂火而失金之本性故得水反浮也生則生氣旺故能化合熟則生氣盡故不能化合所以肝熟而復浮肺熟而復沉各歸其本性也大而言之即天地之陰陽小而言之即人倫之夫婦其理一也夫肝屬足厥陰經位於膈下故行陰道多也肺屬手太陰經位於膈上故行陽道多也今舉肝肺類推則臟腑陰陽之化合從可會通矣按十干者甲乙丙丁戊己庚辛壬癸也五行化合者甲己化土乙庚化金丙辛化水丁壬化木戊癸化火也化合之義未有明其所以然者請詳言之術士僉謂逢龍則化蓋甲己之年首丙寅月次丁卯次戊辰辰為龍龍善變化戊為陽土此一年之運皆當屬土汪雙池非之言寅月三陽出於地上是地氣始升也化氣當自寅月始如甲己之年首丙寅月丙火生土故甲己化土化氣者化其所生之氣也余可類推斯説頗為近理然於化合之義究不能明或謂經曰丹天之氣經於牛女戊分黅天之氣經於心尾己分蒼天之氣經於危室柳鬼素天之氣經於亢氐畢昂玄天之氣經於張翼婁胃其戊己分者則奎壁角軫也五天五行之守氣各有所橫以加於宿度臨於十干之上如黅氣於心尾己分心尾當甲角軫當己故土位甲己也以下皆然此言似近理而實非蓋天動而虛其氣圓通而初無定氣其臨御五行自有本然當然之則而初非有守氣以期之也況所謂化氣者逢合則化不逢合則不化五天之氣雖應五行而於化合之理無所取義未可執也蕭吉五行大義引季氏陰説曰木八畏庚九故以妹乙妻庚庚氣在秋和以木氣是以薺麥當秋而生所謂妻來之義火七畏壬六故以妹丁妻壬壬得火熱氣故款冬當冬而華金九畏丙七故以妹辛妻丙丙得金氣故首夏靡草薺麥死故夏至之後三庚為伏以畏火也土五畏甲八故以妹己妻甲土帶陰陽合以雌嫁木故能生物也水六畏土故以妹癸妻戊五行相和是其合也張行成翼元云天元五運之數以坤元主土配中央作五行之化源自土至火以次相生然十干配五行多不類者蓋有相剋之變數在其中也甲木克己土為妻生庚金為一變乙庚次甲己故乙庚為金運庚金克乙木生丙火丙火克辛金生壬水自乙庚之金生壬水凡兩變丙辛次乙庚故丙辛為水運丙火克辛金生壬水壬水克丁火生戊土戊土克癸水生甲木自丙辛之水生甲木凡三變丁壬次丙辛故丁壬為木運壬水克丁火生戊土戊土克癸水生甲木甲木克己土生庚金庚金克乙木生丙火自丁壬之木生丙火凡四變戊癸次丁壬故戊癸為火運戊土克癸水生甲木甲木克己土生庚金庚金克乙木生丙火丙火克辛金生壬水壬水克丁火生戊土自戊癸之火生戊土凡五變甲己又次戊癸故甲己復為土運於是戊癸會於中央也此説皆盡五行生剋之妙然陰陽之理以和為洽夫婦之道非脅可成究未若羅淡生內經博議引申天元玉册之義曉暢也岐伯述天元玉册曰太虛寥廓肇基化元萬物資始五運終天布氣真靈總統坤元夫肇基化元而布氣真靈乃云總統於坤元是坤元為萬物之母也坤元既為萬物之母而總統之則天亦必有以先用之也天之十干以戊己居中宮而先用水火然後成於金木豈非總統坤元而以土為首之義乎是以天之御化首以土為甲而甲遂為土仍順布五行於乙丙丁戊之上而以本氣化之土生金以金加於乙金生水水加丙水生木木加丁木生火火加戊五行畢再傳而土加於己故甲己合也金加庚故乙庚合也水加辛故丙辛合也木加壬故丁壬合也火加癸故戊癸合也此因合而化一定之理有不可移易者也然本氣之陰陽仍有不能從化而依之以為用者如加陽干為氣有餘加陰乾為氣不足此又因值年以佐用也三十四難三十四難曰五臟各有聲色臭味皆可曉知以不然十變言肝色青其臭臊其味酸其聲呼其液泣心色赤其臭焦其味苦其聲言其液汗脾色黃其臭香其味甘其聲歌其液涎肺色白其臭腥其味辛其聲哭其液涕腎色黑其臭腐其味鹹其聲呻其液唾是五臟聲色臭味也此本五行而言五臟之用也肝屬木青者木之色也臊者木之氣也酸者曲直作酸木之味也其聲呼者聲引而長亦木之氣也其液泣者肝開竅於目故為泣也心屬火赤者火之色也焦者火之氣也苦者炎上作苦火之味也其聲言者言散而揚火之象也其液汗者心主血汗為血之標也脾屬土黃者土之色也香者土之氣也其味甘者稼穡作甘土之味也其聲歌者歌緩而敦土之象也或云脾神好樂故其聲主歌其液涎者脾開竅於口故為涎也肺屬金白者金之色也腥者金之氣也辛者辛從革金之味也其聲哭者哭悲而激慘金之象也其液涕者肺開竅於鼻故為涕也腎屬水黑者水之色也腐者水之氣也咸者潤下作咸水之味也其聲呻者呻沉而咽為水之象也又腎位遠非呻之氣不得及於息故聲之呻者自腎出也其液唾者腎開竅於舌下故為唾也十變陳氏謂肺主聲肝主色心主臭脾主味腎主液五臟錯綜互相有之故云十變也按徐氏云五臟之聲靈樞九針論素問宣明五氣篇俱云心噫肺咳肝語脾吞腎欠此則為呼言歌哭呻乃本之素問陰陽應象大論蓋彼以病之所發言此以情之所發言其理一也讀經當推測其義如此則無不貫矣五臟有七神各何所藏耶然臟者人之神氣所舍藏也故肝藏魂肺藏魄心藏神脾藏意與智腎藏精與志也五臟言有七神者脾與腎兼兩神也臟者藏也言人之神氣藏於內焉肝藏魂者魂乃陽之精氣之靈也人身氣為陽血為陰陽無陰不附氣無血不留肝主血而內含陽氣是之謂魂究魂之根源則生於坎水之一陽推魂之功用則發為乾金之元氣不藏於肺而藏於肝者陽潛於陰也不藏於腎而藏於肝者陰出於陽也晝則魂遊目而為視夜則魂歸於肝而為寐靈樞本神篇云隨神往來謂之魂言其知覺之靈處也肺藏魄者魄乃陰之精形之靈也肝主血本陰也而藏陽魂陽潛於陰也肺主氣本陽也而藏陰魄陰生於陽也人之初生耳目心識手足運動啼呼為聲皆魄之靈也百合病恍惚不寧魄受擾也魔魘中惡魄氣掩也本神篇云並精而出入者謂之魄言其運動之能處也心藏神者神主知覺明照萬事之義也夫神為何物乃腎中之精氣而上歸於心合為離卦中含坎水之象惟其陰精內含陽精外護心藏之火所以光明朗潤而能燭物蓋神即心火得腎陰濟之而心湛然神明出焉心血不足則神煩風痰入心則神昏本神篇云兩精相搏謂之神言其陰陽合體之妙機也脾藏意與智者脾主守中故能記憶又主運用故能周慮本神篇云心有所憶謂之意因慮而處物謂之智蓋脾主思故也腎藏精與志者心之所存謂之志神生於精志生於心亦心腎交濟之義按志者專意而不移也志本心之作用而藏於腎者陽藏於陰中也腎主精為五臟之本精生髓為百骸之主精髓充足伎巧出焉志之用也本神篇云初生之來謂之精意之所存謂之志亦此義也三十五難三十五難曰五臟各有所腑皆相近而心肺獨去大腸小腸遠者何也然經言心榮肺衛通行陽氣故居在上大腸小腸傳陰氣而下故居在下所以相去而遠也肝之腑膽脾之腑胃腎之腑膀胱其位皆相近心之腑小腸肺之腑大腸何以皆相遠蓋血為營而心主血故營屬心氣為衛而肺主氣故衛屬肺心榮肺衛行陽氣而居上大腸小腸傳陰氣而居下所司不同其經雖相合而位則相遠矣又諸腑者皆陽也清淨之處今大腸小腸胃與膀胱皆受不淨其意何也又問陽宜清淨而諸腑皆陽也則當為清淨之處然大腸小腸胃與膀胱反受穢濁獨不及膽何也蓋膽無所受故也然諸腑者謂是非也經言小腸者受盛之腑也大腸者傳寫行道之腑也膽者清淨之腑也胃者水穀之腑也膀胱者津液之腑也一腑猶無兩名故知非也小腸者心之腑大腸者肺之腑膽者肝之腑胃者脾之腑膀胱者腎之腑言諸腑雖屬於陽而非皆清淨之腑也素問靈蘭祕典論曰小腸者受盛之官化物出焉盛音承貯也言受胃之物化其渣滓故云受盛之腑也又曰大腸者傳道之官變化出焉言小腸中物至此精汁已盡變化為糟粕而出故云行道之腑也又曰膽者中正之官決斷出焉膽無受而有瀉故云清淨之腑也又曰脾胃者倉廩之官五味出焉言胃主納穀脾主消穀二者相合統稱倉廩之官故云水穀之腑也又曰膀胱者州都之官津液藏焉氣化則能出矣言膀胱之水能化而為氣由衝任直上化津化液化汗故云津液之腑也諸腑各有名如上文所云皆實指受穢濁者也蓋諸體為陽而用則為陰經所謂濁陰歸六腑也惟膽名清淨故不受穢濁若余腑亦名清淨則有兩名矣靈樞本輸篇曰肺合大腸心合小腸肝合膽脾合胃腎合膀胱此其義也按西醫言小腸緊接於胃之下口由幽門起至闌門止約長二丈通體皆是脂膜相連中有微絲管其膽之苦汁胰之甜汁均由微絲管注入小腸化食物而所化之精汁由衆液管從膜中吸至頸會管過肺入心化赤為血而達各臟經言小腸者受盛之官化物出焉者實指小腸之氣化也其附小腸之脂膜即三焦之物而又屬之脾小腸又繫心之腑其相通之道即由微絲管從三焦上膈至包絡而達心心遺熱於小腸則化物不出為痢為淋脾陰不足則中焦不能受盛為膈食便結三焦相火不足不能蒸化水穀則為溏瀉矣大腸由闌門接小腸起至肛門止約長五尺余小腸中物至此精汁已盡化變為糟粕而出經言大腸者傳道之官變化出焉者指大腸能傳道糟粕也然大腸所以能傳道者以其為肺之腑肺氣下達故能傳道是以大便祕結有升舉肺氣之法也膽附肝右葉之旁中貯苦汁其汁乃下部回血入肝所化人食後小腸飽滿上逼膽囊使其汁流入小腸之內以榨化食物而利傳渣滓此西醫之言也不知膽汁色青而屬陽本得肝陰所生之氣化有是氣乃有是汁耳若以汁論膽汁多者膽大而無畏懼若以氣論則膽火旺者亦無畏懼太過者不得乎中則失其正故有敢為橫暴之事不及者不得乎中則失其正故常存懼怯之心經言膽者中正之官決斷出焉謂氣不剛不柔得成中正而臨事自有決斷也以肝膽二者合論肝之陽藏於陰故主謀膽之陽出於陰故主斷若夫瀉而不受故名清淨之腑也胃居膈下其形紆曲如袋其紋密故食物易入雖出上連食管下接小腸周圍多細穴以生津汁食物經胃津融和略似濃粥即出胃之下口幽門而至小腸頭與膽之苦青汁胰之甜白汁會合榨出精液經衆液管吸至頸即過肺入心化赤為血胰者附脾之物脾統血胰中之甜白汁乃脾血得脾陽之氣化而成經言脾胃者倉廩之官五味出焉蓋胃納穀脾消穀二者相合而後成功故可統稱倉廩也然膽汁化食戴元禮入肝之説有由來矣膀胱居兩跨骨內正中即陰交骨里體圓如盤舒縮自如下口與前陰相連上口有小孔甚細為下焦之脂膜遮閉飲入之水由胃下幽門之上小竅散布下焦網膜滲入為溺無溺則縮溺至則舒溺多則漲西醫但知膀胱藏溺而不知水入膀胱化氣上行則為津液所剩餘質乃下出而為溺經言膀胱者州都之官津液藏焉氣化則能出矣其言氣化則能出者謂出津液非出溺也氣化二字前於八難腎間動氣論中已約略言之今再詳陳其義夫氣者乃火交於水所化觀十二闢卦乾陽入坤陰而化為氣氣升為云為雨人與天地參其陰陽之理一也蓋人心主火人鼻吸入之氣乃天陽也亦屬火從鼻入肺歷心系引心火循脊背之膂筋下入腎系又從腎系以達下焦氣海氣海者何即三焦之根位居臍下經謂胞室王清任謂之氣府者是也凡人吸入之天陽合心火下至胞室則蒸動膀胱之水化氣上騰其氣透出膀胱入於胞室上循臍旁由衝任上膈入肺而還出於口隨呼而出上出之氣著漆石則為露珠在口舌臟腑之中則為津液又外出於皮毛以薰膚潤肌而為汗所謂氣化則津液能出者此也老人溺多化氣少而水質多壯者溺少化氣多而水質少也吸入從脊督脈主之呼出從膈任脈主之吸入陽也火交於水也呼出陰也氣即是水也火不足以蒸水則津液不升氣不得化水不足以濟火則津液乾枯小水不下故曰膀胱者津液之腑也小腸謂赤腸大腸謂白腸膽者謂青腸胃者謂黃腸膀胱者謂黑腸下焦之所治也此以五行五臟之色以分別五腑皆名為腸則俱受穢濁所以明不淨之故也下焦之所治者靈樞營衛生會篇曰水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉故五腑皆下焦之氣所治也三十六難三十六難曰臟各有一耳腎獨有兩者何也然腎兩者非皆腎也其左者為腎右者為命門命門者謂精神之所舍原氣之所繫也男子以藏精女子以系胞故知腎有二也腎有兩枚左右各一一主水一主火應乎升降之機也命門者以其為三焦之根十二經元氣之海藏精施化之具系胞受孕之處為人生命之原故曰命門也靈樞根結篇素問陰陽離合論所謂太陽根起於至陰結於命門命門者目也此指太陽經終於睛明睛明所夾之處為腦心乃至命之穴故曰命門與此義不同然實指右腎為命門恐未盡是以氣脈論之水升於左火降於右左右者陰陽之道路升降之樞機越人診脈獨取寸口以左尺候水右尺候火故左名腎右名命門其義或取乎此按西醫言腎形如豆色紫質堅頗類豬羊之腎左右兩枚長約三寸闊約寸半厚約七八分其重約三兩至四兩人高腎大人矮腎小位在脊骨十二節間周圍三焦脂膜包裹腎中有油膜一條貫於脊骨名為腎系下通網膜又有氣管由肺而下附脊循行下入腎系而透入網膜達于丹田下焦之原夫兩腎屬水中間腎系屬火即命門也素問刺禁論云七節之旁中有小心者即指命門言也人與天地參命門與太極相似太極生兩儀兩儀生四象四象生八卦八卦生六十四卦自命門生兩腎兩腎生六臟六腑六臟六腑生四肢百骸之類故人之交媾未有精聚先有火會是火為先天之本始水為天一之真元腎中之火名曰相火即坎中龍雷之火也是一陽陷於二陰之中乃成乎離而位乎坎即兩腎有命門之義也命門乃三焦之根為相火之宅相火布於三焦即由命門始也陳無擇謂有脂狀如手大正與膀胱相對有白脈自中出夾脊而上貫於腦者亦指三焦腎系而言也越人獨取寸口診候此相火生脾土命門寄夫右尺故作左為腎右為命門以解之亦水升於左火降於右之義也三十七難三十七難曰五臟之氣於何發起通於何許可曉以不然五臟者當上關於九竅也故肺氣通於鼻鼻和則知香臭矣肝氣通於目目和則知黑白矣脾氣通於口口和則知穀味矣心氣通於舌舌和則知五味矣腎氣通於耳耳和則知五音矣此節乃靈樞脈度篇文稍有增易大意謂五臟和則七竅通不和則七竅不通經言上閲七竅此言九竅當是簡誤若潔古認真九竅添三焦之氣通於喉喉和則聲鳴矣二句未免蛇足謝氏曰本篇問五臟之氣於何發起通於何許答文止言五臟通九竅之義而不及五臟之起發恐有缺文五臟不和則九竅不通六腑不和則留結為癰五臟神氣之所舍不和則氣不得上達故七竅不通若六腑不和則血氣留滯於皮腠有形之物積聚而為癰矣此結上起下之辭也邪在六腑則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣邪在五臟則陰脈不和陰脈不和則血留之血留之則陰脈盛矣陰氣太盛則陽氣不得相榮也故曰格陽氣太盛則陰氣不得相榮也故曰關陰陽相盛不得相榮也故曰關格關格者不得盡其命而死矣陽邪中於六腑則陽脈不和陽脈不和則氣壅而邪實邪實則不和之脈轉而盛矣陰邪中於五臟則陰脈不和陰脈不和則血滯而邪實邪實則不和之脈轉而盛矣陰陽之脈俱盛則成關格之證死矣此亦靈樞脈度篇文惟關格二字與經文相反當是錯簡若夫覆溢關格之脈證可與三難參觀按靈樞脈度篇曰陰氣太盛陽氣不能榮故曰關陽氣太盛陰氣不能榮故曰格終始篇曰人迎四盛且大且數名曰溢陽溢陽為外格脈口四盛且大且數名曰溢陰溢陰為內關素問六節臟象論曰人迎四盛以上為格陽寸口四盛以上為關陰仲景傷寒論云寸口脈浮而大浮為虛大為實在尺為關在寸為格斯皆以陰氣盛為關陽氣盛為格故知此節關格二字倒置為錯簡也經言氣獨行於五臟不榮於六腑者何也然夫氣之所行也如水之流不得息也故陰脈榮於五臟陽脈榮於六腑如環之無端莫知其紀終而復始其不覆溢人氣內溫於臟腑外濡於腠理滑氏曰此因上章營字之意而推及之也亦靈樞十七篇文大同小異所謂氣行於五臟不營六腑者非不營行六腑謂在陰經則營於五臟在陽經則營於六腑脈氣周流如環無端則無關格覆溢之患而人氣內得以溫於臟腑外得以濡於腠理矣三十八難三十八難曰臟惟有五腑獨有六者何也然所謂腑有六者謂三焦也有原氣之別焉主持諸氣有名而無形其經屬手少陽此外腑也故言腑有六焉三焦有形於二十五難注中已詳細言之此論三焦為原氣別使根於命門導引諸氣潛行默運於一身之中無或間斷也外腑謂在諸臟腑之外也三焦之形質可考三焦之氣化難見故曰有名而無形也三十九難三十九難曰經言腑有五臟有六者何也然六腑者止有五腑也五臟亦有六臟者謂腎有兩臟也其左為腎右為命門命門者謂精神之所舍也男子以藏精女子以系胞其氣與腎通故言臟有六也腑有五者何也然五臟各一腑三焦亦是一腑然不屬於五臟故言腑有五焉經言腑五臟有六無考不知所出又以三焦不附於臟故不名為腑雖有六腑只五腑也臟亦有六者以右腎命門指為一臟也然腎雖有兩而左右之氣相通實皆腎而已恐不得分為兩臟命門辨説已詳言三十六難注中可參合而觀之按五臟五腑以合五行肺合大腸金也肝合膽木也腎合膀胱水也心合小腸火也脾合胃土也手厥陰包絡即心外之衣為心主之宮城手少陽三焦乃腔內脂膜為臟腑之郛郭同司相火而相合是六臟六腑以應夫十二經脈也若以腎分為兩臟則為七臟矣靈樞本輸篇腎合膀胱膀胱者津液之腑也少陽屬腎腎上連肺故將兩臟三焦者中瀆之腑也水道出焉屬膀胱是孤之腑也經言腎將兩臟者以腎兼主水火二氣也少陽三焦之脈散於胸中而腎脈亦上連於肺肺為天而主氣三焦之下俞屬於膀胱而膀胱為津液之腑乃腎之合三焦主相火生於腎而遊行於上下膀胱主水亦生於腎蓋以水臟而領水腑也然膀胱之氣化津化液化汗皆三焦相火蒸騰所致夫天一之水地二之火皆腎所生合而論之是太極分而論之猶兩儀故本藏篇曰腎合三焦膀胱三焦膀胱者腠理毫毛其應即此義也且腎雖兼將兩臟實陰陽相貫水火互交並主藏精而為生氣之原不得謂三焦無形分腎為兩臟明矣四十難四十難曰經言肝主色心主臭脾主味肺主聲腎主液鼻者肺之候而反知香臭耳者腎之候而反聞聲其意何也然肺者西方金也金生於巳巳者南方火也火者心心主臭故令鼻知香臭腎者北方水也水生於申申者西方金金者肺肺主聲故令耳聞聲此五主素靈無考是托古醫經者陳氏曰臭者心所主鼻者肺之竅心之脈上肺故令鼻能知香臭也耳者腎之竅聲者肺所主腎之脈上肺故令耳能聞聲也或謂此以五行長生之法推之木長生於亥火長生於寅金長生於巳水長生於申心主臭火也肺開竅於鼻而有己火故能知臭肺主聲金也腎水開竅於耳而內有申金故能聞聲四十一難四十一難曰肝獨有兩葉以何應也然肝者東方木也木者春也萬物之始生其尚幼小意無所親去太陰尚近離太陽不遠猶有兩心故有兩葉亦應木葉也肝有兩葉應東方之木木者春也萬物始生之初草木甲坼皆兩葉乃木之本體故肝與之相應也素問六節藏象論言心為陽中之太陽腎為陰中之太陰腎水為肝之母心火為肝之子肝為陰中之陽居腎之上心之下故云尚近不遠也無親謂不專屬猶有兩心言或從乎陽或從乎陰也四十二難四十二難曰人腸胃長短受水穀多少各幾何然胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中常留谷二斗水一斗五升小腸大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合合之大半回腸大四寸徑一寸半長二丈一尺受谷一斗水七升半廣腸大八寸徑二寸半長二尺八寸受谷九升三合八分合之一故腸胃凡長五丈八尺四寸合受水穀八斗七升六合八分合之一此腸胃長短受水穀之數也此論腸胃長短容受之數以圍三徑一之法約之多有不合或是簡誤然長短容受之數亦只言略例耳未可深泥按西醫言胃形紆曲如袋容水三升許橫居膈下上連食管下屬小腸其體三層外層上下有血管四支分布小支密纏於內因胃接血比他臟尤多中層之肉經緯兩紋斜交故能舒縮擁動以勻轉食物內層周圍有小穴以生津液胃體內外有腦氣筋及白節筋散布故與百體相關應胃之左為脾右為肝胰附於胃後胃之本熱與他臟同但消化食物時其熱較盛胃津味酸色如口沫蓋主消化食物者也小腸長約二丈上口通胃下口接大腸外皮光滑內皮摺疊其紋甚密上有尖粒即吸液管之口液管者乃吸吸食物之精液管也食物由胃至小腸頭即與膽汁胰汁會合漸落漸榨榨出精液其吸液管百派千支散布腸後夾膜之間衆吸液管聚於附近脊骨處合而為一名曰精液總管從腰骨間附脊骨而上至頸即屈轉而下達心以化血大腸約長五尺分上中下三回回長尺余上回與小腸相接處名曰闌門中回在肝下橫過胃底下回自脾下從左軟脅間斜落至肛門乃直腸也食物至上中兩回猶有吸液管吸其餘液至下回則精液已竭惟存渣滓矣肝重四斤四兩左三葉右四葉凡七葉主藏魂西醫言肝居右脅下五葉色紫赤重約三四十兩左右兩葉中界長峽右大於左右下有小方葉膽囊附焉右葉後之下亦有一葉不甚大名後葉葉尾尤小由後葉底起至右葉止上覆下盂左枕胃下與賁門為界上為三焦膜包裹左右葉各出膽管一支相合一寸許復分為二一透小腸頭一透膽囊是通膽汁至小腸以融化食物者肝內又有回血等管以養肝而接膽汁肝不偏居於左而肝為風木應乎巽舊説居左者應風木之氣左升非以部位言也肝為熱壅則脹大數倍若各管凝滯不通血水溢滲夾膜之裹漸積漸深而腹即漸大故蠱脹一證多屬之肝云心重十二兩中有七孔三毛盛精汁三合主藏神西醫言心色赤而鮮重約十兩上闊下尖周圍夾膜包裹即心包絡也上有肺罩之空懸胸中下有膈膜遮蔽心之外體圓滑內空如囊剖視四壁嶙峋或凹或凸中有直肉隔之故有左房右房之稱左右半截間又有橫肉間之故有上房下房之號四房大小相若中有門戶筋絲數條牽連自能開闔右上房有回血管二支一向上一向下右下房有大血管一支長約寸許即分為左右而入肺左上房有回血管亦與肺通左下房有血脈總管一支為運赤血循督脈下血海以散行經脈另有腦氣筋白節筋密纏於內以行其用是心乃運血之臟而主百脈故為君主之官也脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血溫五臟主藏意西醫言脾居胃旁形長方而扁軟重約六七兩血盛則深紫其大小變態不一食過飽則脹大飢時則小若患瘧或熱病有脹大十餘倍者位在左脅下與胃脂膜相連內有回血管由胃後入肝人病則血脈不行於外即蓄聚於脾所以脾即脹大耳脾內回血管壅滯即有血水滲泄於下故腫脹之病亦多發於脾也胰附脾之物形長方重約三四兩橫貼胃後頭大向右尾尖在左右之大頭與小腸頭為界左之小尾與脾相接中有液管一條由左橫右穿過胰之體斜入小腸上口之旁與膽汁入小腸同路所生之汁能消化食物其質味甜或名之甜肉云肺重三斤三兩六葉兩耳凡八葉主藏魄西醫言肺居膈上狀若懸磬系以氣喉色白如縞映紅頂尖而圓左兩葉右三葉披離下垂右大於左因心尖向左微占其位左長於右緣肝經處右稍高於脾也後附脊骨前連胸膛肺中有管竅上通咽喉以呼出悍氣吸入生氣而換紫血入心化赤下引心氣而達胞室肺質輕鬆外有膜沫濡潤以助呼吸者也腎有兩枚重一斤一兩主藏志西醫言腎居十二脊骨間形如豬腰子重約三四兩周圍有三焦脂膜包裹左右相對左上有脾胃及大腸下回蓋之右上有肝及大腸上回蓋之腎中有油膜一條貫於脊骨是為腎系下連三焦之根又有氣管由腎系附脊骨而上通心肺兩腎屬水中間腎系屬火即命門也命門者乃三焦發源之所故三焦主相火與心包絡表裡三焦之氣遊行於上中下即相火之遊行也膽在肝之短葉間重三兩三銖盛精汁三合西醫言膽囊式如梨附於肝右之小方葉中貯青汁乃回血入肝感肝木之氣化而成人食後小腸飽滿腸頭上逼膽囊使其汁流入小腸之內以融化食物而利傳渣滓若膽汁不足則精粗不分糞色白結而不黃膽汁過多上嘔苦涎或下泄青瀉膽管閉塞其汁入血即病疸黃矣胃重二斤二兩紆曲屈伸長二尺六寸大一尺五寸徑五寸盛谷二斗水一斗五升小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積十六曲盛谷二斗四升水六升三合合之大半大腸重二斤十二兩長二丈一尺廣四寸徑一寸當齊右回疊積十六曲盛谷一斗水七升半膀胱重九兩二銖縱廣九寸盛溺九升九合口廣二寸半唇至齒長九分齒以後至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸喉嚨重十二兩廣二寸長一尺二寸九節肛門重十二兩大八寸徑二寸大半長二尺八寸受谷九升三合八分合之一此即靈樞腸胃篇及平人絶谷篇之義而增入五臟輕重所盛所藏雖覺前後重復不害其為叮嚀也臟腑之學西士言之較詳故注中多采其説然人有長短嬰壯不同況古今之權量各異其丈尺容受不可拘泥識其略例可也四十三難四十三難曰人不食飲七日而死者何也然人胃中常有留谷二斗水一斗五升故平人日再至圊一行二升半日中五升七日五七三斗五升而留水穀盡矣故平人不食飲七日而死者水穀津液俱盡即死矣此靈樞平人絶谷篇文言人之臟腑形骸精神氣血皆借水穀以資養生水穀絶則形與氣俱絶矣平常無病之人胃滿則腸虛腸滿則胃虛日夜消化止留三斗五升人一日食五升考後漢書南蠻傳曰人稟五升注古升小故曰五升也若七日不飲食其所留之水穀盡則精氣津液皆盡故死然病人不飲食七日不死者以水穀留積故也蓋留積則為病矣四十四難四十四難曰七衝門何在然唇為飛門齒為戶門會厭為吸門胃為賁門太倉下口為幽門大腸小腸會為闌門下極為魄門故曰七衝門也沖者通要之地門者戶也此承上文食飲之入稽其通行之門徑也唇為飛門者飛古與扉通扉戶扇也蓋齒為戶門唇為之扇故曰扉門靈樞憂恚無言篇曰唇者音聲之扇也此即其義會厭為吸門者會厭為物之所會聚又能掩閉勿使誤入也吸者吸納處也言為五臟聲音之出入呼吸之門戶也胃為賁門者胃能聚物如倉廩故曰太倉賁猶奔也賁門在胃上口言物入於胃疾奔而下太倉也胃之下口接小腸處曰幽門言深隱之地與上下出入處至遠也大腸小腸會為闌門者會合也小腸之下大腸之上相接處分闌精血糟粕各有所歸也下極為魄門者魄門即肛門也魄古與粕通莊子天道篇曰古人之糟魄已夫言食飲至此精華已去止存形質之槽粕故曰魄門也此七者皆食飲出入衝要之道路也四十五難四十五難曰經言八會者何也然腑會太倉臟會季脅筋會陽陵泉髓會絶骨血會膈俞骨會大杼脈會太淵氣會三焦外一筋直兩乳內也熱病在內者取其會之氣穴也人身臟腑筋骨髓血脈氣此八者皆有會合之穴若熱病在於內則於外取其所會之穴以去疾也太倉屬任脈即中脘穴也在臍上同身寸之四寸六腑取稟於胃故為腑會季脅屬足厥陰即章門穴也在大橫外直臍季脅端為脾之募五臟取稟於脾故為臟會陽陵泉屬足少陽足少陽之筋結於膝外廉即此穴也在膝下同身寸之一寸外廉陷中又膽與肝表裡肝者筋之合故為筋會絶骨即枕骨名玉枕穴在絡卻後同身寸之一寸五分挾腦戶旁一寸三分屬足太陽膀胱與腎合腎主骨腦為髓海乃腎精所生故為髓會絶字疑是簡誤或云絶骨屬足少陽一名陽輔在外踝上同身寸之四寸輔骨前絶骨端如前三分諸髓皆屬於骨少陽主骨凡物極則反骨絶於此而少陽生之故髓會於絶骨也於義亦通膈俞屬足太陽在項後第七椎去脊兩旁各同身寸之一寸五分在中焦之分心俞下肝俞上心統血肝藏血能化精微而為血之地故為血會大杼屬足太陽在項後第一椎下去脊兩旁各同身寸之一寸五分為衝脈之俞靈樞動輸篇曰衝脈與腎之大絡起於腎下蓋腎主骨膀胱與腎合故為骨會太淵屬手太陰在掌後陷中即寸口也肺朝百脈故為脈會三焦外謂在焦膜之外兩乳內謂兩乳之中任脈之所過即膻中穴也在玉堂下同身寸之一寸六分靈樞海論篇曰膻中為氣之海故為氣會此八會內經無考然其義甚精必古醫經之語也四十六難四十六難曰老人臥而不寐少壯寐而不寤者何也然經言少壯者血氣盛肌肉滑氣道通榮衛之行不失於常故晝日精夜不寤老人血氣衰肌肉不滑榮衛之道澀故晝日不能精夜不寐也故知老人不得寐也衛外之血氣日行於陽絡二十五度夜行於陰絡二十五度分為晝夜故氣至陽則臥起而目張氣至陰則休止而目瞑夫血氣者充膚熱肉淡滲皮毛之血氣肌肉者在外皮膚之肌肉在內募原之肌肉氣道者肌肉之紋理三焦通會元真之處血氣之所遊行出入者也老人血氣衰肌肉乾枯血氣之道澀滯故晝不精明夜多不寐也少壯者血氣盛肌肉滑利血氣之道流通而不失其出入之常度故晝精明夜多寐也是老人之寤而不寐少壯之寐而不寤系乎榮衛血氣之有餘不足也四十七難四十七難曰人面獨能耐寒者何也然人頭者諸陽之會也諸陰脈皆至頸胸中而還獨諸陽脈皆上至頭耳故令面耐寒也人面獨能耐寒者以六陽經之脈皆上至頭六陰經之脈皆不上頭故也靈樞邪氣臟腑病形篇曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌冰其卒寒或手足懈惰而其面不衣何也岐伯曰十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上薰於面其皮厚其肉堅故天熱甚寒不能勝之也此即其義而又引逆順肥瘐篇手三陰從臟走手手三陽從手走頭足三陽從頭走足足三陰從足走胸之義以證之言頭面為諸陽之會是以三陽之脈上循於頭然厥陰之脈上額交巔下循頰裡而經不云者乃略言之耳蓋陰陽寒熱之氣皆從下而上升故岐伯謂十二經脈三百六十五絡其血氣皆上於面而走空竅也上第三卷三十難至四十七難論臟腑
