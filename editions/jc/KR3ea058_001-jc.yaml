body:
  text: 卷一一難一難曰十二經皆有動脈獨取寸口以決五臟六腑死生吉凶之法何謂也首發一難問手足十二經皆有動脈何以獨取寸口以決死生以起下文之義按五臟六腑之氣晝夜循環始於肺而終於肺是肺為一身之主氣而寸口乃肺之動脈在太淵經渠之分為脈之大會故越人獨取此以候五臟六腑之氣然諸經動脈不可不知否則握手不及足難免長沙之呵斥矣手陽明大腸脈動合谷在手大指次指歧骨間手少陰心脈動極泉在臂內腋下筋間手太陽小腸脈動天窗在頸側大筋間曲頰下手少陽三焦脈動和髎在耳兌發陷中手厥陰心包絡脈動勞宮在掌中屈中指無名指盡處是足太陽膀胱脈動委中在膝膕約紋里足少陰腎脈動太谿在足踝後跟骨上足太陰脾脈動衝門在曲骨旁同身寸之三寸五分足陽明胃脈動衝陽在足大指次指陷中為內庭上內庭同身寸五寸是足厥陰肝脈動太衝在足大指本節後同身寸二寸是足少陽膽脈動聽會在耳前陷中考明堂針灸圖甲乙經諸書指稱動脈者二十餘穴惟此十餘穴或可用以診候而此十餘穴中又以太谿衝陽太衝三足脈為扼要也然寸口者脈之大會手太陰之脈動也然答辭會聚也手太陰肺之經言肺主氣十二經之脈動皆肺氣鼓之故肺朝百脈而大會於寸口寸口者即素問經脈別論氣口成寸以決死生之義故曰寸口寸口三部魚際為寸太淵之高骨為關經渠為尺是手太陰肺經之動脈也人之飲食入胃其清氣上注於肺以應呼吸而行脈度越人立問之意所以獨取夫寸口而後世宗之為不易之法四十五難脈會太淵亦此義也人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸人一日一夜凡一一萬三千五百息脈行五十度周於身漏水下百刻榮衛行陽二十五度行陰亦二十五度為一周也故五十度復會於手太陰寸口者五臟六腑之所終始故法取於寸口也此承上文言人謂平人不病而息數調勻者也靈樞五十營篇漏水下百刻以分晝夜人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺二百七十息氣行十六丈二尺氣行一周於身水下二刻二千七百息氣行十周於身水下二十刻一萬三千五百息氣行五十營於身水下百刻凡行八百一十丈營衛生會篇人受氣於谷谷入於胃以傳於肺其清者為營濁者為衛營在脈中衛在脈外營周不休五十度而復大會衛與營俱行陽二十五度行陰二十五度一周也故亦五十度而復大會於手太陰矣素問平人氣象論人一呼脈再動一吸脈再動呼吸定息脈五動閏以太息命曰平人是脈者營氣也行經脈一日五十周今日平旦始於手太陰之寸口明日平旦又會於手太陰之寸口此五臟六腑之所終始故取法於寸口也按脈者血中之氣也經言營氣取營運於中之義西醫言食入於胃至小腸皆有微絲管吸其精液上至頸會管過肺入心左上房心體中空四壁嶙峋或凹或凸中有直肉隔之故稱左房右房左右半截又有橫肉間之以分上下筋絲數條牽連故自能開闔以應呼吸也化赤為血此即清者為營也其血從左上房落左下房入總脈管由脊之膂筋循行經脈之間一日夜五十度周於身盡八百十丈之脈道以應呼吸漏下者營氣也若夫衛氣取衛護於外之義經脈中之血氣由脈管之尾出諸氣街入微絲血管經謂孫絡者是也與陽明之悍氣人之飲食五味雜投奚能無毒西醫謂之炭氣者此也相合散布通體皮腠之間充膚熱肉淡滲毫毛此即濁者為衛也脈管之赤血既入微絲血管合陽明悍氣則其色漸變漸紫西醫因其有毒謂之炭氣散布遍體漸並漸粗而接入回血管經謂絡脈者是也之尾血入回血管內而臟腑外而經脈並脈管交相逆順而行外行經脈者有陰陽之別一支浮於肌腠之上一支沉於分肉之間即陽絡行於皮表陰絡行於皮里而皆與脈管偕行經言營行脈中衛行脈外者是也回血管內外行遍入總回管至心右上房落右下房遞入於肺呼出悍氣吸入生氣其血復化為赤入心左上房陰陽相貫如環無端者此之謂也然氣中有血血中有氣氣與血不可須臾之相離乃陰陽互根自然之理也夫運行經脈中之血氣周夜行五十周者如月之應水流貫地中其行疾出諸氣街合陽明悍氣纏布周身之血氣晝夜行一周者如日隨天道繞地環轉其行遲故人與天地參也行陰行陽者陰絡陽絡中血氣隨經脈偕之衛氣也至若外邪襲人熱傷氣寒傷血當責諸孫絡纏布周身之衛氣伏氣內發當責諸絡脈中之衛氣浮於脈外者可刺之以泄其氣沉於脈內者宜急攻以殺其毒診脈察病當責諸運行脈管之營氣蓋血入心之上房落下房過總脈管皆開闔聲與呼吸相應故可候脈之動數而西醫聽聲以辨心疾亦取乎此二難二難曰脈有尺寸何謂也然尺寸者脈之大要會也會聚也要會者言切要聚會之處也人之一身經絡營衛五臟六腑莫不由於陰陽而或過與不及於尺寸見焉故為脈之大要會也一難言寸口為脈之大會以肺朝百脈而言也此言尺寸為脈之大要會以陰陽對待而言也從關至尺是尺內陰之所治也從關至魚際是寸內陽之所治也關者尺寸分界之地脈訣所謂高骨為關是也關下為尺主腎肝而沉故屬陰魚際大指本節後內廉大白肉名曰魚其赤白肉分界即魚際也關上為寸口主心肺而浮故屬陽治理也欲明陰陽為病之治者須於尺寸候之也故分寸為尺分尺為寸寸為陽尺為陰陽上而陰下寸之下尺也尺之上寸也關居其中以為限也言分寸為尺分尺為寸者謂關上分去一寸則余者為尺關下分去一尺則余者為寸此明尺寸之所以得名也故陰得尺內一寸陽得寸內九分此又於尺寸中分其長短之位以合陰陽之數一寸為偶數九分為奇數也蓋關以下至尺澤皆謂之尺而診脈則止候關下一寸關以上至魚際皆謂之寸而診脈止候關上九分故曰尺內一寸寸內九分也尺寸終始一寸九分故曰尺寸也寸為尺之始尺者寸之終云尺寸者以終始對待而言其實則寸得九分尺得一寸皆陰陽之盈數也然得一寸不名曰寸得九分不名曰分者以其在尺之中在寸之中也三難三難曰脈有太過有不及有陰陽相乘有覆有溢有關有格何謂也此言太過不及皆病脈也陰乘陽則陰太過而犯陽為陽不及陽乘陰則陽太過而犯陰為陰不及若相乘之甚者則為覆溢之脈而成關格之證也然關之前者陽之動也脈當見九分而浮過者法曰太過減者法曰不及關前為陽寸脈所動之位脈見九分而浮九陽數寸之位浮陽脈是其常也過謂過於本位過於常脈不及謂不及本位不及常脈是皆病脈也遂上魚為溢為外關內格此陰乘之脈也遂者徑行而直前也魚即魚際溢如水之溢滿而出於外也陽氣太盛則陰氣不得相營故曰關陰氣太盛則陽氣不得相營故曰格此陰乘陽位其脈遂溢於魚際之分而成外關內格之證也關以後者陰之動也脈當見一寸而沉過者法曰太過減者法曰不及關後為陰尺脈所動之位脈見一寸而沉一寸陰數尺之位沉陰脈是其常也過謂過於本位過於常脈不及謂不及本位不及常脈皆病脈也遂入尺為覆為內關外格此陽乘之脈也覆者如牆之傾覆也經云陽氣太盛則陰氣不得相營也以陰不得營於陽陽遂下陷而覆於尺之分此陽乘陰位之脈而成內關外格之證也故曰覆溢是其真臟之脈人不病而死也覆溢之脈乃陰陽離決之徵若覆溢之微雖關格重證猶或未至危殆若覆溢之甚為真臟之脈真臟者謂臟氣已絕其真形獨現於外不必有疾病而可決其必死也按脈乃血中之氣謂之營氣西醫言穀食入胃其精液乃至頸過肺奉心化赤為血應呼吸行脈道即靈樞營氣篇云營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始者是也蓋臟氣者不能自致於手太陰必因於胃氣乃至於手太陰是左右寸口雖屬於肺而皆有陽明胃氣鼓舞其間故胃為脈之根肺為脈之干也素問脈要精微論云陰陽不相應病名曰關格六節臟象論以人迎一盛至四盛以上為格陽寸口一盛至四盛以上為關陰而靈樞終始禁服諸篇亦以人迎四盛且大且數名曰溢陽溢陽為外格脈口四盛且大且數名曰溢陰溢陰為內關不通死不治人迎與太陰脈口俱盛四倍以上命曰關格關格者與之短期此人迎寸口指結喉兩旁人迎太淵經渠間之寸口而言也越人既獨取寸口不診十二經動脈無取乎結喉之人迎推溢陽為外格溢陰為內關之意知人迎為寸口肺脈之根寸口為人迎胃脈之干人迎脈大至一倍二倍三倍四倍未有不變見於氣口者以根大而干亦大也如人迎四倍以上為外格證則寸口之脈亦溢於魚上為溢陽脈以應人迎之氣為其根干相通是寸口以上可察人迎之氣而結喉兩旁之人迎亦不必診也此越人獨取寸口以尺寸分覆溢關格脈證之意也後之注難經者不能達越人之意多主此一脈四名之說或謂人迎當診於結喉兩旁死於句下泥執經文皆屬誤會不知此節大旨診尺寸以詳陰陽相乘之候而察關格之病也故其設問謂古之論脈者曰太過曰不及曰陰陽相乘曰覆溢曰關格若是說來各有所異否答辭始舉關之前後申明陰陽之位而以過之與減解太過不及為脈之形勢以上魚入尺解覆溢為脈之現體而後結其義曰是為關格病之所成也仲景平脈篇云寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則嘔逆是據此節而申明其證者也何注家不察之甚耶四難四難曰脈有陰陽之法何謂也然呼出心與肺吸入腎與肝呼吸之間脾受穀味也其脈在中此言脈之陰陽雖在於尺寸其陰陽之氣又在浮沉如心肺居膈上陽也呼出必由之腎肝居膈下陰也吸入必歸之脾受穀味為生脈之原而在中而呼出吸入無不因之故診脈之法浮取乎心肺沉取乎腎肝而中應乎脾胃也按經言呼出者非氣自心肺而出也為腎肝在膈下其氣因呼而上至心至肺故呼出心與肺也心肺在膈上其氣隨吸而入至腎至肝故吸入腎與肝也夫呼者因陰出吸者隨陽入其呼吸陰陽相隨上下經歷五臟之間乃脾胃受穀氣以涵養之也故言其脈在中讀此節不得刻舟求劍謂呼出之氣為陽吸入之氣為陰也浮者陽也沉者陰也故曰陰陽也按之不足舉之有餘曰浮浮為陽者象火而炎上也按之有餘舉之不足曰沉沉為陰者象水而潤下也心肺俱浮何以別之然浮而大散者心也浮而短澀者肺也腎肝俱沉何以別之然牢而長者肝也按之濡舉指來實者腎也脾者中州故其脈在中是陰陽之法也浮大無力按之散而欲去者名曰散浮細而遲往來蹇滯不前者名曰澀沉而有力實大弦強按之但覺堅極而不移者名曰牢大而長微弦按之隱指愊愊然中取沉取皆有力者名曰實心肺俱俘何以別之蓋心屬火故其象浮而大散肺屬金故其象浮而短澀腎肝俱沉何以別之蓋肝屬木故其象牢而長腎屬水故其象舉指按之來實水體外柔而內剛也脾屬土在中旺於四季主養四臟其脈來從容和緩不沉不浮故曰其脈在中也脈有一陰一陽一陰二陽一陰三陽有一陽一陰一陽二陰一陽三陰如此之言寸口有六脈俱動邪然此言者非有六脈俱動也謂浮沉長短滑澀也浮者陽也滑者陽也長者陽也沉者陰也短者陰也澀者陰也所謂一陰一陽者謂脈來沉而滑也一陰二陽者謂脈來沉滑而長也一陰三陽者謂脈來浮滑而長時一沉也所謂一陽一陰者謂脈來浮而澀也一陽二陰者謂脈來長而沉澀也一陽三陰者謂脈來沉澀而短時一浮也各以其經所在名病逆順也過於本位謂之長不及本位謂之短按之往來流利輾轉替替然謂之滑也前引五臟之脈以應五行此又引三陰三陽之脈以應六氣其浮滑長三陽也沉短澀三陰也而於三部中察此六脈即可知陰陽盛衰之機蓋陰陽之脈不單至惟其不單至故有此六脈相兼而見惟其相兼故有一陰一陽一陽一陰之不同也此別陰陽虛實之法再參春夏秋冬觀其六脈之變則庶乎可知病之逆順矣按徐氏曰此節言六脈互見之象也此但舉其例而言亦互相錯綜非一定如此也其經手足三陰三陽也逆順如心脈宜浮腎脈宜沉則為順若心脈反沉腎脈反浮則為逆此又見脈無定體因經而定順逆也然脈之浮沉或可相兼滑澀長短不得並見亦當曉也五難五難曰脈有輕重何謂也然初持脈如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也故曰輕重也持脈即按脈也菽豆之總名肺位最高而主皮毛故其脈如三菽之重心在肺下主血脈故其脈如六菽之重脾在心下主肌肉故其脈如九菽之重肝在脾之下主筋故其脈如十二菽之重腎在肝下主骨故其脈按之至骨沉之至也舉指來疾言其有力而急迫即四難舉指來實之義也此五臟本脈如此倘有太過不及則病脈也菽豆之總名診脈輕重何獨取乎豆且不言三菽四菽五菽而必以三累加之蓋豆在莢累累相連與脈動指下相類以此意推之言三菽重者非三菽加於一部之上乃一指下如有一菽重也通稱三部即三菽也肺位高而主皮毛故輕六菽重者三部各有二菽重也心在肺下主血脈故稍重九菽重者三部各有三菽重也脾在心下主肌肉故又稍重十二菽重者三部各有四菽重也肝在脾下主筋故較脾又加一菽重也腎在肝下而主骨故其脈按之至骨沉之至也而舉之來疾者何也夫脈之體血也其動者氣也腎統水火火入水中而化氣按之至骨則脈氣不能過於指下微舉其指其來頓疾於前此見腎氣蒸動勃不可遏故曰腎部也舉指兩字最宜索玩不可忽也若去此兩字是按之至骨而來轉疾乃牢伏類矣六難六難曰脈有陰盛陽虛陽盛陰虛何謂也然浮之損小沉之實大故曰陰盛陽虛沉之損小浮之實大故曰陽盛陰虛是陰陽虛實之意也浮沉者下指輕重也盛虛者陰陽盈虧也滑氏曰輕手取之而見損小重手取之而見實大知其為陰盛陽虛也重手取之而見損小輕手取之而見實大知其為陽盛陰虛也大抵輕手取之陽之分重手取之陰之分不拘何部率以此推之前四難論陰陽平脈而及於病脈此節專論陰陽虛實太過不及之義陰陽之法似同而平病微甚各異不可不察徐氏謂上文屬於陰屬於陽平脈也恐不盡然七難七難曰經言少陽之至乍大乍小乍短乍長陽明之至浮大而短太陽之至洪大而長少陰之至緊大而長太陰之至緊細而微厥陰之至沉短而敦此六者是平脈耶將病脈也然皆王脈也洪脈似浮而大兼有力舉按之則泛泛然滿三部狀如水之洪流波之湧起脈來大而鼓也緊脈帶數如切繩如轉索丹溪謂如紉線譬如以二股三股糾合為繩必旋絞而轉始得緊而成繩者是也細脈如線極細三候不斷不散者是也微脈似有似無浮軟如散重按之欲絕者是也上文言三陽三陰之旺脈此言三陰三陽之旺時至言其氣至而脈應之也少陽之至乍大乍小乍短乍長者以少陽陽氣尚微離陰未遠故其脈無定也陽明之至浮大而短者陽明陽氣已盛然尚未極故浮大而短也太陽之至洪大而長者太陽之陽極盛故洪大而長也太陰之至緊大而長者太陰為陰之始故有緊象而尚有長太陽脈也少陰之至緊細而微者少陰之陰漸盛故緊細而微也厥陰之至沉短而敦者敦沉重貌以厥陰陰之至故沉短而敦陰脈之極也此六者非本然之平脈亦非有過之病脈乃六氣應時而至之旺脈也首稱經言即素問平人氣象論太陽脈至洪大以長少陽脈至乍數乍疏乍短乍長陽明脈至浮大而短之義引申而言之也其氣以何月各王幾日然冬至之後得甲子少陽王復得甲子陽明王復得甲子太陽王復得甲子少陰王復得甲子太陰王復得甲子厥陰王王各六十日六六三百六十日以成一歲此三陽三陰之王時日大要也古歷以十一月甲子合朔冬至為曆元然歲周三百六十五日四分日之一則日有零餘歲各有差越人申素問六節藏象論之義以六六之節成一歲其自冬至之後得甲子即是來年初之氣分為歲差之活法也其甲子或在小寒之初或在大寒之初以應乎少陽之氣少陽之陽其陽尚微復得甲子應乎陽明陽明則陽已盛復得甲子應乎太陽太陽則陽極盛陽極則陰生而太陰用事故復得甲子應乎太陰太陰之陰氣尚微復得甲子應乎少陰少陰之陰已盛復得甲子應乎厥陰厥陰則陰極盛陰盛則陽生如是無已此三陰三陽之旺脈隨六甲之日數者如此按歸藏商易取用乎坤而以十二闢卦候一歲十二月消息亦即乾坤二卦六爻之旁解也蓋乾之六陽自十一月建子冬至一陽始生為地雷復卦即乾之初九爻十二月建醜二陽生為地澤臨卦即乾九二爻正月建寅三陽生為地天泰卦即乾九三爻二月建卯四陽生為雷天大壯卦即乾九四爻三月建辰五陽生為澤天夬卦即乾九五爻至四月建巳六陽充足而為乾為天即乾之上九爻此一年之乾卦也五月建午夏至一陰生為天風垢卦即坤之初六爻六月建未二陰生為天山遯卦即坤六二爻七月建申三陰生為天地否卦即坤六三爻八月建酉四陰生為風地觀卦即坤六四爻九月建戌五陰生為山地剝卦即坤六五爻至十月建亥六陰純靜而為坤為地即坤之上六爻此一年之坤卦也夫坤為萬物之母而能生物然坤本純陰必待乾與之交而得其陽然後始能生萬物也十二支次序世人皆以子為首因坤臨十月亥坤為純陰之卦陰極則陽生故十一月冬至一陽升於地上為地雷復也不知造化端倪實不在子而在午蓋天地交而萬物生是乾坤交姤之初即為萬物造端之始然交必陽體充足而後能交乾之六陽乃充足於四月之巳次為午故乾至五月建午始與坤交是則乾足於巳而動於午巳午皆火故伏羲卦乾居正南乾之外體屬火乾中含蓄陰精屬金故五行家言庚金長生在巳所謂長生者乃指其生之之原而言也乾之初動於午每年五月夏至之時乾上九之一陽已升至天頂極高不得不轉而向下向下即感動坤陰之氣上升而交故天地三交五月建午為第一交六月未為第二交七月申為第三交所謂坤三索於乾也乾坤交而謂之索者以坤本純陰必索於乾而後有陽始能生化也乾陽入坤而化為氣氣生而為云為雨蓋十二闢卦乾位巳火也坤位亥水也乾與坤交火入水中而化為氣以水為質火為性也人與天地參試以一碗人張口氣呵之則生水故知氣之形屬水而其所以能升騰行動者則火也爻辭曰見群龍無首吉言氣升能為雲雨故喻為龍而乾與坤三交則乾上四五之三爻盡入於坤而乾上爻巳火之首早入亥水之中為育生胚胎之兆故龍之無首吉也此節言三陽三陰之六氣與素問六微旨諸論主氣客氣者有間越人謂冬至復得甲子者以冬至為地雷復一陽始生之初應少陽甲木春升之氣而甲子為干支之首六氣莫不由之變更故用以察一歲陰陽之氣也八難八難曰寸口脈平而死者何謂也然諸十二經脈者皆繫於生氣之原所謂生氣之原者謂十二經之根本也謂腎間動氣也此五臟六腑之本十二經脈之根呼吸之門三焦之原一名守邪之神故氣者人之根本也根絕則莖葉枯矣寸口脈平而死者生氣獨絕於內也寸口脈平而死者非謂穀氣變見於寸口以決死生乃言脈之體腎間動氣為生氣之原即素問陰陽離合論曰太衝之地名曰少陰者是也太衝者腎脈與衝脈合而盛大故曰太衝夫腎間則衝脈所出之地外當乎關元之分而三焦氣化之原十二經之氣皆繫於此故曰根本也挾任脈上至咽喉以通呼吸故曰呼吸之門上系手三陰三陽為支下系足三陰三陽為根故越人引樹以設喻也是氣也為十二經之原三焦之府主宣行營衛者也又為精神所舍元氣之所繫也一名守邪之神者以命門之神固守邪氣不得妄入入則死若腎氣先絕於內其人不病病即危矣按腎間動氣為十二經生氣之原統轄營衛者也蓋人身氣血之升降必由呼吸以循環吸入天之陽呼出地之陰心主君火吸入之氣乃天陽也亦屬火其氣由鼻入肺歷心引心火從心系循督脈入腎又從腎系以達下焦胞室挾膀胱至下口其吸入天之陽氣合心火蒸動膀胱之水化而為氣循衝任而上過膈入肺而還出於口鼻上出之氣在口舌臟腑之中則為津液由諸氣街外出於皮毛以薰膚潤肌則為汗此火入水中化氣之理即乾坤相交三索之義故曰人與天地參也九難九難曰何以別知臟腑之病耶然數者腑也遲者臟也數則為熱遲則為寒諸陽為熱諸陰為寒故以別知臟腑之病也此分別臟腑之病也人一呼一吸為一息脈亦應之一息之間脈四至閏以太息脈五至命曰平人平人者不病之脈也其有增減則為病矣一息三至曰遲不及之脈也一息六至曰數太過之脈也臟為陰腑為陽脈數者屬腑為陽為熱脈遲者屬臟為陰為寒又推言所以數屬腑遲屬臟之義故曰諸陽為熱諸陰為寒也然此但言其陰陽大概耳未可泥也按腑病亦有遲脈臟病亦有數脈以遲數別臟腑固不可執而以遲數分寒熱亦有未盡然者夫遲為陰脈醫者一呼一吸病者脈來三至去來極慢者是也遲脈為病皆因內傷生冷寒涼之物外涉水冰陰寒之氣多中於臟或中於腑或入於腠理以致氣血稽遲不行故主陽氣虛氣血凝滯為陰盛陽衰之候觀其遲之微甚而識寒之淺深此道其常也若遲而有力更兼澀滯舉按皆然者乃熱邪壅結隧道不利失其常度故脈反呈遲象然未可造次必驗之於證如胸脘飽悶便秘溺赤方是主熱之遲脈也若景岳所云傷寒初解遺熱未清經脈未充胃氣未復脈必遲滑或見遲緩河間云熱盛自汗吐利過極則氣液虛損脈亦遲而不能數此又營氣不足復為熱傷不能運動熱邪反為所阻失其轉輸之機故緩慢而行遲也再遲而不流利為澀遲而歇止為結遲濡浮大且緩為虛似是而非尤當辨認也數脈為陽醫者一呼一吸病者脈來六七至者是也數脈主熱為病進為陰不勝陽故脈來太過也然亦主寒者若脈來浮數大而無力按之豁然而空微細欲絕此陰盛於下逼陽於上虛陽浮露於外而作身熱面赤戴陽故脈數軟大無神也丹溪云脈數盛大按之澀而外有熱證名中寒乃寒流血脈外證熱而脈即數亦此義也越人只言其常而未言其變經文簡奧如此等概略之言甚多學者當細心領會不可刻舟求劍也十難十難曰一脈為十變者何謂也然五臟剛柔相逢之意也假令心脈急甚者肝邪干心也心脈微急者膽邪干小腸也心脈大甚者心邪自干心也心脈微大者小腸邪自干小腸也心脈緩甚者脾邪干心也心脈微緩者胃邪干小腸也心脈澀甚者肺邪干心也心脈微澀者大腸邪干小腸也心脈沉甚者腎邪干心也心脈微沉者膀胱邪干小腸也五臟各有剛柔邪故令一脈輒變為十也一脈十變謂一臟一脈其變有十也五邪者五臟六腑之邪也剛柔五臟為柔六腑為剛相逢謂臟邪干臟腑邪干腑也蓋臟干臟則脈盛腑干腑則脈微假令夏主心脈當浮大而散今反弦而急甚者肝邪來干心也此從後來母乘子為虛邪小腸心之腑脈當浮大而洪長而微弦急者為膽邪陽干於陽陰乾於陰同氣相求也心脈雖洪大當以胃氣為本今無胃氣故其脈大甚也此心自病為正邪故言自干心也小腸心之腑微大者較洪大則小為小腸自病故曰自干也緩者脾脈乘心故令心脈緩也從前來子乘母為實邪故言脾邪干心也胃脈小緩見於心部小腸心腑故亦言干也澀為肺脈今見心部是火不足以制金金反凌火從所不勝來為微邪故言肺邪干心也微澀大腸脈小腸心腑故見於心部而言干也沉者腎脈心火炎上其脈本浮今反見沉是水來剋火從所勝來為賊邪故言腎干心也微沉者膀胱脈也小腸心腑亦見心部故言干之也此皆夏旺之時心脈見如此者為失時脈推此十變之候乃五行勝復相加故謂之五邪也五臟各有表裡更相乘之一脈成十故曰十變也有陽有陰故曰剛柔也於本位見他脈故曰相逢相干也越人以一心臟為例余可類推矣十一難十一難曰經言脈不滿五十動而一止一臟無氣者何臟也然人吸者隨陰入呼者因陽出今吸不能至腎至肝而還故知一臟無氣者腎氣先盡也靈樞根結篇曰人一日一夜五十營以營五臟之精不應數者名曰狂生所謂五十營者五臟皆受氣持其脈口數其至也五十動而不一代者五臟皆受氣四十動一代者一臟無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣予之短期止與代同此引經文而約言之也吸者陽隨陰入呼者陰因陽出今吸不能至腎惟至肝而還者因腎位最下吸氣較遠脈若不滿五十動而一止知腎氣衰竭則不能隨諸臟氣而上矣十二難十二難曰經言五臟脈已絕於內用針者反實其外五臟脈已絕於外用針者反實其內內外之絕何以別之然五臟脈已絕於內者腎肝脈已絕於內也而醫反補其心肺五臟脈已絕於外者其心肺脈已絕於外也而醫反補其腎肝陽絕補陰陰絕補陽是謂實實虛虛損不足益有餘如此死者醫殺之耳靈樞九針十二原篇曰凡將用針必先診脈視氣之劇易乃可以治也五臟之氣已絕於內而用針者反實其外是謂重竭重竭必死其死也靜治之者輒反其氣取腋與膺五臟之氣已絕於外而用針者反實其內是謂逆厥逆厥則必死其死也躁治之者反取四末此內竭為陰虛故補腋與膺以其為臟氣之所出也外絕為陽虛故補四末以其為諸陽之本也小針解曰所謂五臟之氣已絕於內者脈口氣內絕不至反取其外之病處與陽經之合有留針以致陽氣陽氣至則內重竭重竭則死矣其死也無氣以動故靜所謂五臟之氣已絕於外者脈口氣外絕不至反取其四末之輸有留針以致其陰氣陰氣至則陽氣反入入則逆逆則死矣其死也陰氣有餘故躁此以脈口內外言陰陽內外虛實不可誤也越人以心肺腎肝別陰陽者以心肺在膈上通於天氣心主脈為營肺主氣為衛營衛浮行皮膚血脈之中故言外也腎肝在膈下通於地氣以藏精血以充骨髓故言內也馮氏謂此篇合入用針補瀉之類當在六十難之後以例相從也其說亦是十三難十三難曰經言見其色而不得其脈反得相勝之脈者即死得相生之脈者病即自已色之與脈當參相應為之奈何靈樞邪氣臟腑病形篇曰夫色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣色青者其脈弦也赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣已愈也參合也經言即此篇之義也然五臟有五色皆見於面亦當與寸口尺內相應假令色青其脈當弦而急色赤其脈浮大而散色黃其脈中緩而大色白其脈浮澀而短色黑其脈沉濡而滑此所謂五色之與脈當參相應也此論色與脈當參合相應也色指五色之見於面者而言脈指診言謂營血之所循行也尺指皮膚言謂脈外之氣血從手陽明之絡而變見於尺膚脈內之血氣從手太陰經而變見於尺寸此皆胃腑五臟所生之氣血本末根葉之出候也故見其色得其脈矣脈數尺之皮膚亦數脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈澀尺之皮膚亦澀脈滑尺之皮膚亦滑靈樞邪氣臟腑病形篇曰調其脈之緩急大小滑澀而病變定矣脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六此節即其義也夫尺膚之氣血出於胃腑水穀之精注於臟腑經隧而外布於皮膚寸口尺脈之血氣出於胃腑水穀之精營行於臟腑經脈之中變見於手太陰之兩脈口皆五臟之血氣所注故緩急大小滑澀如桴鼓之相應也徐氏謂以大小而易數字數者一息六七至之謂若皮膚則如何能數不知素問奇病論曰人有尺脈數甚筋急而見是則尺膚亦有數之候也五臟各有聲色臭味當與寸口尺內相應其不相應者病也假令色青其脈浮澀而短若大而緩為相勝浮大而散若小而滑為相生也五臟各有聲色臭味當與寸口尺內相應其不相應者病也答辭但言色脈相參不言聲臭味殆闕文歟虞氏云肝脈弦其色青其聲呼其臭臊其味酸心脈洪其色赤其聲笑其臭焦其味苦脾脈緩其色黃其聲歌其臭香其味甘肺脈澀其色白其聲哭其臭腥其味辛腎脈沉其色黑其聲呻其臭腐其味鹹此即相應之謂也若不相應者舉肝木為例如青者肝之色見浮澀而短之肺脈金剋木為賊邪見大而緩之脾脈為木剋土此相勝也見浮大而散之心脈為木生火見小而滑之腎脈為水生木心為肝之子腎為肝之母故為相生也若肝病而色白多哭好腥喜辛此聲色臭味皆肺之見證亦屬賊邪病必重也經言知一為下工知二為中工知三為上工上工十全九中工十全八下工十全六此之謂也上工能洞悉色脈皮膚臭味三法相生相勝之順逆故治病十全其九中工知二謂不能全收故治病十全其八下工僅能知一故治病十全其六此即前靈樞邪氣臟腑病形篇之義也十四難十四難曰脈有損至何謂也然至之脈一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命絕此至之脈也何謂損一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絕此損之脈也至脈從下上損脈從上下也平人之脈一呼再至一吸再至呼吸定息四至閏以太息脈五至加之為過曰至不及為減曰損至脈從下而逆上由腎而至肺也損脈從上而行下由肺而之腎也離經者脈呼吸六至已離其經常之度也一呼四至一吸四至則一息八九至乃陽氣亂故脈數數則氣為熱耗耗則精竭故曰奪精也五至死之漸六至其命絕矣然數脈一息十至十二三至遲脈四呼始見一至皆僅見之脈也損脈之為病奈何然一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑也三損損於肌肉肌肉消瘦飲食不為肌膚四損損於筋筋緩不能自收持也五損損於骨骨痿不能起於床反此者至於收病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死此推究損脈病證也一損損肺肺主皮毛肺損故皮聚而毛落也二損損心心主血脈心損則血虛故不能榮養臟腑也三損損脾脾納五味而主肌肉脾損失其運化之權故肌肉消瘦也四損損肝肝主筋肝損不克充其筋故縱緩不能收持也五損損腎腎主骨腎損故骨痿不能起於床也從上下者從肺損至腎五臟俱盡故死肺在上也從下上者從腎損至肺亦復五臟俱盡故死腎在下也於收滑氏云當作脈之二字愚意尤不若丁氏之反此者至之脈病也為是治損之法奈何然損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此治損之法也肺主氣肺損者宜益其氣心主血脈心損者宜調其營衛使血脈有所資也脾受穀味而主肌肉脾損者宜調其飲食適其寒溫俾健運不失其職肝藏血而主怒怒則傷肝肝損者宜緩其中即經所謂肝苦急急食甘以緩之之義腎藏精而主骨腎損者宜益其精蓋病在何臟則各隨其所在而治之也脈有一呼再至一吸再至有一呼三至一吸三至有一呼四至一吸四至有一呼五至一吸五至有一呼六至一吸六至有一呼一至一吸一至有再呼一至再吸一至有呼吸不至脈來如此何以別知其病也上文統言五臟受病之次序此再舉損至之脈以求其病形也滑氏曰前之損至以五臟自病得之於內者而言此則以經絡血氣為邪所中之微甚自外得之者而言也其曰呼吸再至即一呼一至一吸一至之謂疑衍文也然脈來一呼再至一吸再至不大不小曰平一呼三至一吸三至為適得病前大後小即頭痛目眩前小後大即胸滿短氣一呼四至一吸四至病欲甚脈洪大者苦煩滿沉細者腹中痛滑者傷熱澀者中霧露一呼五至一吸五至其人當困沉細夜加浮大晝加不大不小雖困可治其有大小者為難治一呼六至一吸六至為死脈也沉細夜死浮大晝死一呼一至一吸一至名曰損人雖能行猶當著床所以然者血氣皆不足故也再呼一至再吸一至名曰無魂無魂者當死也人雖能行名曰行屍一息四至閏以太息五至是為平脈一呼三至一吸三至是一息之間有六七至比之平人較多兩至適得病而未甚即上文離經之義也前為寸後謂尺寸大尺小病氣在陽為濁氣上逆之候故頭痛目眩也寸小尺大病氣在陰為清氣下陷脾肝不升肺胃不降故胸滿短氣也一呼四至一吸四至是一息之間有八九至故病欲甚即上文奪精之義也脈洪大者陽邪外越為膽上逆而火升故苦煩滿也沉細者陰邪內陷為肝脾下陷而土賊故腹中痛也滑乃血實故為熱澀為傷濕故曰中霧露此又於病之微甚間分別言之欲令學者取所現脈象以別其病而推廣其義也一呼五至一吸五至是一息之間脈來十外至則其人沉困近於死矣夜為陰晝為陽沉細陰盛故加於夜浮大陽盛故加於晝大即浮大小即沉細若不大不小則晝夜不至有加陰陽相等故可治若更參差不倫則難治矣一呼一至一吸一至是一息之間脈來二三至為損以氣血皆虧雖能行步久當不起於床也若再呼一至再吸一至遲之極矣則其人魂氣已離生道已絕如屍之行故曰行屍上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無能為害所以然者人之有尺譬如樹之有根枝葉雖枯槁根本將自生脈有根本人有元氣故知不死上部寸口下部尺中上部有脈下部無脈者邪實於上陽遏不降吐則氣逆於上故脈亦從而上則下部之無脈乃因吐而然非真離其根也若無吐證為上無邪而下氣竭故曰當死上部無脈下部有脈雖困無害者蓋脈者根乎元氣以運行者也元氣未傷則脈自能漸生其所以上部之無脈者特因氣血之偶有滯耳病去則自復故曰人之有尺譬如樹之有根也此越人又因上文損至之義引申之以見無脈之故亦有兩端不可概定為死也按損脈者遲脈也至脈者數脈也曷不云乎遲數而言損至者何也蓋遲數之脈統攝寒熱表裡虛實所包者廣越人恐後學之誤會故以一息四至終於十二三至為至始於一息二至終於兩息一至為損明損脈從上而下由肺氣虛而及於腎陽竭至脈從下而上由腎陰虛而及於肺氣盡然損脈之本原病起於肺若失冶必遞及於心脾肝腎其損脈必反而為至脈因腎虛火燥復由腎而遞及肝脾心肺而死故曰反此者至脈之病也嘗見虛寒之證末傳而現躁急之脈者為不明治損之法扶陽不早延及陰氣亦竭也夫扶陽者扶持胃脘之陽更察五臟之損以益之非徒執薑桂烏附之謂也更有進者近世醫家每以虛勞兩字為怯病通稱不知虛損病自上而下癆瘵病自下而上以癆瘵法治虛損多轉泄瀉以虛損法治癆瘵必致喘促於此涇渭不分能免於南轅北轍之相左乎此皆不明損至之義也越人既以損至之脈明虛損癆瘵之治恐急證無脈後人不察混入損脈故又申明上部有脈下部無脈上部無脈下部有脈之旨而復歸重於元氣以結此章之義學者於此尤宜三致意焉十五難十五難曰經言春脈弦夏脈鉤秋脈毛冬脈石是王脈耶將病脈也然弦鉤毛石者四時之脈也春脈弦者肝東方木也萬物始生未有枝葉故其脈之來濡弱而長故曰弦夏脈鉤者心南方火也萬物之所茂垂枝布葉皆下曲如鉤故其脈之來疾去遲故曰鉤秋脈毛者肺西方金也萬物之所終草木華葉皆秋而落其枝獨在若毫毛也故其脈之來輕虛以浮故曰毛冬脈石者腎北方水也萬物之所藏也盛冬之時水凝如石故其脈之來沉濡而滑故曰石此四時之脈也經謂素問平人氣象論玉機真藏論此參錯其文而為篇也四時之脈謂脈之應乎四時即旺脈也春脈弦者肝為木而主筋萬物始生之初其脈濡弱而長是弦之正象否則即為太過不及也夏脈鉤者心屬火而主血脈其脈來疾者其來少急而勁氣之升而上也去遲者其去少緩而弱氣之降而下也此所謂下曲如鉤也秋脈毛者肺屬金而主皮毛秋木凋零其枝獨在若毫毛言其四面無所輔而體又甚輕也冬脈石者腎屬水而主骨冬氣斂聚故沉而濡滑水之象也此四時之脈然臟腑之與五行各有所屬而春夏秋冬脈皆以木為喻者蓋惟木能因時變遷也如有變奈何然春脈弦反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內脈來厭厭聶聶如循榆葉曰平益實而滑如循長竿曰病急而勁益強如新張弓弦曰死春脈微弦曰平弦多胃氣少曰病但弦無胃氣曰死春以胃氣為本夏脈鉤反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內其脈來累累如環如循琅玕曰平來而益數如雞舉足曰病前曲後居如操帶鉤曰死夏脈微鉤曰平鉤多胃氣少曰病但鉤無胃氣曰死夏以胃氣為本秋脈毛反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內其脈來藹藹如車蓋按之益大曰平不上不下如循雞羽曰病按之蕭索如風吹毛曰死秋脈微毛曰平毛多胃氣少曰病但毛無胃氣曰死秋以胃氣為本冬脈石反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內脈來上大下兌濡滑如雀之喙曰平啄啄連屬其中微曲曰病來如解索去如彈石曰死冬脈微石曰平石多胃氣少曰病但石無胃氣曰死冬以胃氣為本如有變謂逆四時而失其常度也春脈當微弦其來濡弱而長反是者為病實強為太過陽氣盛而發於表也故病在外令人善忘眩冒癲疾虛微為不及陰氣不足而怯於中也故病在內令人胸痛引背下則兩脅胠滿厭厭聶聶如循榆葉乃微弦而有和緩胃氣也故曰平益實而滑如循長竿乃弦多胃少也故曰病急而勁益強如新張弓弦乃但弦無胃氣即所謂真臟脈也故曰死夏脈當微鉤來疾而去遲反是者為病實強者為太過病在外令人身熱而膚痛為浸淫虛微者為不及病在內令人煩心上見咳唾下為氣泄脈來累累如環如循琅玕乃微鉤而有和緩胃氣也故曰平來而益數如雞舉足乃鉤多胃少也故曰病前曲後居如操帶鉤乃但鉤無胃氣也故曰死秋脈當微毛其來輕虛以浮反是者為病實強者為太過病在外令人逆氣而背痛慍慍然虛微者為不及病在內令人喘呼吸少氣而咳上氣見血下聞病音脈來藹藹如車蓋按之益大者以其輕軟微毛而有和緩胃氣也故曰平不上不下如循雞羽乃毛多胃少也故曰病按之蕭索如風吹毛乃但毛無胃氣也故曰死冬脈當微石其來沉濡而微堅反是者為病實強者為太過病在外令人懈㑊脊脈痛而少氣不欲言虛微者為不及病在內令人心懸如飢䏚中清脊中痛少腹滿小便變脈來上大下兌濡滑如雀喙者乃微石而有和緩胃氣也故曰平啄啄連屬其中微曲乃石多胃少也故曰病來如解索去如彈石乃但石無胃氣也故曰死是四時之脈皆以胃氣為本故有胃氣則生胃氣少則病無胃氣則死也按素問平人氣象論曰平肝脈來耎弱招招如揭長竿末梢曰肝平平肺脈來厭厭聶聶如落榆莢曰肺平此兩句形容肝之平脈濡柔和緩微弦之義肺之平脈浮薄輕虛微毛之義此卻以肺平引為肝平又曰病心脈來喘喘連屬其中微曲曰心病實而盈數如雞舉足曰脾病今以脾病引為心病如烏之喙脾之死脈引為腎之平脈若此多與經文有異馮氏謂越人慾使脈之易曉重立其義爾然讀是篇者當與素問參觀胃者水穀之海也主稟四時皆以胃氣為本是為四時之變病死生之要會也胃屬土位居中央萬物歸之故云水穀之海旺於四時水火金木無不待是以生為四時變病之要會故云主稟四時也脾者中州也其平和不可得見衰乃見耳來如雀之喙如水之下漏是脾衰之見也脾受穀味在四臟之中故不可見蓋脾寄旺於四季不得獨主於四時四臟平和則脾脈在中衰乃始見雀喙言其堅銳而無沖和之氣也水下漏言其斷續無常散動而復止也此素問玉機真藏論所謂脾者土也孤臟以灌溉四旁者也善者不可得見惡者可見之義也十六難十六難曰脈有三部九候有陰陽有輕重有六十首一脈變為四時離聖久遠各自是其法何以別之然是其病有內外證脈有三部九候見後十八難陰陽詳第四難輕重詳第五難六十首見素問方盛衰論王注謂奇恆六十首今世不存或謂即各旺六十日之義一脈變為四時即十五難春弦夏鉤秋毛冬石也然脈法不一離聖久遠各自是其法何以別其是非長短也是其病有內外證言凡病但以內外之證驗之自得其真不必拘於諸法也其病為之奈何然假令得肝脈其外證善潔面青善怒其內證臍左有動氣按之牢若痛其病四肢滿閉淋溲便難轉筋有是者肝也無是者非也得肝脈診得弦脈也肝與膽合為清淨之腑故善潔青者木之色肝屬木故面青肝在志為怒故善怒此外證之色脈情好也臍左為肝木左升之部動氣真氣不能藏而發現於外也牢者氣結而堅痛者氣鬱而滯也滿閉塞也筋急則四肢滿脹左氏傳云風淫末疾者是也厥陰脈循陰器肝病故溲便難轉筋者肝主筋故病筋此內證之部屬及所主病也假令得心脈其外證面赤口乾喜笑其內證臍上有動氣按之牢若痛其病煩心心痛掌中熱而啘有是者心也無是者非也得心脈診得鉤脈也心在色為赤故面赤心氣通於舌火上炎故口乾心在聲為笑故喜笑此外證之色脈情好也臍上心之部動氣按之牢痛心煩乃心包絡受邪非真心病也若心病則旦占夕死夕占旦死矣手厥陰心包絡之脈行於掌心故掌中熱啘乾嘔也心病火盛故啘此內證之部屬及所主病也假令得脾脈其外證面黃善噫善思善味其內證當臍有動氣按之牢若痛其病腹脹滿食不消體重節痛怠惰嗜臥四肢不收有是者脾也無是者非也得脾脈診得緩脈也脾屬土在色為黃故面黃噫噯氣也靈樞口問篇曰寒氣客於胃厥氣從下上散復出於胃故為噫脾與胃合故同病也脾在志為思故善思脾在竅為口故善味此外證之色脈情好也脾位乎中故動氣當臍而牢痛也脾主運行運行不健故腹滿食不消也脾主肌肉故體重陽明主束骨而利機關脾與胃合故主節痛勞倦傷脾濕旺睥郁皆主怠惰嗜臥也脾主四肢故四肢不收此內證之部屬及所主病也假令得肺脈其外證面白善嚏悲愁不樂欲哭其內證臍右有動氣按之牢若痛其病喘咳灑淅寒熱有是者肺也無是者非也得肺脈診得毛脈也肺在色為白故面白靈樞口問篇曰陽氣和利滿於心出於鼻故嚏肺氣通於鼻故善嚏肺在志為憂故悲愁不樂在聲為哭故欲哭此外證之色脈情好也臍右為肺金右降之部動氣按之牢痛者肺氣結也肺主氣氣逆故病喘咳肺主皮毛故灑淅寒熱此內證之部屬及所主病也假令得腎脈其外證面黑善恐欠其內證臍下有動氣按之牢若痛其病逆氣小腹急痛泄如下重足脛寒而逆有是者腎也無是者非也得腎脈診得石脈也腎在色為黑故面黑腎在志為恐故善恐靈樞口問篇曰陰氣積於下陽氣未盡陽引而上陰引而下故數欠是腎主欠此外證之色脈情好也腎居最下臍下腎之位腎氣結故動氣按之牢痛腎氣不足傷於衝脈故病逆氣少陰之脈循少腹故小腹急痛也腎者胃之關今氣虛故為下重泄謂食畢即思圊也靈樞經脈篇曰足少陰腎之脈循內踝之後別入跟中以上腨內故病足脛寒而逆此內證之部屬及所主病也泄如下重如字滑氏易作而字極是十七難十七難曰經言病或有死或有不治自愈或連年月不已其死生存亡可切脈而知之耶然可盡知也此引素問脈要精微論平人氣象論語錯雜言之非經之全文也所問三者答曰可盡知也而下文止答病之死證余無所見或有闕簡歟抑不治自愈即十三難之相生脈連年月不已即五十五難之積聚病歟未可知也故俟參考診病若閉目不欲見人者脈當得肝脈弦急而長而反得肺脈浮短而澀者死也肝開竅於目閉目不欲見人肝病也然肝之病脈當弦急而長今以肝病而診得浮短而澀之肺脈乃金來剋木也故主死病若開目而渴心下牢者脈當得緊實而數反得沉澀而微者死也開目而渴者心主熱熱甚則開目而渴也心下牢者心痛現證是實邪也當得緊實而數之脈今見沉濡而微之腎脈乃水來剋火況陽病而得陰脈不死何待病若吐血復鼽衄血者脈當沉細而反浮大而牢者死也失血虛證也其脈當沉細而反見浮大牢實之脈是陰病而得陽脈病虛脈實故主死靈樞玉版篇曰衄而不止脈大是三逆即此義也病若譫言妄語身當有熱脈當洪大而反手足厥逆脈沉細而微者死也譫妄熱證也身當有熱脈當洪大今反見手足厥冷脈來沉細而微此病實脈虛也故死病若大腹而泄者脈當微細而澀反緊大而滑者死也大腹而泄者脾濕下陷脈當微細而反見滑大之脈是亦病虛脈實矣靈樞玉版篇曰腹鳴而滿四肢清泄其脈大是二逆即此義也十八難十八難曰脈有三部部有四經手有太陰陽明足有太陽少陰為上下部何謂也滑氏曰此篇立問之意謂人有十二經脈凡有三部每部之中有四經今手有太陰陽明足有太陽少陰為上下部何謂也蓋三部者以寸關尺分上中下也四經者寸關尺兩兩相比則每部各有四經矣手之太陰陽明足之太陽少陰為上下部者肺居右寸腎居左尺循環相資肺高腎下母子相望也經云臟真高於肺臟真下於腎是也然手太陰陽明金也足少陰太陽水也金生水水流下行而不能上故在下部也足厥陰少陽木也生手太陽少陰火火炎上行而不能下故為上部手心主少陽火生足太陰陽明土土主中宮故在中部也此皆五行子母更相生養者也手太陰肺手陽明大腸屬金皆診於右寸足少陰腎足太陽膀胱屬水皆診於左尺金生水水性流下故在下部也足厥陰肝足少陽膽屬木皆診於左關手太陽小腸手少陰心屬火皆診於左寸木生火火性炎上故在上部也手厥陰心包絡手少陽三焦屬相火當候於右尺足太陰脾足陽明胃屬土當候於右關火生土土位居中故在中部也土復生金此五行子母循環生養三部四經上下之義也脈有三部九候各何所主之然三部者寸關尺也九候者浮中沉也上部法天主胸以上至頭之有疾也中部法人主膈以下至臍之有疾也下部法地主臍以下至足之有疾也審而刺之者也三部之中各有浮中沉是為九候浮為陽沉為陰中者胃氣也所謂自膈以上為上焦也自膈以下為中焦也自臍以下至足為下焦也謝氏曰此一節當是十六難中答辭錯簡在此而剩出脈有三部九候各何主之十字且審而刺之楊氏云為審病之所在而刺之丁氏云當次第之次紀氏則為刺候之義各有至理姑存備參人病有沉滯久積聚可切脈而知之耶然診在右脅有積氣得肺脈結脈結甚則積甚結微則氣微診不得肺脈而右脅有積氣者何也然肺脈雖不見右手脈當沉伏此病久積聚可切脈而知之也肺金右降右脅肺之部也若右脅有積聚則肺脈當結結脈往來緩時一止復來而無定數者是也蓋結為積聚之脈素問平人氣象論曰結而橫有積矣然積有微甚是以結甚則積甚結微則氣微也設肺脈雖不見結而右手脈當見沉伏沉伏亦積聚脈右手統三部言則肺脈亦在其中又右手氣口所以候里也其外痼疾同法耶將異也然結者脈來去時一止無常數名曰結也伏者脈行筋下也浮者脈在肉上行也左右表裡法皆如此此承上文復問外之痼疾與內之積聚法將同異也痼疾者凡肌肉筋骨間久留不去之病皆是以其不在臟腑故曰外也止無常數結脈之象若有常數為代脈矣蓋結脈之所由生以積聚在內脈道不通故現脈如此也伏脈輕手尋之不見重按以指推筋著骨乃得其脈形潛隱於骨間者是也言結伏則病在裡結浮則病在表結在右病亦在右結在左病亦在左以此推之則內外左右積氣痼疾其結脈雖同而浮伏異也故曰法皆如此假令脈結伏者內無積聚脈浮結者外無痼疾有積聚脈不結伏有痼疾脈不浮結為脈不應病病不應脈是為死病也有是病必有是脈內有積聚脈宜伏結外有痼疾脈宜浮結設見伏結浮結之脈而無伏結浮結之證見伏結浮結之證而無伏結浮結之脈謂之脈不應病病不應脈也夫病脈不相應乃其氣已離血脈不相聯屬故云死然凡病與脈不相應者皆為死候不特積聚為然也十九難十九難曰經言脈有逆順男女有恆而反者何謂也恆常也反謂上下相反也此男女之脈有一定恆常之法得其脈為順不得其脈為逆若強弱相反則為何病然男子生於寅寅為木陽也女子生於申申為金陰也故男脈在關上女脈在關下是以男子尺脈恆弱女子尺脈恆盛是其常也此推本生物之初而言男女陰陽也楊氏曰元氣始於子人之所生也自子推之男從左行三十而至於巳女從右行二十而至於巳為夫婦懷妊也古者男子三十女子二十然後行嫁娶法本於此十月而生男從巳左行十月至寅故男行年起於丙寅女從巳右行十月至申故女行年起於壬申所以男子生於寅女子生於申也謝氏曰寅為陽木木生火火生於寅其性炎上故男脈在關上申為陰金金生水水生於申其性流下故女脈在關下男子陽氣盛故尺脈弱女子陰氣盛故寸脈弱此男女之常也反者男得女脈女得男脈也其為病何如男得女脈女得男脈異乎恆常謂之反然反之為病如何設此問以起下文之義然男得女脈為不足病在內左得之病在左右得之病在右隨脈言之也女得男脈為太過病在四肢左得之病在左右得之病在右隨脈言之此之謂也男得女脈者寸脈當盛反弱尺脈當弱反盛為陰氣盛陽陷於陰故為不足陰主內故病在內陽氣入陰病見於陰位也女得男脈者寸脈當弱反盛尺脈當盛反弱為陽氣盛陰越於陽故為有餘四肢屬乎陽陰氣從陽則病見於陽位也左右者以脈之左右以驗病之左右耳徐氏曰陽道全而陰道半故陽得陰脈為不足陰得陽脈為有餘也按丁錦曰人之有尺猶樹之有根欲其盛而不可得也若男得女脈指尺盛豈可謂之不足乎女得男脈指尺弱豈可謂之太過乎蓋男得女脈為不足者寸脈弱陽氣不足於內故病在內也女得男脈為太過者寸脈盛陽氣有餘於外故病在四肢也斯言也似亦近理而不可拘泥者也夫尺為脈之根宜盛不宜弱是矣然陰虛火動兩尺洪而有力者豈非不足乎火炎於上兩寸洪而有力者豈非太過乎更有兩寸豁大無力宜大補者兩尺豁大無力宜升陽散火者寸脈大於尺脈而俱有力為陰虛陽盛宜下者尺脈大於寸脈而俱有力為陽虛陰盛宜汗者然脈之變非一言能盡豈可膠柱鼓瑟耶越人示人以男女陰陽之體內外不足太過之變要在一隅三反耳學者審諸二十難二十難曰經言脈有伏匿伏匿於何臟而言伏匿耶然謂陰陽更相乘更相伏也脈居陰部而反陽脈見者為陽乘陰也脈雖時沉澀而短此謂陽中伏陰也脈居陽部而反陰脈見者為陰乘陽也脈雖時浮滑而長此謂陰中伏陽也此言陰陽相乘中又有伏匿之義也經言無考伏匿者謂不見於本位反藏於他部而見脈也脈之陰陽非獨言寸為陽尺為陰也若以前後言之即寸為陽部尺為陰部若以上下言之肌肉上為陽部肌肉下為陰部陽乘陰者尺中已浮滑而長又時時沉澀而短故曰陽中伏陰言陽雖乘陰而陰猶伏於陽內也陰乘陽者寸關已沉短而澀又時時浮滑而長故曰陰中伏陽言陰雖乘陽而陽猶伏於陰中也重陽者狂重陰者癲脫陽者見鬼脫陰者目盲此又因陰陽之伏匿而極言之重陽重陰言不止伏匿而陰皆變為陽陽皆變為陰也狂者陽疾癲者陰疾重陽者狂木火之陽旺也重陰者癲金水之陰旺也心主喜肝志怒狂者木火有餘故多喜怒腎志恐肺主悲癲者金水有餘故多悲恐脫陽者陰旺鬼陰類也故見之脫陰者肝竅於目肝藏血血舍魂魂化神魂神升發而生光明上開雙竅則為兩目陰者陽之宅也陰脫宅傾神魂散亡是以目盲名雖陰脫而實脫陰中之陽氣也二十一難二十一難曰經言人形病脈不病曰生脈病形不病曰死何謂也然人形病脈不病非有不病者也謂息數不應脈數也此大法形病脈不病曰生者人以脈為主設其人形體羸瘦精神困倦不可謂之無病也診其脈惟息數不應脈數雖營衛有傷而不見至損死絕之脈雖病必生必其臟腑無恙也脈病形不病曰死者設其人肌肉不減飲食如常不可謂之有病也診其脈則代革頻見雖不病亦死以其臟腑已壞不可救藥也經言無考仲景辨脈篇曰脈病人不病名曰行屍以無王氣卒眩僕不省人者短命則死人病脈不病名曰內虛以無穀氣雖困無害即此義歟二十二難二十二難曰經言脈有是動有所生病一脈輒變為二病者何也然經言是動者氣也所生病者血也邪在氣氣為是動邪在血血為所生病氣主呴之血主濡之氣留而不行者為氣先病也血壅而不濡者為血後病也故先為是動後所生病也脈謂十二經隧之脈每脈中有二病者有在氣在血之分也邪在氣氣為是而動邪在血血為所生病是脈之動者氣為之而所生病者血為之也氣病傳血故曰一脈變為二病也呴煦也氣主呴之者謂氣煦噓往來薰蒸於皮膚分肉也濡潤也血主濡之者謂血濡潤筋骨滑利關節榮養臟腑也然氣留而不行則血亦壅而不濡氣在外血在內外先受邪則內亦從之而病故曰先為是動後所生病也上第一卷一難至二十二難論脈
