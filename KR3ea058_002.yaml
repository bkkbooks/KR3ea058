body:
  text: 卷二二十三難二十三難曰手足三陰三陽脈之度數可曉以不然手三陽之脈從手走頭長五尺五六合三丈手三陰之脈從手至胸中長三尺五寸三六一丈八尺五六三尺合二丈一尺足三陽之脈從足走頭長八尺六八四丈八尺足三陰之脈從足至胸長六尺五寸六六三丈六尺五六三尺合三丈九尺人兩足蹺脈從足至目長七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各長四尺五寸二四八尺二五一尺合九尺凡脈長一十六丈二尺此所謂十二經脈長短之數也此言十二經脈及兩蹺督任之脈析之合之皆有度數可紀也手有三陰太陰肺少陰心厥陰心包絡足有三陰太陰脾少陰腎厥陰肝手有三陽太陽小腸陽明大腸少陽三焦足有三陽太陽膀胱陽明胃少陽膽為十二經也經之流注手三陽皆從手指末起而終於頭手三陰亦從手指末起而終至胸中足三陽從足指起而至頭足三陰從足趾足心起而至胸此舉經脈之度數故皆以手足言也蹺脈屬奇經有陰陽之分左右足各有陽蹺即從足太陽申脈穴由外上行至風池者是也左右足各有陰蹺即從足少陰照海穴由內踝上行至咽喉者是也但靈樞脈度篇論蹺脈起止專指陰蹺言而不及陽蹺則其長短之數乃陰蹺之數也故帝問蹺脈有陰陽何脈當其數岐伯答以男子數其陽女子數其陰蓋陽蹺與陰蹺雖有內外表里之殊其長短則大約相等也督脈任脈亦屬奇經督脈起於腎中由尻貫脊入腦交巔終於人中統一身之陽任脈起於少腹之內出會陰循臍腹上喉嚨終於唇下之承漿統一身之陰此節引靈樞脈度篇原文以明脈即營氣也經脈十二絡脈十五何始何窮也然經脈者行血氣通陰陽以榮於身者也其始從中焦注手太陰陽明陽明注足陽明太陰太陰注手少陰太陽太陽注足太陽少陰少陰注手心主少陽少陽注足少陽厥陰厥陰復還注手太陰別絡十五皆因其原如環無端轉相灌溉朝於寸口人迎以處百病而決死生也上言經脈尺度此又言經脈行度而推論絡脈隨經脈以運行也經有十二始從中焦者蓋謂飲食入胃其精微之化注於手太陰陽明以次相傳至足厥陰厥陰復還注手太陰也絡脈十五皆隨十二經脈之所始轉相灌溉如環之無端朝會於寸口人迎以處分百病而決死生也古法以結喉兩旁動脈為人迎越人獨取寸口直以左手關前一分為人迎右手關前一分為氣口後世宗之蓋胃受穀氣而養五臟肺朝百脈而平權衡胃為脈之根肺為脈之干胃脈大小強弱未有不變見於寸口寸口者脈之大會為肺之動脈以根干相通故也經曰明知終始陰陽定矣何謂也然終始者脈之紀也寸口人迎陰陽之氣通於朝使如環無端故曰始也終者三陰三陽之脈絶絶則死死各有形故曰終也經靈樞終始篇也此節承上文決死生之義而問脈之終始以起下節脈絶之形也終始篇曰凡刺之道畢於終始明知終始五臟為紀陰陽定矣是謂欲知終始於陰陽為能定之蓋以陽經取決於人迎陰經取決於寸口也朝朝宗也使使道也道即經隧之謂始如生物之始終如生病之窮欲明生死脈以候之陰陽之氣循環不已人之生機皆始於此故曰始也三陰三陽之脈絶人之生機皆終於此故曰終也其三陰三陽脈絶之形狀具如下章二十四難二十四難曰手足三陰三陽氣已絶何以為候可知其吉凶不然足少陰氣絶則骨枯少陰者冬脈也伏行而溫於骨髓故骨髓不溫則肉不著骨骨肉不相親則肉濡而卻肉濡而卻故齒長而枯發無潤澤無潤澤者骨先死戊日篤己日死此承上文手足三陰三陽氣絶必有其候引靈樞經脈篇錯雜言之也足少陰腎脈也腎主冬故云冬脈也腎主內營骨髓故云伏行而溫於骨髓也濡軟也卻退縮也腎氣已絶骨肉不相親則齒齦之肉結縮故齒漸長而枯燥也腎主藏精而化血發者血之餘腎之精氣絶故發不潤澤也戊己土也腎水也土剋水故云戊日篤己日死也足太陰氣絶則脈不榮其口唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死足太陰脾脈也脾主肌肉脾開竅於口其華在唇四白脈不榮則太陰之氣絶故肌肉不滑澤肉滿唇反也甲乙木也脾土也木剋土故云甲日篤乙日死也足厥陰氣絶則筋縮引卵與舌厥陰者肝脈也肝者筋之合也筋者聚於陰器而絡於舌本故脈不榮則筋縮急筋縮急則引卵與舌故舌卷卵縮則筋先死庚日篤辛日死足厥陰肝脈也其華在爪其充在筋其脈循陰器而絡於舌本脈不營則厥陰之氣絶故筋急舌卷而卵縮也庚辛金也肝木也金剋木故云庚日篤辛日死也手太陰氣絶則皮毛焦太陰者肺也行氣溫於皮毛者也氣弗榮則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷則皮枯毛折毛折者則毛先死丙日篤丁日死手太陰肺脈也其華在毛其充在皮脈不營則皮毛焦肺主氣氣主薰膚澤毛太陰氣絶故津液去則皮枯毛折而節傷也丙丁火也肺金也火剋金故云丙日篤丁日死也手少陰氣絶則脈不通少陰者心脈也心者脈之合也脈不通則血不流血不流則色澤去故面黑如黧此血先死壬日篤癸日死手少陰心脈也心主血脈其榮色也其華在面心氣絶則脈不通血不流而色澤去矣面黑如黧黧黑黃色而無潤澤也言心血不能營於面則黃黑而無光華也壬癸水也心火也水剋火故云壬日篤癸日死也按手三陰今釋太陰少陰而獨遺手厥陰者何也蓋包絡與心同候言心氣絶則包絡之氣亦絶其診既同不必別解故靈樞經脈篇亦無手厥陰之候也三陰氣俱絶者則目眩轉目瞑目瞑者為失志失志者則志先死死即目瞑也三陰者手足三陰脈此五臟之脈也五臟者人之根本也目眩者眩亂而見之不真也轉者目或反背或朝上或左右側也目瞑者盲而無所見也此三陰氣絶精神俱去之候失志者人之五志各屬一臟肝志怒心志喜脾志思肺志憂腎志恐今三陰已絶五臟皆失其志故無喜怒憂思恐五志俱亡故曰失志即死也六陽氣俱絶者則陰與陽相離陰陽相離則腠理泄絶汗乃出大如貫珠轉出不流則氣先死旦占夕死夕占旦死六陽者手足三陽也陰與陽相離者陰陽隔絶不相附也夫陽氣衛外則腠理密陽氣絶則腠理不固陰不可獨留故毛孔皆開陰氣亦從腠理而泄矣甚則絶汗出大如貫珠者言身體汗出著肉如綴珠而不流散故曰貫珠也氣屬於陽陽絶故氣先死也按靈樞經脈篇無三陽分候之法止有總論六陽氣絶一節若終始篇及素問診要經終論俱載三陽絶候法今既以三陰三陽為問當引經文以證明之補其未備太陽之脈其終也戴眼反折瘛瘲其色白絶汗乃出出則死矣少陽終者耳聾百節皆縱目睘絶系絶系一日半死其死也色先青白乃死矣陽明終者口目動作善驚妄言色黃其上下經盛而不仁則終矣此三陽脈絶之狀也夫太陽之氣主皮毛氣絶於皮故色白而絶汗出也少陽主骨百節盡縱則少陽之氣絶少陽屬腎腎藏志目系絶者志先死矣陽明之脈挾口承目故口目動作乃其經氣欲絶也善驚妄言陽明之神氣外出也色黃陽明之土氣外脫也上下經盛胃氣絶而無柔和之象也肌膚不仁則營衛之氣絶矣二十五難二十五難曰有十二經五臟六腑十一耳其一經者何等經也然一經者手少陰與心主別脈也心主與三焦為表裡俱有名而無形故言經有十二也此節問答之意謂五臟六腑配手足之陰陽但十一經耳其一經者乃手少陰心脈手心主包絡脈也二脈俱是心脈而少陰與太陽合脈心主與三焦合脈各相表裡而合為十二經也其言包絡三焦無形者言其氣也然未免語病靈樞本藏篇曰密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄果否無形何以有厚薄之相應乎邪客篇曰心者五臟六腑之大主其臟堅固邪弗能容容之則心傷心傷則神去而死矣故諸邪之在於心者皆在於心之包絡包絡者言包裹此心之膜也若其無形所指何物是包絡三焦之有形不待辨自明矣按手厥陰心包絡即包心之脂膜西醫謂心外之夾膜者是也其膜分內外二層外層厚而堅密上裹總回管脈管下與膈膜之上層相黏內層外連於外層內黏於心其脈與膈之脈管肺之氣食兩管而通貫於腦筋心之脈絡亦從包絡發出以達周身故經言膻中者臣使之官也手少陽三焦為水中之陽是為相火經言少陽屬腎者屬於腎中命門也命門即腎系由腎系下生脂膜為三焦之根西醫所謂腹包膜腹內腑統膜者是也其膜之原腎系之下裹膀胱通兩腎包二腸及女子子宮經核反摺回由尻骨之後上行腹壁膜前至肝之上膈膜之下轉向腹前包肝裹胃上層與膈膜之下層黏續膈之上層與心包絡之下層相聯氣脈通貫於肝之下胃之上又橫出薄膜一層以隔肝胃即肝胃連膜也心肺在此膜之上不能包裹所包各臟腑肚腹之前成一空囊由肝胃連膜後有一孔相通透入空囊名曰空竅凡膈膜以下各臟腑之間俱有此膜數層之摺疊筋帶為綰其臟腑以定其部位並護行各處之血管腦筋又枝生薄膜網羅縱橫是由彼臟行於此臟以通氣血者也凡諸連網膜油皆三焦之物也夫包絡之脈下膈歷絡三焦上下黏續其氣並出於腎一遊行於上中下三焦而各有所歸之部署一入於心包絡而為君主之相三焦起於七節之間藏水中真火為相火之宅包絡乃相火之臟三焦乃相火之腑包絡三焦氣化流行皆相火之流行也以似臟別臟之小囊配似腑外腑之大囊亦天造地設之理不容妄議者也若泥執無形誤矣二十六難二十六難曰經有十二絡有十五餘三絡者是何等絡也然有陽絡有陰絡有脾之大絡陽絡者陽蹺之絡也陰絡者陰蹺之絡也故絡有十五焉十二經有十二絡如手太陰絡大腸手陽明屬大腸絡肺之類此云絡有十五者以陽蹺之絡統諸陽陰蹺之絡統諸陰又以脾之大絡總統陰陽諸絡也按靈樞經脈篇十二經別之外以督脈之長強任脈之尾翳脾之大包合為十五絡蓋督脈統絡諸陽任脈統絡諸陰以為十二經絡陰陽之綱領故也若陽蹺為足太陽之別陰蹺為足少陰之別不能統諸陰陽越人取此或別有見義未可知也然素問平人氣象論云胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也虛里一穴為胃之大絡若動甚則宗氣泄矣是亦不可不知也夫十二經脈之血氣與脈皮膚之氣血皆生於胃腑水穀之精而各走其道經脈十二者六臟六腑手足三陰三陽之脈乃營血營行伏於分肉之內始於手太陰肺終於足厥陰肝周而復始以應呼吸漏下者也即西醫所謂運血之脈管也其出於孫絡皮膚者隨三焦出氣溢於孫絡以充膚熱肉淡滲毫毛衛行於周身即西醫所謂之微絲血管也由孫絡行遍周身溜於經別經別者臟腑之絡脈也與經脈交相逆順而行即西醫所謂回血管也人身經脈十二絡脈十五二十七氣出入陰陽相貫如環之無端任脈統一身之陰以主出督脈統一身之陽以主入兩蹺即隨經脈交相逆順而行之陽絡陰絡也二十七難二十七難曰脈有奇經八脈者不拘於十二經何謂也然有陽維有陰維有陽蹺有陰蹺有沖有督有任有帶之脈凡此八脈者皆不拘於經故曰奇經八脈也奇音基斜也零也不偶之義維維持也蹺蹺捷也沖直上也督總督諸陽也任統任諸陰也帶為諸脈之總束也此八脈者不繫正經無表裡配合別道奇行故曰奇經也經有十二絡有十五凡二十七氣相隨上下何獨不拘於經也然聖人圖設溝渠通利水道以備不然天雨降下溝渠溢滿當此之時雱霈妄行聖人不能復圖也此絡脈滿溢諸經不能復拘也經脈十二絡脈十五二十七氣流行內外上下皆有常度此八脈不隨十二經脈常度別道而行故越人設溝渠為喻以見絡脈滿溢諸經不能復拘而為奇經故奇經為十二經脈之別派此兩節舉八脈之名及所以明奇經之義也二十八難二十八難曰其奇經八脈者既不拘於十二經皆何起何系也然督脈者起於下極之俞並於脊裡上至風府入屬於腦此承明八脈起止之義下極之俞長強穴也在脊骶骨端風府穴在腦後發上同身寸之三寸蓋督者都也能統諸陽脈行於背為陽脈之都綱也按唐氏曰督脈起於腎中下至胞室腎中天一所生之癸水入於胞中全在督脈導之使下也督氣至胞任脈應之則心胃之血乃下會於胞中此為督任相交心腎相濟道家坎離水火交媾之鄉即在於此督脈絡陰器循二陰之間與任脈會於下也貫脊上頂交於人中與任脈會於上也今細察其脈由鼻柱上腦貫脊抵腎由腎入胞中據此道路觀之乃知督脈主陽主生腎氣蓋氣生於天陽吸入鼻孔至腦門下肺管循背脊而下入腎又由腎入胞中故吸入則胞中滿也吸入之氣實由鼻由腦由脊而下故掩鼻張口能出氣而不能吸氣蓋吸由脊下非從鼻腦不能入也呼由膈出故張口能出氣也吸由脊下督脈主之知督脈所主乃知氣之所生化矣任脈者起於中極之下以上至毛際循腹裡上關元至咽喉中極穴屬任脈在臍下同身寸之四寸言中極之下蓋指會陰穴也由會陰循腹裡而上行至咽喉任者任也能統諸陰脈而行於腹乃陰脈之總任也按唐氏曰督脈在背總制諸陽謂之曰督任脈在腹總統諸陰謂之曰任陰陽相貫故任與督兩脈必相交下則交於前後陰之間上則交於唇之上下也以先後天論之督在脊屬腎屬先天任在腹屬胃屬後天先天主氣下交胞中後天主血下交胞中全在此二脈也以水火論督脈屬氣屬水任脈屬血屬火是任脈當又屬之心心腎相交水火既濟皆由於此故任脈者陰脈之海也衝脈者起於氣衝並足陽明之經挾臍上行至胸中而散衝脈為十二經之海起於氣衝並陽明之脈挾臍上行而至胸中素問骨空論言起於氣街並少陰之經與此異靈樞逆順肥瘦篇與此同蓋衝脈起於胞中為氣血之海乃呼吸之根人之呼氣由氣海循胸膈肺管而出於喉故以沖為氣街蓋指乎此經文雖互異而義無害也按人身陰陽原氣皆起於下故內經以廣明之後即為太衝太衝之地屬之少陰少陰之前乃為厥陰其部為血海常與太衝騰精氣而上灌溉陰陽斯則人之元氣精氣皆起於下也由下而起則分三道而上其陽者從少陰之後行太陽夾脊中道以總諸陽名為督其陰者由前陰地道而上行陽明之表中以總統諸陰其名為任而中央一道則脈起血海騰精氣而上積於胸中為宗氣以司呼吸其名為沖是氣則與陽明胃氣俱住中州亦與血海之營氣俱行十二經脈者也督脈任脈皆起胞中一行脊一行腹會於承漿衝脈則由胞中上行挾臍而會於咽喉三脈同起於下極一源而三歧故軒岐不曰沖督任而總其名曰太衝是太衝者以一身之精氣升降言之不獨為血海言之也夫胃中飲食之精汁奉心化血下入胞中即由衝脈導之使下故內經云女子二七而天癸至太衝脈盛月事以時下也是胞中為先天腎氣後天胃血交會之所衝脈起於胞中導先天腎氣上行以交於胃導後天陰血下行以交於腎導氣而上導血而下通於腎麗於陽明此衝脈之所司也帶脈者起於季脅回身一周帶脈起於季脅下同身寸之一寸八分帶束也回繞也橫圍一周前垂如帶總束諸脈使上下有常要約管束之如人之束帶然故名帶也帶脈之所從出則貫腎系是當屬腎女子系胞賴其主持蓋其根結於命門也環腰貫臍居於身之中又當屬脾故脾病則女子帶下以其屬脾而又下垂於胞中故隨帶而下也陽蹺脈者起於跟中循外踝上行入風池陽蹺脈起於足外踝申脈穴而上行入於風池風池穴在耳後同身寸之半寸屬少陽膽經蹺者捷也主人行走之機供步履之用也陰蹺脈者亦起於跟中循內踝上行至咽喉交貫衝脈陰蹺脈起於足內踝骨下之照海穴而上行至咽喉交貫衝脈循頄入眥與太陽陽蹺脈會按兩蹺脈者蹺以矯舉為義乃絡脈中之氣血行身之側與少陽厥陰同性兩脈主筋兩蹺亦主筋也然其道不同陰出陽而交於足太陽陽入陰而交於足少陰其氣每從陰陽根柢和合以為矯舉而上榮大會於目故目之瞑開皆宜其曰陰脈營其臟陽脈營其腑者入陰則營臟入陽則營腑也男女脈當其數者男子陽用事其蹺在陽故男子數斷其陽女子陰用事其蹺在陰故女子數斷其陰也陽維陰維者維絡於身溢蓄不能環流灌溉諸經者也故陽維起於諸陽會也陰維起於諸陰交也陽維陰維維絡於身為陰陽之綱維也陽維發於足太陽之金門以足少陽陽交為郤與手足太陽及蹺脈會於臑俞與手足少陽會於天髎及會肩井與足少陽會於陽白上本神臨泣正營腦空下至風池與督脈會於風府啞門此陽維之起於諸陽之會也陰維之郤曰築賓與足太陰會於腹哀大橫又與足太陰厥陰會於府舍期門又與任脈會於天突廉泉此陰維起於諸陰之交也按陽維主皮膚之氣行身之表陰維主脂膜之氣行身之裡故病寒熱內痛也其起止羅氏謂陰維以維於諸陰陽維以維於諸陽然而能為維者必從乎陰陽之根柢具盛氣之發而後能維陽維從少陰至太陽發足太陽之金門而與手足少陽陽明五脈會於陽白陰維從少陽斜至厥陰發於足少陰之築賓至頂前而終少陰少陽為陰陽根柢之氣維於陽者必從少陰以起之是陰為陽根也維於陰者必從少陽而起之是陽為陰致也故二脈乃孫絡中氣血而入於絡脈為衛氣綱領也比於聖人圖設溝渠溝渠滿溢流於深湖故聖人不能拘通也而人脈隆盛入於八脈而不環周故十二經亦不能拘之其受邪氣蓄則腫熱砭射之也比於者譬喻之辭也言奇經八脈所起所繼如此然不拘於十二經者何哉比如聖人設溝渠所以通利水道也溝渠滿溢則流入深湖深湖者卑平積水之所故能拘制於溝渠而流通也人身經脈隆盛入於奇經不能歸還於十二經脈之中邪氣入於奇經無從而出鬱滯不通而為腫為熱惟用砭石以射之則邪氣因血以泄病乃可已也二十九難二十九難曰奇經之為病何如然陽維維於陽陰維維於陰陰陽不能自相維則悵然失志溶溶不能自收持陽維為病苦寒熱陰維為病苦心痛陰蹺為病陽緩而陰急陽蹺為病陰緩而陽急沖之為病氣逆而裡急督之為病脊強而厥任之為病其內苦結男子為七疝女子為瘕聚帶之為病腹滿腰溶溶若坐水中此奇經八脈之為病也此節明奇經八脈之病情也陽維維於陽陰維維於陰若陰陽不能相維則悵然失志神思不爽矣溶溶懈怠浮蕩貌言緩慢而不能收持也陽為衛陽氣不和故寒熱陰血化於心少陰陰氣不利故心痛也兩蹺脈為病病在陽則陽脈結急病在陰則陰脈結急受病者急不病者自和緩也衝脈起於氣衝上至胸中其為病氣逆而裡急其所以受邪亦因腎氣不足而邪能幹之也督脈行身之背督脈受邪病必脊痛而厥逆也任脈起胞門子戶而行於腹故其脈結為七疝瘕聚之病也帶脈橫圍腰腹故病則腹滿腰溶溶如坐水中寬慢不收而畏寒也曰此奇經八脈之為病者以總結上文診候之要也按經脈者臟腑血氣之路徑也若者邪滯則病生焉此篇七難專論經絡何以詳於奇經而略於正經殊覺未備今從靈樞經脈篇録其起止指明經脈所過以闡血氣之跡而知病起何經能不致盲人摸象也手太陰肺經之脈起於中焦下絡大腸還循胃口上膈屬肺從系橫出腋下循臑內下肘循臂內至寸口上魚際出大指之端其支者從腕後直由次指內廉而出其端手陽明大腸與肺為表裡其脈起於大指次指之端循指上廉出合谷兩骨間上入兩筋中循臂上廉入肘外廉上臑外至肩出髃骨之前廉而至肩背之上天柱骨間大椎會上又下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中而上挾鼻孔足陽明胃脈起於鼻交頞中由眼下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉挾臍入氣街中其支者起胃下口循腹裡至氣街與直者合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間又其支者由下膝三寸而別下入中指外間又其支者別跗上入大指間出其端足太陰脾與胃為表裡其脈起於足大指之端循指內側白肉際過核骨後上內踝前廉至腨內循脛骨後上膝股內前廉入腹屬脾絡胃又上膈挾咽連舌本散舌下其支者復從胃別上膈注心中手少陰心經之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者從心系卻上肺下出腋下循臑內後廉下肘內由臂內後廉抵掌後鋭骨之端入掌內後廉循小指之內出其端手太陽小腸與心為表裡其脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥卻入耳中又有支者別頰上䪼抵鼻至目鋭眥斜絡於顴足太陽膀胱之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下行挾脊貫臀入膕中又有支者從髆內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫腨內出外踝之後循京骨至小指外側足少陰腎與膀胱為表裡其脈起於小指之下斜走足心出於然谷之下循內踝之後別入跟中以上腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內下肘中下臂行兩筋之間入掌中循中指出其端又有支者別掌中循小指次指出其端手少陽三焦與心包絡為表裡其脈起於小指次指之端上出兩指間循手表腕出臂外兩骨之間上貫肘循臑外上肩入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以下頰至䪼又有支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥足少陽膽脈起於目鋭眥上抵頭角下耳後循頸至肩上入缺盆其支者從耳後入耳中出走耳前至目鋭眥後又有支者別鋭眥下大迎合手少陽脈抵於䪼下加頰車至頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉至外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指歧骨內出其端還貫爪甲出三毛足厥陰肝與膽為表裡其脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸由太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內又有支者復從肝別貫膈上注於肺下行至中焦挾中脘之分復接於手太陰肺經合督任兩脈以盡十六丈二尺之脈道終而復始也上第二卷二十三難至二十九難論經絡
