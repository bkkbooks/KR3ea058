body:
  text: 卷六六十九難六十九難曰經言虛者補之實者瀉之不虛不實以經取之何謂也然虛者補其母實者瀉其子當先補之然後瀉之不虛不實以經取之者是正經自生病不中他邪也當自取其經故言以經取之經言靈樞經脈篇也虛血氣虛也實血氣實也補之行針用補法也瀉之行針用瀉法也以經取之言循其本經所宜刺之穴也母生我者也子我生者也經脈篇載十二經皆有盛則瀉之虛則補之不盛不虛以經取之虛者補其母實者瀉其子蓋子能令母實母能令子虛也假令肝病虛則補其母合即足厥陰之合曲泉穴是也肝病實則瀉其子滎即足厥陰之滎行間穴是也當先補之然後瀉之兩句滑氏謂即後篇陽氣不足陰氣有餘當先補其陽而後瀉其陰之意然於此義不屬非誤即羡文也若憂愁思慮則傷心形寒飲冷則傷肺恚怒氣逆則傷肝飲食勞倦則傷脾久坐濕地強力入水則傷腎正經自病非五邪所傷者即於本經取當刺之穴以刺之不必補母瀉子也七十難七十難曰經言春夏刺淺秋冬刺深者何謂也然春夏者陽氣在上人氣亦在上故當淺取之秋冬者陽氣在下人氣亦在下故當深取之靈樞終始篇曰春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨此四時之氣也其四時受病亦各隨正氣之淺深故用針以治病者各依四時氣之淺深而取之也陽氣者謂天地之氣也人氣者謂營衛之氣也上言皮肉之上下言筋骨之中淺取深取必中其病也滑氏曰春夏之時陽氣浮而上人氣亦然故刺之當淺欲其無太過也秋冬之時陽氣沉而下人氣亦然故刺之當深欲其無不及也經曰必先歲氣無伐天和此之謂也春夏各致一陰秋冬各致一陽者何謂也然春夏溫必致一陰者初下針沉之至腎肝之部得氣引持之陰也秋冬寒必致一陽者初內針淺而浮之至心肺之部得氣推內之陽也是謂春夏必致一陰秋冬必致一陽致取也溫時令溫也寒時令寒也經言春夏養陽者陽盛則陰不足必取一陰之氣以養陽也秋冬養陰者陰盛則陽不足必取一陽之氣以養陰也沉之深入其針至腎肝之位引其陰氣出之於陽也浮之謂淺內其針至心肺皮血之位推其陽氣入之於陰也按滑氏曰春夏氣溫必致一陰者春夏養陽之義也初下針即沉之至腎肝之部俟其得氣乃引針而提之以至於心肺之分所謂致一陰也秋冬氣寒必致一陽者秋冬養陰之義也初內針淺而浮之當心肺之部俟其得氣推針而內之以達於腎肝之分所謂致一陽也然致陰致陽之說越人特推其理有如是者耳凡用針補瀉自有所宜初不必以是相拘也七十一難七十一難曰經言刺榮無傷衛刺衛無傷榮何謂也然針陽者臥針而刺之刺陰者先以左手攝按所針榮俞之處氣散乃內針是謂刺榮無傷衛刺衛無傷榮也營衛者血氣之道路以陰陽而分表裡者也營為陰衛為陽營行脈中屬裡衛行脈外屬表若營衛有病各中其所不得誅伐無過也素問刺齊論曰刺骨無傷筋刺筋無傷肉刺肉無傷脈刺脈無傷皮刺皮無傷肉刺肉無傷筋刺筋無傷骨亦此義也衛為外表陽行於脈外欲其淺故刺衛者宜臥針而刺之以陽氣輕浮過之恐傷營也營為里陰行於脈中欲其深過衛始可至營也故刺營者先以左手攝按所刺之穴良久使衛氣漸散離其處然後內針則針得至營而不傷衛矣此刺陽刺陰之道也七十二難七十二難曰經言能知迎隨之氣可令調之調氣之方必在陰陽何謂也然所謂迎隨者知榮衛之流行經脈之往來也隨其逆順而取之故曰迎隨經言靈樞終始篇曰陽受氣於四末陰受氣於五臟故瀉者迎之補者隨之知迎知隨氣可令和和氣之方必通陰陽是迎隨之法補瀉之道也陽經主外故從四末始陰經主內故從五臟始迎者針鋒迎其氣之方來而未盛以奪之也隨者針鋒隨其氣之方去而未虛以濟之也然必知營衛之流行經脈之往來知之而後可察病之陰陽逆順隨其所當而施補瀉也調氣之方必在陰陽者知其內外表里隨其陰陽而調之故曰調氣之方必在陰陽調氣之方必在陰陽者在察也內為陰而主裡外為陽而主表察其病在陰在陽是虛是實而補之瀉之或從陽引陰或從陰引陽或陽病治陰或陰病治陽而令其調和也楊氏曰陰虛陽實者則補陰瀉陽陽虛陰實者則補陽瀉陰或陽並於陰陰並於陽或陰陽俱虛或陰陽俱實皆隨其病之所在而調之則病無不已也按針法言補不可深泥丹溪亦常論之非無謂也素問陰陽應象大論曰形不足者溫之以氣精不足者補之以味針乃砭石所制既無氣又無味破皮損肉發竅於身氣皆從竅而出何得為補經謂氣血陰陽俱不足勿取以針和以甘藥者是也然內難鑿言補瀉之法者何耶夫讀書貴乎融貫不可膠刻迎而奪之因屬瀉其實邪隨其濟之亦可去其虛邪蓋邪去則正安去邪即所以補正非針法之補能生長血氣也仲景治虛勞傷其營衛者以大黃䗪蟲丸主之方中多屬攻藥以瘀血去肺氣利則新血自生正氣自復而營衛行營衛行則肌肉充而虛勞補矣此先聖後賢其意一也將謂針法之補可代參地則靈樞根結篇何以有營氣不足病氣不足此陰陽氣俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶滅壯者不復之說若明乎此補瀉非可以一法盡豈獨針刺之無誤即湯藥亦不致南轅北轍矣七十三難七十三難曰諸井者肌肉淺薄氣少不足使也刺之奈何然諸井者木也滎者火也火者木之子當刺井者以滎瀉之故經言補者不可以為瀉瀉者不可以為補此之謂也諸井在手足指梢故曰肌肉淺薄也氣藏於肌肉之內肌肉淺薄則氣亦微故曰氣少不足使也井為木是火之母滎為火是木之子故肝木實瀉其滎此瀉子之法也如用補則當補其合也但瀉之復不能補故曰不可以為補蓋瀉則當以子補則當以母不可誤施也六十九難以別經為子母此則以一經為子母義雖各殊其理一也按滑氏曰詳越人此說專為瀉井者言也若當補井則必補其合故引經言補者不可以為瀉瀉者不可以為補各有攸當也補瀉反則病益篤而有實實虛虛之患可不謹歟不然瀉子法下故字上該有論補母之法故以此二句總結之否則文氣不屬此中或有闕簡經言無考姑俟知者七十四難七十四難曰經言春刺井夏刺滎季夏刺輸秋刺經冬刺合者何謂也然春刺井者邪在肝夏刺滎者邪在心季夏刺輸者邪在脾秋刺經者邪在肺冬刺合者邪在腎春刺井者井為木非必春刺井以其邪在肝木也滎為火夏刺滎者以其邪在心火也輸為土季夏刺輸者以其邪在脾土也經為金秋刺經者以其邪在肺金也合為水冬刺合者以其邪在腎水也經言無考越人去古未遠古醫經猶得見之而今亡矣按靈樞順氣一日分為四時篇曰藏主冬冬刺井色主春春刺滎時主夏夏刺輸音主長夏長夏刺經味主秋秋刺合是為五變以主五俞與此同蓋以五臟之氣應五時之變而取五俞各有所主刺隔一穴者皆從子以透發母氣也一言刺之正一言刺之變所以不同也若四時氣篇曰春取經血脈分肉之間甚者深取之間者淺刺之夏取盛經孫絡取分肉間絶皮膚秋取經輸邪在腑取之合冬取井滎必深留之此言四時之氣各有所在故春取經脈於分肉之間夏取盛經孫絡分肉皮膚蓋春夏之氣從內而外也秋取經輸邪在腑取之合此秋氣之復從外而內也冬取井滎必深留之謂冬氣之藏於內也本輸篇曰春取絡脈諸滎大筋分肉之間甚則深取之間者淺取之夏取諸輸孫絡肌肉皮膚之上秋取諸合余如春法冬取諸井諸輸之分故深留之此言陰陽氣血隨四時之生長收藏而淺深出入也春氣在脈故宜取絡脈夏氣在孫絡長夏氣在肌肉故宜取孫絡肌肉皮膚之上此春夏之氣從內而外也秋氣降收故如春法蓋復從孫絡而入於絡脈也冬氣收藏故欲深而留之此四時出入之序人氣之所處病之所舍五臟應五時之所宜也此兩節又不同然各有義理所在不必求合也其肝心脾肺腎而繫於春夏秋冬者何也然五臟一病輒有五也假令肝病色青者肝也臊臭者肝也喜酸者肝也喜呼者肝也喜泣者肝也其病衆多不可盡言也四時有數而並繫於春夏秋冬者也針之要妙在於秋毫者也此復問肝心脾肺腎繫於春夏秋冬之故然五臟一病輒有五邪未可拘也假令肝病色青者肝也肝主色也臊臭者肝也而中有心病心主臭入肝為臊也喜酸者肝也而中有脾病脾主味入肝為酸也喜呼者肝也而中有肺病肺主聲入肝為呼也喜泣者肝也而中有腎病腎主液入肝為泣也舉一肝臟余可類推以明五臟六腑之病衆多不止於此而皆統於金木水火土五行之所屬如四時之有定數而並繫於春夏秋冬之所屬也然其用針要妙則在於秋毫之間而其變無窮也惟所問五臟之病何以與四時相應而答辭止言病狀如此滑氏疑有闕誤信夫七十五難七十五難曰經言東方實西方虛瀉南方補北方何謂也然金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方肝也則知肝實西方肺也則知肺虛瀉南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虛故瀉火補水欲令金不得平木也經曰不能治其虛何問其餘此之謂也此章諸家詮注皆未足達越人之旨惟徐氏經釋庶乎近焉今就其義而引申之東方實西方虛者東方木也肝也西方金也肺也人之五臟應乎五行宜平伏不宜偏勝若或一臟獨勝則疾病生須憑補瀉以調之也調之之法而言瀉南方補北方者南方火為木之子北方水為木之母也論五行本然之道木實金當平之火實水當平之土實木當平之金實火當平之水實土當平之此自然之理也今東方肝實西方肺虛金虛何能平木論治當抑其太過扶其不及故曰瀉南方火補北方水此實則瀉其子也夫火者木之子也水者木之母也瀉火則火衰而盜泄母氣其火之勢減亦不能凌金補水則火氣愈弱更竊木氣故曰水勝火也況木氣即泄金不受凌則虛者自復復則遂得平木之實用水既剋火其勢益實是以木之母水勝木之子火也而謂之子令母實母令子虛者蓋木之子火為木之母水所剋制則火能益水之氣故曰子令母實而水剋火能奪火之氣故曰母令子虛也觀上下文義則此子母兩字皆就肝木而言抑木即所以扶金也越人恐讀者誤會更申其義曰故瀉火補水者欲令金得以平木也若不知治金虛之法止以一經為補瀉則他病亦不能治也金下之不字滑氏謂衍文宜刪極是按滑氏曰金不得平木不字疑衍文東方實西方虛瀉南方補北方者木金火水欲更相平也木火土金水之欲實五行之貪勝而務權也金水木火土之相平以五行所勝而制其貪也經曰一臟不平所勝平之東方肝也西方肺也東方實則知西方虛矣若西不虛則東方安得過於實耶或瀉或補要亦抑其盛濟其不足損過就中之道也水能勝火子能令母實母能令子虛瀉南方火者奪子之氣使食母之有餘補北方水者益子之氣使不食於母也如此則過者退而抑者進金得平其木而東西方無復偏勝偏虧之患矣越人之意大抵謂東方過於實而西方之氣不足故瀉火以抑其木補水以濟其金是乃使金得與水相停故曰欲令金得平木也若曰金不得平木則前後文義窒礙竟說不通使肝木不過肺金不虛復瀉火補水不幾於實實虛虛耶八十一難文義正與此互相發明九峰蔡氏謂水火金木土惟修取相制以泄其過其意亦同故結句云不能治其虛何問其餘蓋為知常而不知變者之戒也此篇大意在肝實肺虛瀉火補水上或問子能令母實母能令子虛當瀉火補土為是蓋子有餘則不食母之氣母不足則不能蔭其子瀉南方火乃奪子之氣使食母之有餘補中央土則益母之氣使得以蔭其子也今乃瀉火補水何歟曰此越人之妙一舉而兩得之者也且瀉火一則以奪木之氣一則以去金之克補水一則以益金之氣一則以制火之光若補土則一於助金而已不可施於兩用此所以不補土而補水也或又問母能令子實子能令母虛五行之道也今越人乃謂子能令母實母能令子虛何哉曰是各有其說也母能令子實子能令母虛者五行之生化子能令母實母能令子虛者針家之豫奪固不相侔也四明陳氏曰仲景云木行乘金名曰橫內經曰氣有餘則制己所勝而侮所不勝木實金虛是木橫而凌金侮所不勝也木實本以金平之然以其氣正強而橫金平之則兩不相伏而戰戰則實者亦傷虛者亦敗金虛本資氣於土然其時土亦受制未足以資之故取水為金之子又為木之母於是瀉火補水使水勝火則火餒而取氣於木木乃減而不復實水為木母此母能令子虛也木既不實其氣乃平平則金免木凌而不復虛水為金子此子能令母實也所謂金不得平木不得凌以金平其木必瀉火補水而旁治之使木金之氣自然兩平耳今按陳氏此說亦是有理但為不之一字所纏未免牽強費辭不若直以不字為衍文爾觀八十一篇中當知金平木一語可見矣滑氏注於釋子令母實母令子虛未能明顯不若陳氏之說較為曉暢也然以木為火之母水為金之子為言其義雖通于越人之旨究隔一間又按王氏曰余每讀至此難未嘗不嘆夫越人之得經旨而悼夫後世之失經旨也先哲有言凡讀書不可先看注解且將經文反復而詳味之得自家有新意卻以注解參校庶乎經旨昭然而不為他說所蔽若先看注解則被其說橫吾胸中自家卻無新意矣余平生所佩服此訓所益甚多且如難經此篇其言周備純正足為萬世法後人紛紛之論其可憑乎夫實則瀉之虛則補之此常道也人皆知之今肝實肺虛乃不瀉肝而瀉心此則人亦知之至於不補肺補脾而補腎此則人不能知惟越人知之耳夫子能令母實母能令子虛以常情觀之則曰心火實致肝木亦實此子能令母實也脾土虛致肺金亦虛此母能令子虛也心火實固由自旺脾土虛乃由肝木製之法當瀉心補脾則肝肺皆平矣越人則不然其子能令母實子謂火母謂木固與常情無異其母能令子虛母謂水子謂木則與常情不同矣故曰水者木之母也子能令母實一句言病因也母能令子虛一句言治法也其意蓋曰火為木之子子助其母使之過分而為病矣今將何以處之惟有補水瀉火之治而已夫補水者何謂也蓋水為木之母若補水之虛使力可勝火火勢退而木勢亦退此則母能虛子之義所謂不治之治也若曰不然則母能令子虛一句將歸之脾肺乎既歸於脾肺今何不補脾乎夫五行之道其所畏者畏所克耳今火大旺水大虧火何畏乎惟其無畏則愈旺而莫能制苟非滋水以求勝之孰能勝也水勝火三字此越人寓意處細觀之勿輕忽也雖瀉火補水並言然其要又在補水耳後人乃言獨瀉火而不用補水又曰瀉火即是補水得不大違越人與經旨之意乎若果不用補水經不必言補北方水越人不必言補水矣雖水不虛而火獨暴旺者固不必補水亦可也若先因水虛而致火旺者不補水可乎水虛火旺而不補水則藥至而暫息藥過而復作將積年纍月無有窮已安能絶其根哉雖苦寒之藥通為抑陽扶陰不過瀉火邪而已終非腎臟本藥不能滋養北方之真陰也欲滋真陰舍地黃黃柏之屬不可也其因有二且夫肝之實也心助肝肝實之一因也肺不能制肝肝實之二因也肺之虛也其因亦有二心克肺肺虛之一因也脾受肝克而不能生肺肺虛之二因也今補水而瀉火火退則木氣削又金不受克而制木東方不實矣金氣得平又土不受克而生金西方不虛矣若以虛則補母言之肺虛則當補脾豈知肝氣正盛剋土之深雖每日補脾安能敵其正盛之勢哉縱使土能生金金受火克亦所得不償所失矣此所以不補土而補水也或疑木旺補水恐水生木而木愈旺故聞獨瀉火不補水論欣然而從之殊不知木已旺矣何待生乎況水之虛雖峻補不能復其本氣安有餘力生木哉若能生木則能勝火矣或又謂補水者欲其不食於母也不食於母則金還矣豈知火剋金土不生金金之虛已極尚不能自給水雖食之何所食乎若然則金虛不由於火之克土之不生而由於水之食耳豈理也哉縱水不食金金亦未必能復常也金不得平木一句多一不字所以瀉火補水者正欲使金得平木也不字當刪去不能治其虛何問其餘虛指肺虛而言也瀉火補水使金得平木正所謂能治其虛不補土不補金乃瀉火補水使金自平此法之巧而妙者苟不能曉此法而不能治此虛則不須問其他必是無能之人矣故曰不能治其虛何問其餘若夫上文所謂金木水火土更相平之義不解而自明茲故弗具也夫越人亞聖也論至於此敢不斂衽但說者之斁蝕故辨之愚按伯仁受針法於東平高洞陽故專以針法補瀉注安道不習針故以用藥論若越人則一以貫之學者習玩斯篇於補瀉之法獲益非淺七十六難七十六難曰何謂補瀉當補之時何所取氣當瀉之時何所置氣然當補之時從衛取氣當瀉之時從榮置氣其陽氣不足陰氣有餘當先補其陽而後瀉其陰陰氣不足陽氣有餘當先補其陰而後瀉其陽榮衛通行此其要也衛為陽而主氣乃陽明水穀之悍氣合經脈中出諸氣街之氣血散入孫絡纏布周身以充膚熱肉淡滲毫毛者也營為陰而主血乃奉心化出之血氣由心至胞室循行十二經脈日夜五十周以應呼吸漏下者也靈樞衛氣篇曰浮氣之不循經者為衛氣其精氣之行於經者為營氣是也此言用針取何氣為補而其所瀉之氣則置之何地也答辭謂補則從衛取氣蓋取浮氣之不循經者以補虛處瀉則從營置氣置猶棄置之置蓋從營置其氣而不用也然人之病情不一補瀉之法尤當審其陰陽虛實也若衛虛而營實者以陽氣不足陰氣有餘則先補陽而後瀉陰以和之若營虛而衛實者以陰氣不足陽氣有餘則先補陰而後瀉陽以和之如此補瀉之法先後有序則陰陽得其平營衛之氣自然通暢流行矣終始篇曰陰盛而陽虛先補其陽後瀉其陰而和之陰虛而陽盛先補其陰後瀉其陽而和之所謂盛則瀉之虛則補之此其義也七十七難七十七難曰經言上工治未病中工治已病者何謂也然所謂治未病者見肝之病則知肝當傳之與脾故先實其脾氣無令得受肝之邪故曰治未病焉中工治已病者見肝之病不曉相傳但一心治肝故曰治已病也靈樞逆順篇曰上工刺其未生者也其次刺其未盛者也其次刺其已衰者也下工刺其方襲者也與形之盛者也其病之與脈相逆者也故曰方其盛也勿敢毀傷刺其已衰事必大昌故曰上工治未病不治已病此之謂也此言治病上工刺其病之未生其次刺其初來未盛再其次則刺其已衰如兵法之避其來鋭擊其惰歸也故伯高曰無迎逢逢之氣無擊堂堂之陳無刺熇熇之熱無刺漉漉之汗無刺渾渾之脈無刺病與脈相逆者是也下工不知此義刺其邪之方襲於經脈之中或刺其邪之方盛於皮腠之間或刺其邪正相攻之時不能圖功皆足以僨事也此論刺法須及其病未生並方退之時乃可用針然凡病皆當預圖於早勿待病成方治以貽後悔也治之早則用力少而成功多所謂曲突徙薪之勳宜加於焦頭爛額之上也治病固當如此而處天下事概當如此豈止針法為然哉夫五臟之氣旺則資其所生由肝生心心生脾脾生肺肺生腎腎生肝順傳則吉也病則侮其所克肝克脾脾克腎腎克心心克肺肺克肝逆傳則凶也上工治未病者治所傳未病之臟也是以見肝之病知肝傳脾當先實脾使肝病不得傳而可愈也故曰治未病中工昧此見肝病而徒治其肝則肝病未已脾病復起故曰治已病也素問玉機真藏論曰五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死此言氣之逆行也故死亦此義也按此章乃古醫經奧旨微言越人暢其厥義然又有未盡者仲景金匱引申之足為後學津筏問曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾旺不受邪即勿補之中工不曉相傳見肝之病不解實脾惟治肝也夫肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能制腎腎氣微弱則水不行水不行則心火氣盛心火氣盛則制肺肺被制則金氣不行金氣不行則肝氣盛則肝自愈此治肝補脾之要妙也肝虛則用此法實則不在用之經曰虛虛實實補不足損有餘是其義也餘臟准此此條須分三段看上段言肝病必傳於脾木剋土也上工必先實脾脾實不受木克則肝病以不得傳而可愈也然臟氣之衰旺與時令相流通四季辰戌丑未四月每季土旺十八日合算奇零以五行各旺七十二日之數脾土當旺則不受邪即勿補之而肝木亦不得肆其侮也設過補脾又犯實實之戒矣中工不識五行衰旺傳克之義見肝之病惟治已病之肝不知實未病之脾也中段言肝之為病多虛蓋虛則受邪也肝木既虛肺金必侮其不勝上工治此必在肺金未侮肝木之先有以制之用酸以補肝之本體用焦苦以助其子心火使不泄肝木之氣而剋制肺金用甘以益脾土而制水水弱則火旺火旺則金制金制則木不受克而肝病自愈矣此亢則害承乃制隔二隔三之治故曰此治肝補脾之要妙也末段言肝虛則用此法肝實不用此法也中工不明虛實之理虛者瀉之是為虛虛實者補之是為實實故又引經文補不足瀉有餘以證其義而再曰餘臟准此蓋舉一肝臟一隅三反余可類推也此與七十五難之瀉南方補北方之義略同而尤氏注金匱不明隔治之理謂酸入肝以下十五句為後人添注誤矣七十八難七十八難曰針有補瀉何謂也然補瀉之法非必呼吸出內針也知為針者信其左不知為針者信其右當刺之時必先以左手厭按所針滎輸之處彈而努之爪而下之其氣之來如動脈之狀順針而刺之得氣因推而內之是謂補動而伸之是謂瀉不得氣乃與男外女內不得氣是謂十死不治也針法之補瀉候呼內針候吸出針者補也候吸內針候呼出針者瀉也素問離合真邪論曰吸則內針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉呼盡內針靜以久留以氣至為故如待所貴不知日暮其氣以至適而自護候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補此內經呼吸出內補瀉候氣之常法也越人以針法不僅乎此善於用針者凡下針之時先定其穴便以左手厭按所針之處以指彈擊而努揉之以爪掐引而下之以致其氣其氣之來如動脈之狀順針而刺之針得氣推其針而內入之是謂補搖動其針而引伸之是謂瀉若候氣久而不至於男子則候之於衛外女子則候之於營內若再求之不得則營衛之氣已脫針必無功是屬不治之證也按滑氏曰彈而努之鼓勇之也努讀若怒爪而下之掐之稍重皆欲致其氣之至也氣至指下如動脈之狀乃乘其至而刺之順猶循也乘也停針待氣氣至針動是得氣也因推針而內之是謂補動針而伸之是謂瀉此越人心法非呼吸出內者也是固然矣若停針候氣久而不至乃與男子則淺其針而候之衛氣之分女子則深其針而候之營氣之分如此而又不得氣是謂其病終不可治也篇中前後二氣字不同不可不辨前言氣之來如動脈狀未刺之前左手所候之氣也後言得氣不得氣針下所候之氣也此是兩節周仲立乃云凡候氣左手宜略重之候之不得乃與男則少輕其手於衛氣之分候之女則重其手於營氣之分候之如此則既無前後之分又昧停針待氣之道尚何所據為補瀉耶七十九難七十九難曰經言迎而奪之安得無虛隨而濟之安得無實虛之與實若得若失實之與虛若有若無何謂也經言靈樞九針十二原篇曰迎而奪之惡得無虛隨而濟之惡得無實迎之隨之以意和之針道畢矣小針解曰言實與虛若有若無者言實者有氣虛者無氣也為虛為實若得若失者言補者佖然若有得也瀉則恍然若有失也此節全引經文問補瀉虛實之義也然迎而奪之者瀉其子也隨而濟之者補其母也假令心病瀉手心主輸是謂迎而奪之者也補手心主井是謂隨而濟之者也迎而奪之者瀉也隨而濟之者補也假令心病瀉手心主輸者心為君主法不受病受病者手心主包絡也靈樞所謂少陰無輸者是也心火也包絡屬手厥陰相火也其輸大陵土也土為火之子瀉其輸乃實則瀉其子也迎謂取氣奪謂瀉氣也心主之井中衝木也木為火之母今補心主之井乃虛則補其母也隨謂自衛取氣濟謂補不足之經也所謂實之與虛者牢濡之意也氣來實牢者為得濡虛者為失故曰若得若失也五臟虛即補其母是謂隨而濟之也實即瀉其子是謂迎而奪之也欲為補瀉當先候針下之氣如氣來充實堅牢者為得可瀉之如氣來濡弱虛微者為失可補之設不明實牢虛濡安能辨其若得若失也哉按汪機曰內經岐伯曰迎而奪之惡得無虛言邪之將發也先迎而亟奪之無令邪布故曰卒然逢之早遏其路又曰方其來也必按而止之此皆迎而奪之不使其傳經而走絡也仲景曰太陽病頭痛七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈刺瘧篇曰瘧發身方熱刺跗上動脈開其孔出其血立寒瘧方欲寒刺手陽明太陰足陽明太陰隨井輸而刺之出其血此皆迎而奪之之驗也夫如是者譬如賊將臨境則先奪其便道斷其來路則賊失其所利惡得不虛而流毒移害於此可免矣隨而濟之惡得無實言邪之已過也隨後以濟助之無令氣忤故曰神不足者視其虛絡按而致之刺而利之無出其血無泄其氣以通其經神氣乃平謂但通經脈使其和利抑按虛絡令其氣致又曰太陰瘧病至則善嘔嘔已乃衰即取之言其衰即取之也此皆隨而濟之因其邪過經虛而氣或滯郁也經曰刺微者按摩勿釋著針勿斥移氣於不足神氣乃得復岐伯曰補必用員員者行也行者移也謂行未行之氣移未復之脈此皆隨而濟之之證也所以然者譬如人弱難步則隨助之以力濟之以舟則彼得有所資惡得不實其經虛氣之郁於此可免矣迎奪隨濟其義如此難經曰迎而奪之者瀉其子也隨其濟之者補其母也假令心病火也土為火之子手心主之輸大陵也實則瀉之是迎而奪之也木者火之母手心主之井中衝也虛則補之是隨而濟之也迎者迎於前隨者隨其後此假心為例余可類椎補瀉之雲手心主所謂少陰無輸手少陰與手厥陰同治也調氣必在陰陽者內為陰外為陽里為陰表為陽察其病之在陰在陽而調之也如陰虛陽實則補陰瀉陽陽虛陰實則補陽瀉陰或陽並於陰陰並於陽或陽陰俱虛俱實皆隨其所見而調之內難所論迎隨不同者內經通各經受病言難經主一經受病言病合於內經者宜從難經子母迎隨之法治之各適其宜庶合經意又玄珠經曰五運之中必折其鬱氣先取化源其法太陽司天取九月瀉水之源陽明司天取六月瀉金之源少陰司天取三月瀉火之源太陰司天取五月瀉土之源厥陰司天取年前十二月瀉木之源乃用針迎而取之之法也詳此迎取之法乃治氣運勝實淫郁故用此法以治之與內難之法不同也汪氏會通內難釋明迎隨補瀉之義亦頗曉暢有益來茲不嫌重復故並録之八十難八十難曰經言有見如入有見如出者何謂也然所謂有見如入者謂左手見氣來至乃內針針入見氣盡乃出針是謂有見如入有見如出也此論針之出入必見其氣之已至已盡而後可出可入也經言有見如入有見如出者謂凡欲刺先以左手按其穴候其穴中之氣來而內其針針入候其氣盡乃出其針非迎隨補瀉之法也滑氏曰所謂有見如入下當缺有見如出四字如讀若而孟子書望道而未之見而讀若如蓋通用也八十一難八十一難曰經言無實實虛虛損不足而益有餘是寸口脈耶將病自有虛實耶其損益奈何然是病非謂寸口脈也謂病自有虛實也假令肝實而肺虛肝者木也肺者金也金木當更相平當知金平木假令肺實而肝虛微少氣用針不補其肝而反重實其肺故曰實實虛虛損不足而益有餘此者中工之所害也經言靈樞九針十二原也夫治病之法以平為期虛者補之實者瀉之不足者益之有餘者損之若實者宜瀉而反補之虛者宜補而反瀉之不足者反損之有餘者反益之此皆誤治也故曰無實實無虛虛損不足益有餘也但此所謂之虛實者不知其指脈言也抑指病言也故曰是寸口脈耶將病有虛實耶其損益之法將如何以治之故曰其損益奈何然此非脈之虛實乃病自有之虛實也故曰是病非謂寸口脈也假令肝實肺虛則金無平木之力當知瀉南方火補北方水作隔二隔三之治其金木始得相平也設或肺實肝虛便當抑金扶木而粗工昧此不知補肝而反重實其肺如此則肺益實而肝益虛是不獨不明隔治之法而虛實莫辨反損其不足益其有餘不惟不能治其病而反害其人矣故復申之曰實實虛虛損不足益有餘此則中工之害也此章雖言針法之補瀉實為總結全篇綱領蓋醫家於虛實之間不容稍誤若或稍誤害如反掌故越人不憚反復叮嚀諄諄垂戒也或問難經問難內經之義者也而內經當難之義未必止此而越人獨問八十一難何所取義耶曰昉於老子道生一一生二二生三三之為九故九而九之為八十一章太玄以一元為三方自是為九而積之篇八十一首素問離合真邪論九九八十一篇以起黃鐘數焉古書多以八十一篇為數者實本乎此然辭雖簡而義該於診法經絡臟象病能腧穴針法莫不咸備如脈有根本人有元氣男生於寅女生於申木所以沉金所以浮金生於巳水生於申瀉南方火補北方水諸說靈素未見皆足以羽翼經文而診法獨取寸口以三部其事約而易明實為不磨之矜式也詳其設問之辭稱經言者出於素問靈樞二經固多亦有二經無所見者蓋托於古醫經是難經一書實與內經相表裡而不可岐視者也若潛心研究尋其指趣雖不能洞見五臟癥結亦思過半矣上第六卷六十九難至八十一難論針法
